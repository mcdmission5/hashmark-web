<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hashmark — College Football Stats & Analytics</title>
<meta name="description" content="Hashmark — deep, official college-football stats &amp; analytics for every FBS team and across the sport: team stat profiles with national ranks, league-wide leaderboards, player leaders, and preseason rankings. Independent and gambling-free." />
<!-- PWA: installable as a full-screen app on iOS/Android. Relative paths so it works under the GitHub Pages project subpath. -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0B0F14" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hashmark" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --surface:#141A22; --surface2:#1C2530; --line:#2A3542;
    --text:#E8EEF4; --text2:#9AA8B6; --amber:#F6B43C; --teal:#56C2C0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Hanken Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto;min-height:100vh;
    background:linear-gradient(180deg,#0B0F14 0%,#0c1117 100%);
    border-left:1px solid var(--line);border-right:1px solid var(--line)}
  header{position:sticky;top:0;z-index:5;padding:18px 18px 0;
    background:rgba(11,15,20,.9);backdrop-filter:blur(10px)}
  .wordmark{font-family:"Archivo",sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px}
  .wordmark .dot{color:var(--amber)}
  /* season toggle */
  .toggle{display:flex;gap:6px;margin:14px 0 10px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:4px}
  .toggle button{flex:1;background:transparent;border:0;color:var(--text2);
    font-family:"Hanken Grotesk";font-weight:700;font-size:13px;padding:9px 6px;
    border-radius:9px;cursor:pointer;line-height:1.2}
  .toggle button small{display:block;font-weight:500;font-size:10px;opacity:.8;margin-top:2px}
  .toggle button.on{background:var(--amber);color:#10130c}
  .toggle button.on small{opacity:.75}
  .subtitle{color:var(--text2);font-size:12.5px;margin:2px 0 12px}
  .subtitle b{color:var(--text);font-weight:600}
  .fdline{height:2px;background:var(--amber);box-shadow:0 0 12px rgba(246,180,60,.5);border-radius:2px}
  .list{padding:6px 12px 90px}
  .row{display:flex;align-items:center;gap:12px;padding:12px 8px;border-bottom:1px solid var(--line)}
  .rank{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;
    color:var(--text2);width:26px;text-align:right;flex:none}
  .row.top .rank{color:var(--amber)}
  .crest{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;
    font-family:"Archivo",sans-serif;font-weight:800;font-size:13px;letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 -8px 14px rgba(0,0,0,.28)}
  .meta{flex:1;min-width:0}
  .team{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conf{color:var(--text2);font-size:12px;margin-top:2px}
  .rating{text-align:right;flex:none}
  .rval{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:17px;
    border-bottom:2px solid var(--amber);padding-bottom:1px}
  .rlbl{color:var(--text2);font-size:10px;letter-spacing:.4px;margin-top:3px;text-transform:uppercase}
  .splits{display:flex;gap:8px;justify-content:flex-end;margin-top:5px}
  .chip{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text2)}
  .chip b{color:var(--teal);font-weight:700}
  .chip.d b{color:#7CA8FF}
  .note{color:var(--text2);font-size:11px;line-height:1.5;padding:16px 20px 30px;border-top:1px solid var(--line)}
  .loading,.err{color:var(--text2);text-align:center;padding:50px 20px;font-family:"JetBrains Mono",monospace;font-size:13px}
  .err{color:#E5705C}
  [data-tip]{cursor:help}
  .tip{position:fixed;z-index:60;max-width:264px;background:var(--surface2);
    border:1px solid var(--amber);color:var(--text);font-size:12.5px;line-height:1.5;
    padding:11px 13px;border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.55);
    pointer-events:none;opacity:0;transform:translateY(5px);transition:opacity .12s,transform .12s}
  .tip.show{opacity:1;transform:translateY(0)}
  .hint{color:var(--text2);font-size:11px;text-align:center;padding:10px 0 2px}
  .row{cursor:pointer}
  .chev{color:var(--text2);font-size:20px;flex:none;width:10px;text-align:center;opacity:.7}
  /* ---- team detail page ---- */
  .detail{padding:0 0 96px}
  .dtop{display:flex;align-items:center;gap:12px;padding:14px 16px 4px;position:sticky;top:0;z-index:5;
    background:rgba(11,15,20,.92);backdrop-filter:blur(10px)}
  .back{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:10px;
    width:38px;height:38px;font-size:20px;cursor:pointer;flex:none;display:grid;place-items:center;line-height:1}
  .dtop .wordmark{font-size:20px}
  .dhead{display:flex;align-items:center;gap:14px;padding:8px 18px 4px}
  .dcrest{width:60px;height:60px;border-radius:16px;flex:none;display:grid;place-items:center;
    font-family:"Archivo",sans-serif;font-weight:800;font-size:19px;letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 -10px 18px rgba(0,0,0,.3)}
  .dschool{font-family:"Archivo",sans-serif;font-weight:800;font-size:23px;letter-spacing:-.3px;line-height:1.1}
  .dconf{color:var(--text2);font-size:13px;margin-top:4px}
  .dconf .rk{color:var(--amber);font-weight:700}
  .drating{text-align:center;padding:10px 18px 18px}
  .dbig{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:46px;line-height:1;
    border-bottom:3px solid var(--amber);display:inline-block;padding-bottom:5px}
  .dlbl{color:var(--text2);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-top:9px}
  .od{display:flex;gap:12px;padding:6px 18px 14px}
  .odcard{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;text-align:center}
  .odk{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--text2)}
  .odv{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:22px;margin-top:4px}
  .odcard.o .odv{color:var(--teal)} .odcard.d .odv{color:#7CA8FF}
  .sec{padding:4px 18px}
  .sectitle{font-family:"Archivo",sans-serif;font-weight:700;font-size:15px;margin:16px 0 2px}
  .secsub{color:var(--text2);font-size:11.5px;margin-bottom:8px;line-height:1.5}
  .driver{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .dvk{width:84px;flex:none;font-weight:600;font-size:13px}
  .dvbar{flex:1;height:9px;background:var(--surface2);border-radius:6px;position:relative}
  .dvbar i{position:absolute;top:0;bottom:0;border-radius:6px}
  .dvbar i.pos{background:var(--amber)} .dvbar i.neg{background:#5C6B7A}
  .dvbar .mid{position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:var(--line)}
  .dvv{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:13px;width:54px;text-align:right;flex:none}
  .ctx{display:flex;align-items:center;justify-content:space-between;gap:6px;margin:4px 0;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 10px}
  .ctxcol{text-align:center;flex:1}
  .ctxcol .y{color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .ctxcol .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:17px;margin-top:4px}
  .ctxcol .vs{font-size:11px;color:var(--text2);font-weight:500;margin-top:2px}
  .ctxarrow{color:var(--amber);font-size:22px;flex:none}
  .prem{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:11px;overflow:hidden}
  .prem .ptitle{font-weight:700;font-size:13.5px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .prem .ptitle .ic{opacity:.85}
  .prem .blur{filter:blur(5px);opacity:.45;pointer-events:none;user-select:none}
  .prem .fakebar{height:9px;background:var(--surface2);border-radius:6px;margin:8px 0}
  .prem .lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:5px;background:linear-gradient(180deg,rgba(20,26,34,.15),rgba(20,26,34,.78))}
  .lockbadge{background:var(--amber);color:#10130c;font-weight:700;font-size:10.5px;
    padding:3px 10px;border-radius:20px;letter-spacing:.5px}
  .lock .lt{font-size:12.5px;color:var(--text);font-weight:600;text-align:center;padding:0 20px}
  /* ---- leaderboards (overall / offense / defense + conference) ---- */
  .bnav{display:flex;gap:6px;margin:0 0 9px;background:var(--surface);
    border:1px solid var(--line);border-radius:11px;padding:4px}
  .bnav button{flex:1;background:transparent;border:0;color:var(--text2);
    font-family:"Hanken Grotesk";font-weight:700;font-size:12.5px;padding:8px 4px;
    border-radius:8px;cursor:pointer;line-height:1.1}
  .bnav button.on{background:var(--surface2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}
  .bnav button.on.off{color:var(--teal)} .bnav button.on.def{color:#7CA8FF}
  .confbar{display:flex;gap:7px;overflow-x:auto;padding:1px 0 10px;scrollbar-width:none}
  .confbar::-webkit-scrollbar{display:none}
  .confpill{flex:none;background:var(--surface);border:1px solid var(--line);color:var(--text2);
    font-family:"Hanken Grotesk";font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;
    cursor:pointer;white-space:nowrap}
  .confpill.on{background:var(--amber);color:#10130c;border-color:var(--amber)}
  .cstr{margin:2px 0 4px}
  .cstrtitle{font-family:"Archivo",sans-serif;font-weight:700;font-size:12.5px;color:var(--text2);
    text-transform:uppercase;letter-spacing:.4px;margin:2px 2px 6px}
  .cstrrow{display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .cstrrow .ci{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px;color:var(--text2);width:18px;text-align:right;flex:none}
  .cstrrow .cn{flex:none;width:108px;font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cstrrow .cn small{color:var(--text2);font-weight:500;font-size:10px}
  .cstrrow .cbar{flex:1;height:8px;background:var(--surface2);border-radius:5px;position:relative;overflow:hidden}
  .cstrrow .cbar i{position:absolute;top:0;bottom:0;border-radius:5px}
  .cstrrow .cbar i.neg{background:#5C6B7A;opacity:.8}
  .cstrrow .cvv{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px;width:54px;text-align:right;flex:none}
  .csum{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 15px;margin:0 0 8px}
  .csum .ch{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .csum .cnm{font-family:"Archivo",sans-serif;font-weight:800;font-size:18px;line-height:1.1}
  .csum .crk{color:var(--amber);font-weight:700;font-size:12px;flex:none}
  .csum .cv{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:16px;margin-top:7px}
  .csum .csub{color:var(--text2);font-size:11.5px;margin-top:2px;line-height:1.4}
  /* ---- compare affordances (rankings + team detail) ---- */
  .cmpcta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--surface);border:1px solid var(--amber);color:var(--amber);
    font-family:"Hanken Grotesk";font-weight:700;font-size:13px;padding:11px;border-radius:12px;
    cursor:pointer;margin:0 0 8px}
  .cmpcta .ar{font-size:15px;line-height:1}
  .cmpcta:hover{background:rgba(246,180,60,.08)}
  /* ---- compare screen ---- */
  .cmp{padding:0 0 96px}
  .cmptop{display:flex;align-items:center;gap:12px;padding:14px 16px 4px;position:sticky;top:0;z-index:5;
    background:rgba(11,15,20,.92);backdrop-filter:blur(10px)}
  .cmptop .wordmark{font-size:20px}
  .cmptag{font-family:"Archivo",sans-serif;font-weight:800;font-size:13px;color:var(--text2);
    margin-left:auto;letter-spacing:.4px;text-transform:uppercase}
  /* team pickers */
  .pickrow{display:flex;align-items:stretch;gap:9px;padding:12px 14px 4px}
  .pick{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:13px 8px 11px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;text-align:center}
  .pick:hover{border-color:var(--amber)}
  .pick .pcrest{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;
    font-family:"Archivo",sans-serif;font-weight:800;font-size:16px;letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 -9px 15px rgba(0,0,0,.28)}
  .pick .pname{font-weight:700;font-size:14.5px;line-height:1.15;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .pick .pconf{color:var(--text2);font-size:11px}
  .pick .pchg{color:var(--amber);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    border:1px solid var(--line);border-radius:20px;padding:2px 9px;margin-top:1px}
  .pickvs{align-self:center;font-family:"Archivo",sans-serif;font-weight:800;color:var(--text2);font-size:13px;flex:none}
  /* venue toggle (reuses .toggle) */
  .venue{margin:6px 14px 2px}
  .venuesub{text-align:center;color:var(--text2);font-size:11.5px;margin:3px 0 4px;line-height:1.4}
  .venuesub b{color:var(--text);font-weight:600}
  /* headline */
  .headcard{margin:9px 14px 4px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 15px 14px}
  .hl{font-family:"Archivo",sans-serif;font-weight:800;font-size:19px;line-height:1.25;text-align:center}
  .hl .by{color:var(--amber)}
  .hlsub{text-align:center;color:var(--text2);font-size:12px;margin-top:5px}
  .hlsub b{color:var(--text)}
  .wpbar{display:flex;height:30px;border-radius:9px;overflow:hidden;margin-top:13px;border:1px solid var(--line)}
  .wpbar .seg{display:flex;align-items:center;font-family:"JetBrains Mono",monospace;font-weight:700;
    font-size:12.5px;padding:0 10px;min-width:0;overflow:hidden;white-space:nowrap}
  .wpbar .seg.b{justify-content:flex-end}
  .wplbl{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--text2)}
  .wplbl b{color:var(--text);font-weight:600}
  /* compare rows (ratings + components) */
  .cmpsec{padding:4px 16px}
  .cmprow{padding:10px 2px;border-bottom:1px solid var(--line)}
  .cmpk{text-align:center;font-size:11px;color:var(--text2);font-weight:700;margin-bottom:7px;
    text-transform:uppercase;letter-spacing:.5px}
  .cmpgrid{display:grid;grid-template-columns:54px 1fr 1fr 54px;align-items:center;gap:6px}
  .cmpval{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12.5px;color:var(--text2);letter-spacing:-.4px}
  .cmpval.a{text-align:right} .cmpval.b{text-align:left}
  .cmpval.win{color:var(--amber)}
  .cmptrk{height:10px;background:var(--surface2);border-radius:6px;position:relative;overflow:hidden}
  .cmptrk i{position:absolute;top:0;bottom:0;border-radius:6px}
  .cmptrk.l i{right:0} .cmptrk.r i{left:0}
  .cmptrk i.neg{background:#5C6B7A !important;opacity:.7}
  .cmprow.big .cmpk{font-size:12.5px;color:var(--text);font-family:"Archivo",sans-serif}
  .cmprow.big .cmpval{font-size:14.5px}
  .cmprow.big .cmptrk{height:12px}
  /* team-picker overlay */
  .pickov{position:fixed;inset:0;z-index:80;background:rgba(8,11,15,.74);
    backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
  .picksheet{width:100%;max-width:460px;max-height:84vh;background:var(--surface);
    border:1px solid var(--line);border-bottom:0;border-radius:18px 18px 0 0;
    display:flex;flex-direction:column;overflow:hidden}
  .pickhd{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--line)}
  .picksearch{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-family:"Hanken Grotesk";font-size:14px;padding:11px 12px;outline:none}
  .picksearch:focus{border-color:var(--amber)}
  .pickx{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:10px;
    width:42px;font-size:15px;cursor:pointer;flex:none}
  .picklist{overflow:auto;padding:4px 8px 20px}
  .pitem{display:flex;align-items:center;gap:11px;padding:9px 8px;border-bottom:1px solid var(--line);
    cursor:pointer;border-radius:8px}
  .pitem:hover{background:var(--surface2)}
  .pitem.dis{opacity:.32;pointer-events:none}
  .pitem .prk{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px;
    color:var(--text2);width:24px;text-align:right;flex:none}
  .pitem .pcr{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;
    font-family:"Archivo",sans-serif;font-weight:800;font-size:11px;letter-spacing:.2px;border:1px solid rgba(255,255,255,.14)}
  .pitem .pnm{font-weight:600;font-size:14px}
  .pitem .pcf{color:var(--text2);font-size:11px;margin-top:1px}
  .pitem .pov{margin-left:auto;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:13px;color:var(--text2)}
  /* ---- preview mode (Hashmark ratings hidden) ---- */
  .previewbar{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;font-size:12px;color:var(--text2);line-height:1.5;margin:0 0 8px}
  .previewbar b{color:var(--text);font-weight:600}
  .pb-badge{display:inline-block;background:var(--amber);color:#10130c;font-weight:700;font-size:9.5px;
    letter-spacing:.5px;padding:2px 7px;border-radius:20px;margin-right:7px;vertical-align:1px}
  .soon{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 26px 30px}
  .soonmark{width:84px;height:84px;border-radius:22px;display:grid;place-items:center;
    background:linear-gradient(160deg,#1b2430,#141a22);border:1px solid var(--line);
    box-shadow:inset 0 -10px 22px rgba(0,0,0,.35);margin-bottom:18px}
  .soonmark span{font-family:"Archivo",sans-serif;font-weight:800;font-size:34px;color:var(--amber)}
  .soonmark span .dot{color:var(--amber)}
  .soonbadge{background:rgba(246,180,60,.14);color:var(--amber);border:1px solid rgba(246,180,60,.4);
    font-weight:700;font-size:10px;letter-spacing:.6px;padding:4px 11px;border-radius:20px;margin-bottom:13px}
  .soontitle{font-family:"Archivo",sans-serif;font-weight:800;font-size:22px;letter-spacing:-.3px;line-height:1.2}
  .soontext{color:var(--text2);font-size:13px;line-height:1.6;margin-top:10px;max-width:330px}
  .soonbtn{margin-top:20px;background:var(--amber);color:#10130c;border:0;border-radius:11px;
    font-family:"Hanken Grotesk";font-weight:700;font-size:13.5px;padding:12px 20px;cursor:pointer}
  .soondiv{height:1px;background:var(--line);width:100%;max-width:300px;margin:24px 0 0}
  .soonfoot{color:var(--text2);font-size:11px;margin-top:14px;max-width:330px;line-height:1.55}
  .soonfoot b{color:var(--text)}
  /* team-detail factual info (preview) */
  .apstand{margin:10px 18px 4px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-align:center}
  .apstand .apnum{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:30px}
  .apstand .apnum.nr{font-size:20px;color:var(--text2)}
  .apstand .aplbl{color:var(--text2);font-size:11px;letter-spacing:.4px;text-transform:uppercase;margin-top:6px}
  .infocard{display:flex;gap:10px;padding:8px 18px 4px}

    const sel = `profiles?select=id,display_name,favorite_team_id&id=eq.${authUser.id}`;
    let r = await authFetch("GET", sel);
    if(r.error) return;                          // transient/auth error: keep prior profile, don't clobber
    if(r.data && r.data.length){ authProfile = r.data[0]; return; }
    // genuinely no row -> create it on first sign-in
    const m = authUser.user_metadata || {};
    const dn = m.full_name || m.name || (authUser.email||"").split("@")[0] || "Fan";
    await authFetch("POST", "profiles", {id:authUser.id, display_name:dn});   // RLS insert (auth.uid()=id)
    r = await authFetch("GET", sel);
    authProfile = (r.data && r.data[0]) || {id:authUser.id, display_name:dn, favorite_team_id:null};
  }catch(e){ /* keep prior authProfile */ }
}

  if(!sb) return "";   // auth unavailable -> no control; stats unaffected

  return `<button class="acctbtn signin" data-acct="signin">Sign in</button>`;
}

async function authAction(kind){
  if(!sb) return;
  const email=(document.getElementById("authemail")||{}).value, pw=(document.getElementById("authpw")||{}).value;
  try{
    if(kind==="google"){ const {error}=await sb.auth.signInWithOAuth({provider:"google", options:{redirectTo:REDIRECT}});
      if(error) authMsg(/provider|not enabled|unsupported/i.test(error.message)?"Google sign-in isn't enabled yet — use email below.":error.message); return; }
    if(kind==="password"){ if(!email||!pw) return authMsg("Enter your email and password.");
      const {error}=await sb.auth.signInWithPassword({email,password:pw}); if(error) return authMsg(error.message); closeAuth(); return; }
    if(kind==="signup"){ if(!email||!pw) return authMsg("Enter an email and a password (6+ characters).");
      const {data,error}=await sb.auth.signUp({email,password:pw,options:{emailRedirectTo:REDIRECT}});
      if(error) return authMsg(error.message);
      if(data.session) closeAuth(); else authMsg("Account created — check your email to confirm, then sign in.", true); return; }
    if(kind==="magic"){ if(!email) return authMsg("Enter your email to get a magic link.");
      const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:REDIRECT}});
      authMsg(error?error.message:"Magic link sent — check your email to finish signing in.", !error); return; }
    if(kind==="reset"){ if(!email) return authMsg("Enter your email to reset your password.");
      const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:REDIRECT});
      authMsg(error?error.message:"Password-reset email sent.", !error); return; }
    if(kind==="signout"){ await sb.auth.signOut(); closeAuth(); return; }
    if(kind==="favpick"){ closeAuth(); await ensureTeamMeta(); teamPicker(null, id=>setFavoriteTeam(id)); return; }
  }catch(e){ authMsg(e.message||"Something went wrong — try again."); }
}
async function setFavoriteTeam(teamId){
  if(!sb || !authUser) return;
  try{
    await authFetch("PATCH", `profiles?id=eq.${authUser.id}`, {favorite_team_id:Number(teamId), updated_at:new Date().toISOString()});
    authProfile = authProfile || {id:authUser.id};
    authProfile.favorite_team_id = Number(teamId);
    if(view==="2025") load(); else syncAccountUI();
  }catch(e){}
}

// ---------- official games + records (FACTUAL — render in preview AND full mode) ----------
const SEASON_RESULTS = 2025, SEASON_SCHED = 2026;
const GAME_SEL = "id,season,week,season_type,start_date,home_team_id,away_team_id,home_team,away_team,home_points,away_points,neutral_site,completed";
let teamMeta = null;        // {id: {school, color, conference}}
const scoresCache = {};     // season -> [games]
async function ensureTeamMeta(){
  if(teamMeta) return teamMeta;
  teamMeta = {};
  (await api("teams?select=id,school,color,alt_color,conference")).forEach(t=>teamMeta[t.id]=t);
  return teamMeta;
}
const fetchTeamSeason = async id =>
  (await api(`team_season?select=*&season=eq.${SEASON_RESULTS}&team_id=eq.${id}`))[0]||null;
const fetchTeamGames = async id =>
  api(`games?select=${GAME_SEL}&or=(home_team_id.eq.${id},away_team_id.eq.${id})&order=season.asc,week.asc`);
async function fetchSeasonGames(season){
  if(!scoresCache[season]) scoresCache[season] = await api(`games?select=${GAME_SEL}&season=eq.${season}&order=week.asc&limit=2000`);
  return scoresCache[season];
}
const stOrder = st => st==="postseason" ? 100 : 0;   // regular weeks before bowls/CFP
const oppColor = id => (teamMeta&&teamMeta[id]) ? hx(teamMeta[id].color) : "#384455";

function gameView(g, teamId){
  const home = String(g.home_team_id)===String(teamId);
  const ms = home?g.home_points:g.away_points, os = home?g.away_points:g.home_points;
  const done = g.completed && ms!=null && os!=null;
  return {home, oppName:(home?g.away_team:g.home_team), oppId:(home?g.away_team_id:g.home_team_id),
    ms, os, done, won:done&&ms>os, neutral:g.neutral_site, week:g.week, bowl:g.season_type==="postseason"};
}
function crestEl(cls, name, color){
  return `<div class="${cls}" style="background:${color};color:${textOn(color)}">${monogram(name||"?")}</div>`;
}
function schedRow(g, teamId){
  const v = gameView(g, teamId);
  const ha = v.neutral?"Neutral":(v.home?"vs":"at");
  const res = v.done ? `<div class="schedres ${v.won?"w":"l"}">${v.won?"W":"L"}</div>`
                     : `<div class="schedres wk">${v.bowl?"PS":("W"+v.week)}</div>`;
  const score = v.done ? `<div class="schedsc"><b>${v.ms}</b>–${v.os}</div>`
                       : `<div class="schedsc"><span class="up">${v.home?"home":v.neutral?"neutral":"away"}</span></div>`;
  const tap = v.oppId?` data-team="${v.oppId}"`:"";
  return `<div class="schedrow${v.bowl?" bowl":""}"${tap}>${res}
    ${crestEl("schedcr", v.oppName, oppColor(v.oppId))}
    <div class="schedopp"><div class="ha">${ha}${v.bowl?" · Bowl / CFP":""}</div><div class="on">${esc(v.oppName||"TBD")}</div></div>
    ${score}</div>`;
}
function recordCard(ts, ap){
  if(!ts) return "";
  const apTxt = (ap&&ap.rank) ? `<span class="ap">#${ap.rank} AP</span> · `
              : (ts.ap_rank ? `<span class="ap">#${ts.ap_rank} AP</span> · ` : "");
  const conf = ts.conf_wins!=null ? `${esc(ts.conference||"")} ${ts.conf_wins}–${ts.conf_losses}` : esc(ts.conference||"");
  const stats = ts.ppg_for!=null ? `<div class="recstats">
      <div class="recstat"><div class="rk">PPG For</div><div class="rv">${ts.ppg_for}</div></div>
      <div class="recstat"><div class="rk">PPG Allowed</div><div class="rv">${ts.ppg_against}</div></div>
      <div class="recstat"><div class="rk">Games</div><div class="rv">${ts.games_played}</div></div></div>` : "";
  return `<div class="recordcard">
    <div class="recline"><div class="recbig">${ts.wins}–${ts.losses}</div>
      <div class="recctx">${apTxt}<b>2025</b> · ${conf}</div></div>${stats}</div>`;
}
function scheduleSection(games, teamId){
  const sort = a => a.slice().sort((x,y)=>(stOrder(x.season_type)-stOrder(y.season_type))||(x.week-y.week));
  const r25 = sort(games.filter(g=>g.season===SEASON_RESULTS));
  const r26 = sort(games.filter(g=>g.season===SEASON_SCHED));
  let h = "";
  if(r25.length){ h+=`<div class="sec"><div class="sectitle">2025 results</div>
    <div class="secsub">Final scores — official. Tap an opponent to open it.</div>`;
    r25.forEach(g=>h+=schedRow(g,teamId)); h+=`</div>`; }
  if(r26.length){ h+=`<div class="sec"><div class="sectitle">2026 schedule</div>
    <div class="secsub">Upcoming opponents — official schedule.</div>`;
    r26.forEach(g=>h+=schedRow(g,teamId)); h+=`</div>`; }
  return h;
}

// ---------- scores / schedule view (browse official games by week) ----------
let scoresSeason = SEASON_RESULTS, scoresWeek = null;
function scGameRow(g){
  const done = g.completed && g.home_points!=null && g.away_points!=null;
  const hw = done && g.home_points>g.away_points, aw = done && g.away_points>g.home_points;
  const meta = g.neutral_site ? "Neutral site" : "";
  const teamLine = (name,id,score,win)=>`<div class="scteam${win?" win":""}"${id?` data-team="${id}"`:""}>
      ${crestEl("scc", name, oppColor(id))}<div class="nm">${esc(name||"TBD")}</div>
      <div class="pts">${done?score:""}</div></div>`;
  const boxLink = (done && g.id) ? `<div class="scbox" data-box="${g.id}" data-bteam="${g.home_team_id}">Box score ›</div>` : "";
  return `<div class="scgame">
    ${meta?`<div class="gm"><span>${meta}</span><span></span></div>`:""}
    ${teamLine(g.away_team, g.away_team_id, g.away_points, aw)}
    ${done?"":`<div class="scvs">${g.neutral_site?"vs":"at"}</div>`}
    ${teamLine(g.home_team, g.home_team_id, g.home_points, hw)}
    ${boxLink}</div>`;
}
async function openScores(){
  window.scrollTo(0,0);
  app.innerHTML = `<div class="loading">Loading scores…</div>`;
  try{ await ensureTeamMeta(); scoresWeek=null; await drawScores(); }
  catch(e){ app.innerHTML = `<div class="cmptop"><button class="back">←</button>
    <div class="wordmark">Hashmark<span class="dot">.</span></div></div>
    <div class="err">Couldn't load scores: ${e.message}</div>`; document.querySelector(".back").onclick=load; }
}
async function drawScores(){
  const games = await fetchSeasonGames(scoresSeason);
  const regWeeks = [...new Set(games.filter(g=>g.season_type!=="postseason").map(g=>g.week))].sort((a,b)=>a-b);
  const hasPost = games.some(g=>g.season_type==="postseason");
  const keys = regWeeks.map(w=>({key:"R"+w, label:""+w, f:g=>g.season_type!=="postseason"&&g.week===w}))
    .concat(hasPost?[{key:"PS", label:"Bowls / CFP", f:g=>g.season_type==="postseason"}]:[]);
  if(!scoresWeek || !keys.find(k=>k.key===scoresWeek)) scoresWeek = keys.length?keys[0].key:null;
  const active = keys.find(k=>k.key===scoresWeek);
  const list = (active?games.filter(active.f):[]).slice()
    .sort((a,b)=>(a.start_date||"").localeCompare(b.start_date||""));

  let h = `<div class="cmp">
    <div class="cmptop"><button class="back">←</button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div>
      <div class="cmptag">Scores</div></div>
    <div class="venue"><div class="toggle">
      <button data-ss="${SEASON_RESULTS}" class="${scoresSeason===SEASON_RESULTS?"on":""}">2025<small>Final scores</small></button>
      <button data-ss="${SEASON_SCHED}" class="${scoresSeason===SEASON_SCHED?"on":""}">2026<small>Schedule</small></button>
    </div></div>
    <div class="list" style="padding-top:4px">
    <div class="confbar">`;
  keys.forEach(k=>{ h+=`<button class="confpill ${scoresWeek===k.key?"on":""}" data-wk="${k.key}">${k.label}</button>`; });
  h += `</div>
    <div class="secsub" style="padding:0 2px 4px">${scoresSeason===SEASON_RESULTS
      ? "Official final scores — winner marked. Tap a team to open it."
      : "Official 2026 schedule — kickoffs to come. Tap a team to open it."}</div>`;
  list.forEach(g=>h+=scGameRow(g));
  if(!list.length) h+=`<div class="loading" style="padding:30px">No games.</div>`;
  h += `<div class="note"><b>Official ${scoresSeason} ${scoresSeason===SEASON_RESULTS?"results":"schedule"}.</b> Source: CFBD game data. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML = h;
  document.querySelector(".back").onclick = load;
  document.querySelectorAll("[data-ss]").forEach(b=>b.onclick=()=>{ const s=+b.dataset.ss;
    if(s!==scoresSeason){ scoresSeason=s; scoresWeek=null; drawScores(); window.scrollTo(0,0); } });
  document.querySelectorAll("[data-wk]").forEach(b=>b.onclick=()=>{ if(b.dataset.wk!==scoresWeek){
    scoresWeek=b.dataset.wk; drawScores(); window.scrollTo(0,0); } });
}

      } else {

function wireHomeSearch(){

// ---------- 2026 leaderboards: overall / offense / defense + conference ----------
const CONF_SHORT = {"American Athletic":"American","Mid-American":"MAC","Mountain West":"Mtn West",
  "Conference USA":"C-USA","FBS Independents":"Independent","Pac-12":"Pac-12","Sun Belt":"Sun Belt"};
const shortConf = c => CONF_SHORT[c] || c;
const mean = a => a.reduce((s,x)=>s+x,0)/(a.length||1);
const OVERALL_TIP = "Hashmark Rating — the full results-aware blend: opponent-adjusted efficiency shrunk toward recruited talent, an Elo + résumé/head-to-head results signal, projected QB, returning production & portal, and coaching (including a scheme-defining coach taking his unit with him).";
const MODES = {
  overall:{short:"Overall", noun:"team",    metric:r=>r.overall, lbl:"proj rating", accent:"var(--amber)",
    tip:(r,rk,n)=>`${OVERALL_TIP} ${esc(r.t.school)} ${f3(r.overall)}, #${rk} of ${n}. Higher is better.`},
  offense:{short:"Offense", noun:"offense", metric:r=>r.off, lbl:"off rtg", accent:"var(--teal)",
    tip:(r,rk,n)=>`Offense rating — ${esc(r.t.school)}'s opponent-adjusted offensive unit quality: points/yards-per-drive (finishing) + success rate + efficiency, garbage time removed, with the offensive coordinator's track record where the staff changed. ${f3(r.off)}, #${rk} best offense of ${n}. Higher is better.`},
  defense:{short:"Defense", noun:"defense", metric:r=>r.def, lbl:"def rtg", accent:"#7CA8FF",
    tip:(r,rk,n)=>`Defense rating — ${esc(r.t.school)}'s opponent-adjusted defensive unit quality: how much it suppresses opponents' scoring/efficiency per drive, garbage time removed, with the defensive coordinator's track record where the staff changed. ${f3(r.def)}, #${rk} best defense of ${n}. Higher is better.`},
};

let unitRows = null;   // [{team_id, t, overall, off, def}] for all 2026 FBS teams
async function ensureUnits(){
  if(unitRows) return unitRows;
  await ensureBoard();
  // ONE canonical unit rating per team — the opponent-adjusted, talent-shrunk off/def ratings
  // the model stores in power_ratings.off/def (not the tiny attribution contributions).
  unitRows = board2026.filter(b=>b.teams).map(b=>(
    {team_id:b.team_id, t:b.teams, overall:Number(b.overall),
      off:(b.off!=null?Number(b.off):null), def:(b.def!=null?Number(b.def):null)}));
  return unitRows;
}

function renderLeaderboard(){
  const mode = MODES[boardMode], val = mode.metric;
  const rows = unitRows.filter(r=>val(r)!=null);
  const n = rows.length;
  // national rank for the current metric
  const ranked = rows.slice().sort((a,b)=>val(b)-val(a));
  const rankOf = {}; ranked.forEach((r,i)=>rankOf[r.team_id]=i+1);
  // conference strengths for the current metric (avg of member teams)
  const byConf = {};
  rows.forEach(r=>{ const c=r.t.conference||"Independent"; (byConf[c]=byConf[c]||[]).push(val(r)); });
  const confStr = Object.keys(byConf).map(c=>({conf:c, avg:mean(byConf[c]), n:byConf[c].length}))
    .sort((a,b)=>b.avg-a.avg);
  // Rank only real conferences (>=4 FBS teams) for STRENGTH: a 2-team catch-all like FBS
  // Independents (essentially just Notre Dame) shouldn't masquerade as the #1 "conference" on a
  // small-sample average. Independents stay available as a filter pill, just not strength-ranked.
  const RANKABLE = confStr.filter(c=>c.n>=4);
  const confRankOf = {}; RANKABLE.forEach((c,i)=>confRankOf[c.conf]=i+1);
  const cmax = Math.max(0.0001, ...RANKABLE.map(c=>Math.abs(c.avg)));

  let h = header() + listTop();
  // board-type nav
  h += `<div class="bnav">`;
  ["overall","offense","defense"].forEach(k=>{
    const on = boardMode===k ? " on "+(k==="offense"?"off":k==="defense"?"def":"") : "";
    h += `<button data-mode="${k}" class="${on}">${MODES[k].short}</button>`;
  });
  h += `</div>`;
  // conference filter pills
  h += `<div class="confbar"><button class="confpill ${confFilter?"":"on"}" data-conf="">All FBS</button>`;
  confStr.forEach(c=>{ h += `<button class="confpill ${confFilter===c.conf?"on":""}" data-conf="${esc(c.conf)}">${esc(shortConf(c.conf))}</button>`; });
  h += `</div>`;

  if(confFilter){
    // selected-conference strength summary
    const cs = confStr.find(c=>c.conf===confFilter) || {avg:0,n:0};
    h += `<div class="csum">
      <div class="ch"><div class="cnm">${esc(confFilter)}</div>
        <div class="crk">${confRankOf[confFilter]?`#${confRankOf[confFilter]} of ${RANKABLE.length} leagues`:`${cs.n}-team independent group`}</div></div>
      <div class="cv" style="color:${mode.accent}">${f3(cs.avg)}</div>
      <div class="csub">average <b>${mode.short.toLowerCase()}</b> rating across its ${cs.n} FBS teams · tap a team for its full breakdown</div></div>`;
  } else {
    // conference-strength comparison (tap a row to filter)
    h += `<div class="cstr"><div class="cstrtitle">Conference strength · avg ${mode.short.toLowerCase()} rating</div>`;
    RANKABLE.forEach((c,i)=>{
      const w = Math.abs(c.avg)/cmax*100, neg = c.avg<0;
      h += `<div class="cstrrow" data-conf="${esc(c.conf)}">
        <div class="ci">${i+1}</div>
        <div class="cn">${esc(shortConf(c.conf))} <small>${c.n}</small></div>
        <div class="cbar"><i class="${neg?"neg":""}" style="width:${w}%;${neg?"":"background:"+mode.accent}"></i></div>
        <div class="cvv">${f3(c.avg)}</div></div>`;
    });
    h += `</div>`;
  }

  // team leaderboard
  const teamRows = (confFilter ? rows.filter(r=>(r.t.conference||"Independent")===confFilter) : rows)
    .sort((a,b)=>val(b)-val(a));
  h += `<div class="cstrtitle" style="margin-top:8px">${confFilter?esc(confFilter)+" — by "+mode.short.toLowerCase():"Best "+(boardMode==="overall"?"teams":mode.noun+"s")} · 2026</div>`;
  teamRows.forEach(r=>{
    const rk = rankOf[r.team_id];
    const main = `<div class="rval" style="border-color:${mode.accent}" data-tip="${esc(mode.tip(r,rk,n))}">${f3(val(r))}</div><div class="rlbl">${mode.lbl}</div>`;
    h += rowHTML(rk-1, r.t, main, r.team_id);
  });
  h += `</div><div class="note"><b>2026 Preseason — Hashmark projection.</b> Offense and defense are the opponent-adjusted, garbage-time-filtered unit ratings — a validated blend of finishing (points per drive), success rate and efficiency, with each unit's coordinator track record folded in where the staff changed. Conference strength is the simple average of a league's member teams. Free to browse. Early-offseason data is thin, so it leans on 2025 results and will sharpen through the summer. ${BRAND_LINE}</div>`;
  app.innerHTML = h; wireToggle();
}

    b.onclick = ()=>{ if(b.dataset.v!==view){ view=b.dataset.v; load(); } };
  });

  if(cta) cta.onclick = ()=> openCompare();

function _strkCls(s){ return s&&s[0]==="W"?"w":s&&s[0]==="L"?"l":""; }
function renderStandings(rows){
  let h=`<div class="cmp">${backHeader("Standings")}<div class="list" style="padding-top:6px">

          <div class="snm">${esc(r.school)}<small>SoS #${r.sos_rank||"—"}</small></div>
          <div class="srec">${r.wins}–${r.losses}</div>
          <div class="srec">${r.conf_wins}–${r.conf_losses}</div>
          <div class="sstrk ${_strkCls(r.streak)}">${esc(r.streak||"—")}</div></div>`; });

  }else{
    const list=rows.slice().filter(r=>r.sos_rank).sort((a,b)=>a.sos_rank-b.sos_rank);
    h+=`<div class="stconf">Toughest schedules — mean FBS-opponent win%</div>

  }
  h+=`<div class="note"><b>Official standings — 2025.</b> Records from CFBD game results; strength of schedule is the average win percentage of a team's FBS opponents. No Hashmark ratings shown. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML=h;

async function fetchWinProb(a,b){
  const lo=Math.min(+a,+b), hi=Math.max(+a,+b);
  const r=await api(`matchup_winprob?select=win_prob_a,win_prob_a_home,win_prob_a_away&season=eq.2026&team_a=eq.${lo}&team_b=eq.${hi}`);
  return r[0]||null;
}
function pWinA(row,a,b,venue){   // P(team a wins) for the chosen venue
  const lo=Math.min(+a,+b), aIsLo=(+a===lo);
  const loVenue = venue==="neutral"?"neutral":(venue==="aHome"?(aIsLo?"home":"away"):(aIsLo?"away":"home"));
  const pLo=Number(loVenue==="home"?row.win_prob_a_home:loVenue==="away"?row.win_prob_a_away:row.win_prob_a);
  return aIsLo?pLo:1-pLo;
}

// ---------- User-driven Simulator: pick winners -> standings, champions, 12-team CFP field ----------
// Deterministic core uses NO model. The optional odds layer (SHOW_PREDICTIONS) Monte-Carlos the
// unpicked games with the precomputed matchup_winprob (probabilities only — never a rating).
const REAL_CONF_MIN = 8;   // a "conference" that crowns a champion (excludes 2-team Independents)
let sim=null;
async function fetchAllWinprob(){   // PostgREST caps at 1000 rows/request; matchup_winprob has ~9.5k
  let all=[], off=0;
  while(off<=20000){
    const chunk=await api(`matchup_winprob?select=team_a,team_b,win_prob_a,win_prob_a_home,win_prob_a_away&season=eq.2026&order=team_a.asc,team_b.asc&limit=1000&offset=${off}`);
    all=all.concat(chunk); if(chunk.length<1000) break; off+=1000;
  }
  return all;
}
async function openSimulator(){

      api(`teams?select=id,school,conference,classification`),

    const wpmap=new Map(); wp.forEach(r=>wpmap.set(r.team_a+"-"+r.team_b, r));
    // only games between two FBS teams matter for the field

    sim={games:fgames, conf, fbs, wp:wpmap, userPicks:{}, fav:{}, ranked:[]};
    // model favorite per game (default pick); if predictions off, default home team
    fgames.forEach(g=>{ const ph=simPHome(g.home_team_id,g.away_team_id,g.neutral_site);
      sim.fav[g.id]= (SHOW_PREDICTIONS? (ph>=0.5):true) ? String(g.home_team_id):String(g.away_team_id); });
    sim.hasSOR = SHOW_PREDICTIONS && sim.wp.size>0;
    if(sim.hasSOR) precomputeSOR();
    renderSim();
  }catch(e){ app.innerHTML=backHeader("Simulator")+`<div class="list"><div class="err">Couldn't load simulator: ${e.message}</div></div>`;
    document.querySelector(".back").onclick=load; }

function simPHome(h,a,neutral){
  const lo=Math.min(+h,+a), hi=Math.max(+h,+a), row=sim&&sim.wp.get(lo+"-"+hi);
  if(!row) return 0.5;
  if(neutral){ const pLo=Number(row.win_prob_a); return (+h===lo)?pLo:1-pLo; }
  if(+h===lo) return Number(row.win_prob_a_home);
  return 1-Number(row.win_prob_a_away);
}
function simPTeam(teamId, g){   // P(teamId wins this game)
  const pHome=simPHome(g.home_team_id, g.away_team_id, g.neutral_site);
  return String(teamId)===String(g.home_team_id)? pHome : 1-pHome;
}
// P(winner beats loser) with the winner at the given venue ('home'/'away'/'neutral')
function simPair(w, l, venue){
  const W=+w, L=+l, lo=Math.min(W,L), hi=Math.max(W,L), row=sim.wp.get(lo+"-"+hi);
  if(!row) return 0.5; const wIsLo=(W===lo);
  if(venue==="neutral"){ const a=Number(row.win_prob_a); return wIsLo?a:1-a; }
  if(venue==="home")   return wIsLo?Number(row.win_prob_a_home):1-Number(row.win_prob_a_away);
  return wIsLo?Number(row.win_prob_a_away):1-Number(row.win_prob_a_home);   // away
}
// STRENGTH OF RECORD precompute: per team, the distribution of how many games an "average
// top-tier team" (mean of the top-25 by model strength) would win against THAT team's exact
// schedule (honoring venue). SOR(team) = 1 - P(reference wins >= team's actual wins): a hard
// schedule lowers the reference's chances, so matching a good record there grades high; an
// undefeated team vs a soft schedule grades low. Schedule is fixed, so this is computed once.
function precomputeSOR(){
  const ids=[...sim.fbs];
  const proxy={}; ids.forEach(t=>{ let s=0,n=0; ids.forEach(u=>{ if(u===t) return; s+=simPair(t,u,"neutral"); n++; }); proxy[t]=n?s/n:0; });
  const topRef=ids.slice().sort((a,b)=>proxy[b]-proxy[a]).slice(0,25);   // "average top-25 team"
  const refH={},refA={},refN={};
  ids.forEach(o=>{ let sh=0,sa=0,sn=0,c=0; topRef.forEach(R=>{ if(R===o) return;
      sh+=simPair(R,o,"home"); sa+=simPair(R,o,"away"); sn+=simPair(R,o,"neutral"); c++; });
    refH[o]=c?sh/c:0.5; refA[o]=c?sa/c:0.5; refN[o]=c?sn/c:0.5; });
  const sched={}; ids.forEach(t=>sched[t]=[]);
  sim.games.forEach(g=>{ const h=String(g.home_team_id), a=String(g.away_team_id);
    if(sched[h]) sched[h].push(g.neutral_site?refN[a]:refH[a]);   // reference hosts (or neutral)
    if(sched[a]) sched[a].push(g.neutral_site?refN[h]:refA[h]); });
  sim.refGeq={};
  ids.forEach(t=>{ const ps=sched[t], N=ps.length; let dist=[1];
    ps.forEach(p=>{ const nd=new Array(dist.length+1).fill(0);
      for(let k=0;k<dist.length;k++){ nd[k]+=dist[k]*(1-p); nd[k+1]+=dist[k]*p; } dist=nd; });
    const geq=new Array(N+1).fill(0); let acc=0; for(let k=N;k>=0;k--){ acc+=dist[k]; geq[k]=acc; }
    sim.refGeq[t]={geq,N}; });
}
function simSOR(teamId, wins){
  if(!sim.hasSOR || !sim.refGeq) return null;
  const r=sim.refGeq[teamId]; if(!r) return 0;
  return 1 - r.geq[Math.min(Math.max(wins,0), r.N)];
}
const simEffective = ()=> Object.assign({}, sim.fav, sim.userPicks);
function simCompute(picks){
  const rec={}; sim.fbs.forEach(id=>rec[id]={w:0,l:0,cw:0,cl:0});
  const h2h={};        // winner -> Set(losers beaten)
  const tg={};         // team -> {opp: wonBool}  (for common-opponents tiebreak)
  sim.games.forEach(g=>{ const w=picks[g.id]; if(!w) return;
    const h=String(g.home_team_id), a=String(g.away_team_id);
    const loser = (String(w)===h)?a:h;
    const cg = sim.conf[h] && sim.conf[h]===sim.conf[a];
    if(rec[w]){ rec[w].w++; if(cg) rec[w].cw++; (h2h[w]=h2h[w]||new Set()).add(loser); }
    if(rec[loser]){ rec[loser].l++; if(cg) rec[loser].cl++; }
    (tg[w]=tg[w]||{})[loser]=true; (tg[loser]=tg[loser]||{})[w]=false;
  });
  const wpct=id=>{ const r=rec[id], g=r.w+r.l; return g?r.w/g:0; };
  const cpct=id=>{ const r=rec[id], g=r.cw+r.cl; return g?r.cw/g:0; };
  // conference champions (real conferences only)
  const byConf={}; sim.fbs.forEach(id=>{ const c=sim.conf[id]; (byConf[c]=byConf[c]||[]).push(id); });
  const champions=[];
  Object.entries(byConf).forEach(([c,ids])=>{ if(ids.length<REAL_CONF_MIN) return;
    ids.sort((x,y)=>cpct(y)-cpct(x)||wpct(y)-wpct(x)||((h2h[y]&&h2h[y].has(x))?1:(h2h[x]&&h2h[x].has(y))?-1:0));
    champions.push(ids[0]); });
  const champSet=new Set(champions);
  // resume metric: Strength of Record (falls back to win% if predictions/winprob are off)
  const sor={}; sim.fbs.forEach(id=>{ const s=simSOR(id, rec[id].w); sor[id]=(s==null?wpct(id):s); });
  // common-opponents edge: +1 if x better, -1 if y better, 0 otherwise
  const commonEdge=(x,y)=>{ const gx=tg[x],gy=tg[y]; if(!gx||!gy) return 0;
    let xw=0,xn=0,yw=0; for(const o in gx){ if(o in gy){ xn++; if(gx[o])xw++; if(gy[o])yw++; } }
    if(!xn) return 0; return xw>yw?-1:xw<yw?1:0; };
  // CFP-style comparator: SOR, then head-to-head, then conference champ, then common opponents
  const cmp=(x,y)=>{ const d=sor[y]-sor[x]; if(Math.abs(d)>1e-9) return d;
    if(h2h[x]&&h2h[x].has(y)) return -1; if(h2h[y]&&h2h[y].has(x)) return 1;
    const cx=champSet.has(x), cy=champSet.has(y); if(cx!==cy) return cx?-1:1;
    return commonEdge(x,y); };
  // 2026 CFP format (rules changed Jan 2026): 12 teams, straight seeding by ranking (SOR).
  // Guaranteed spots: all FOUR Power Four champions regardless of final ranking (the "8-5
  // Duke" rule); Notre Dame if ranked in the top 12; and the highest-ranked Group of Six
  // TEAM — a conference title is NO LONGER required. Remaining spots at-large by ranking.
  const P4_CONFS=new Set(["SEC","Big Ten","Big 12","ACC"]);
  const allRanked=[...sim.fbs].sort(cmp);
  const guaranteed=champions.filter(id=>P4_CONFS.has(sim.conf[id]));   // P4 champs, any ranking
  const bestG6=allRanked.find(id=>{ const cf=sim.conf[id];
    return cf && !P4_CONFS.has(cf) && (byConf[cf]||[]).length>=REAL_CONF_MIN; });
  if(bestG6 && !guaranteed.includes(bestG6)) guaranteed.push(bestG6);  // best G6 TEAM, champ or not
  const ndId=sim.fbs.find(id=>(teamMeta[id]||{}).school==="Notre Dame");
  if(ndId && allRanked.indexOf(ndId)<12 && !guaranteed.includes(ndId)) guaranteed.push(ndId); // ND top-12 guarantee
  const guarSet=new Set(guaranteed);
  const top12=allRanked.slice(0,12), inTop=new Set(top12);
  const missing=guaranteed.filter(id=>!inTop.has(id));
  let field;
  if(!missing.length){ field=top12.slice(); }
  else { // bump the lowest-SOR non-guaranteed teams; slot the missing auto-bids at the bottom (#12, #11…)
    const drop=new Set(top12.filter(id=>!guarSet.has(id)).sort(cmp).slice(-missing.length));
    const kept=top12.filter(id=>!drop.has(id)).sort(cmp);
    field=[...kept, ...missing.slice().sort(cmp)].slice(0,12);
  }
  return {rec, wpct, cpct, sor, cmp, rank:cmp, champions, champSorted:champions.slice().sort(cmp), field, byConf, bumped:new Set(missing)};
}

          <button class="stb ${!win?"l":""}" data-gid="${g.id}" data-pick="${opp}">L</button></div></div>`; });
    document.getElementById("stsheet").innerHTML=`<div class="strec">Projected: <b>${w}–${l}</b></div>`+html;
    document.querySelectorAll("#stsheet .stb").forEach(b=>b.onclick=()=>{ sim.userPicks[b.dataset.gid]=b.dataset.pick; draw(); });
  };
  draw();
  const close=()=>{ ov.remove(); renderSim(); };
  ov.querySelector(".pickx").onclick=close; ov.onclick=e=>{ if(e.target===ov) close(); };

function simRunOdds(){
  const odds=document.getElementById("simodds");
  odds.innerHTML=`<div class="loading">Simulating 1000 seasons…</div>`;
  setTimeout(()=>{
    const N=1000, fbs=[...sim.fbs], tally={}; fbs.forEach(id=>tally[id]={po:0,ct:0,wo:0});
    for(let s=0;s<N;s++){
      const picks=Object.assign({}, sim.userPicks);
      sim.games.forEach(g=>{ if(picks[g.id]) return;
        picks[g.id]= Math.random()<simPHome(g.home_team_id,g.away_team_id,g.neutral_site)?String(g.home_team_id):String(g.away_team_id); });
      const r=simCompute(picks);
      r.field.forEach(id=>tally[id].po++);
      r.champions.forEach(id=>{ if(tally[id]) tally[id].ct++; });
      fbs.forEach(id=>{ if(r.rec[id].l===0 && r.rec[id].w>0) tally[id].wo++; });
    }
    const rows=fbs.map(id=>({id, po:tally[id].po/N, ct:tally[id].ct/N, wo:tally[id].wo/N}))
      .filter(r=>r.po>0).sort((a,b)=>b.po-a.po).slice(0,20);
    let h=`<div class="sec"><div class="sectitle">Playoff &amp; title odds</div>
      <div class="secsub">From <b>1,000</b> Monte-Carlo seasons — your picks fixed, the rest drawn from the model's matchup win probabilities. Probabilities only. </div>
      <div class="oddhead"><div></div><div>Make CFP</div><div>Conf title</div><div>Win out</div></div>`;
    rows.forEach(r=>{ const t=teamMeta[r.id]||{school:r.id};
      h+=`<div class="oddrow" data-team="${r.id}"><div class="onm">${crestEl("glcr",t.school,oppColor(r.id))}<span>${esc(t.school)}</span></div>
        <div class="ov">${Math.round(r.po*100)}%</div><div class="ov">${Math.round(r.ct*100)}%</div><div class="ov">${Math.round(r.wo*100)}%</div></div>`; });
    odds.innerHTML=h+`</div>`;
  }, 30);
}

// ---------- compare tool (free-tier flagship: single-game projection) ----------
// Engine constants from the Hashmark model (wf-ridge-v1). The margin model is
//   margin = beta * zdiff + hfa * home_field   (walkforward.py / ratings.project_margin)
// where zdiff is the difference of the teams' z-scored power ratings. beta & hfa are
// the latest fitted values logged to prediction_log; sigma is the CALIBRATED win-prob
// sigma (calibration_report.md: fitted 16.75, not the raw residual SD ~18.1). We map a
// projected margin to win prob with the normal approximation P(win)=Phi(margin/sigma),
// exactly as ratings.win_probability() does.
const ENGINE = { beta: 8.342, hfa: 2.975, sigma: 16.75 };
let engineLoaded = false;
async function ensureEngine(){
  if(engineLoaded) return ENGINE;
  try{ // best-effort: pull the most recent margin-model coefficients from the log
    const r = await api("prediction_log?select=features&order=season.desc,week.desc&limit=1");
    const f = r && r[0] && r[0].features;
    if(f && isFinite(f.beta) && isFinite(f.hfa)){ ENGINE.beta=Number(f.beta); ENGINE.hfa=Number(f.hfa); }
  }catch(e){ /* keep the cited defaults */ }
  engineLoaded = true; return ENGINE;
}
function erf(x){ // Abramowitz & Stegun 7.1.26, |err| < 1.5e-7
  const s=x<0?-1:1; x=Math.abs(x); const t=1/(1+0.3275911*x);
  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return s*y;
}
const winProb = m => 0.5*(1+erf((m/ENGINE.sigma)/Math.sqrt(2)));

let cmp = {a:null,b:null,venue:"neutral"};
let boardSD = 0;            // cross-team SD of `overall` -> converts ratings to unit-z
const compCache = {};       // team_id -> {component: value}

async function fetchComps(teamId){
  if(compCache[teamId]) return compCache[teamId];
  const rows = await api(`rating_components?select=component,value&season=eq.2026&week=eq.0&team_id=eq.${teamId}`);
  const cv={}; rows.forEach(c=>cv[c.component]=Number(c.value));
  compCache[teamId]=cv; return cv;
}
function boardRank(teamId){ return board2026.findIndex(b=>String(b.team_id)===String(teamId))+1; }
function boardEntry(teamId){ return board2026.find(b=>String(b.team_id)===String(teamId)); }

async function openCompare(aId, bId){
  if(!SHOW_HASHMARK_RATINGS){ view="2026"; return renderComingSoon(); }  // Compare is a Hashmark projection — hidden in preview
  window.scrollTo(0,0);
  app.innerHTML = `<div class="loading">Loading matchup…</div>`;
  try{
    await Promise.all([ensureBoard(), ensureEngine()]);
    const ov = board2026.map(b=>Number(b.overall));
    const mean = ov.reduce((s,x)=>s+x,0)/ov.length;
    boardSD = Math.sqrt(ov.reduce((s,x)=>s+(x-mean)*(x-mean),0)/ov.length) || 1;
    // defaults: top two teams (or the passed team vs the best other team)
    if(!aId) aId = board2026[0].team_id;
    if(!bId) bId = (board2026.find(b=>String(b.team_id)!==String(aId))||board2026[0]).team_id;
    cmp = {a:aId, b:bId, venue:"neutral"};
    await Promise.all([fetchComps(aId), fetchComps(bId)]);
    drawCompare();
  }catch(e){
    app.innerHTML = `<div class="cmptop"><button class="back">←</button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div></div>
      <div class="err">Couldn't load matchup: ${e.message}</div>`;
    document.querySelector(".back").onclick = load;
  }
}

// one comparison row: back-to-back bars growing out from the centre, longer bar = edge
function cmpRow(label, va, vb, cA, cB, tipK, big){
  const mx=Math.max(1e-6, Math.abs(va), Math.abs(vb));
  const wa=Math.abs(va)/mx*100, wb=Math.abs(vb)/mx*100;
  const barA=`<i class="${va<0?'neg':''}" style="width:${wa}%;${va<0?'':'background:'+cA}"></i>`;
  const barB=`<i class="${vb<0?'neg':''}" style="width:${wb}%;${vb<0?'':'background:'+cB}"></i>`;
  return `<div class="cmprow${big?' big':''}">
    <div class="cmpk"${tipK?` data-tip="${esc(tipK)}"`:''}>${label}</div>
    <div class="cmpgrid">
      <div class="cmpval a${va>vb?' win':''}">${f3(va)}</div>
      <div class="cmptrk l">${barA}</div>
      <div class="cmptrk r">${barB}</div>
      <div class="cmpval b${vb>va?' win':''}">${f3(vb)}</div>
    </div></div>`;
}

function drawCompare(){
  const A=boardEntry(cmp.a), B=boardEntry(cmp.b);
  const ta=A.teams, tb=B.teams, cA=hx(ta.color), cB=hx(tb.color);
  const oA=Number(A.overall), oB=Number(B.overall);
  const cvA=compCache[cmp.a]||{}, cvB=compCache[cmp.b]||{};
  const rkA=boardRank(cmp.a), rkB=boardRank(cmp.b);

  // projection (positive margin => team A favored)
  const z=(oA-oB)/boardSD;
  let margin=ENGINE.beta*z;
  if(cmp.venue==="home") margin+=ENGINE.hfa;
  else if(cmp.venue==="away") margin-=ENGINE.hfa;
  const pA=winProb(margin), paPct=Math.round(pA*100), pbPct=100-paPct;
  const favA=margin>=0, fav=favA?ta:tb, favRk=favA?rkA:rkB;
  const by=Math.abs(margin), favWp=Math.round((favA?pA:1-pA)*100);
  const tossup = by<0.5;

  const venues={
    home:{lbl:"Home",sub:`<b>${esc(ta.school)}</b> hosts`,
          desc:`${esc(ta.school)} at home vs ${esc(tb.school)}`},
    neutral:{lbl:"Neutral",sub:"neutral site",
          desc:`${esc(ta.school)} vs ${esc(tb.school)} — neutral field`},
    away:{lbl:"Away",sub:`at <b>${esc(tb.school)}</b>`,
          desc:`${esc(ta.school)} on the road at ${esc(tb.school)}`},
  };
  const hfaTxt=ENGINE.hfa.toFixed(1);

  let h=`<div class="cmp">
    <div class="cmptop"><button class="back">←</button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div>
      <div class="cmptag">Compare</div></div>
    <div class="pickrow">${pickCard("a")}<div class="pickvs">VS</div>${pickCard("b")}</div>
    <div class="venue"><div class="toggle">`;
  ["home","neutral","away"].forEach(v=>{
    h+=`<button data-venue="${v}" class="${cmp.venue===v?'on':''}">${venues[v].lbl}<small>${venues[v].sub}</small></button>`;
  });
  h+=`</div></div>
    <div class="venuesub">Projection includes the model's home-field value of <b>${hfaTxt} pts</b> (off on neutral).</div>`;

  // headline
  h+=`<div class="headcard">
    <div class="hl">${tossup
      ? `Hashmark calls this a <span class="by">toss-up</span>`
      : `Hashmark projects ${esc(fav.school)} <span class="by">by ${by.toFixed(1)}</span>`}</div>
    <div class="hlsub">win probability <b>${favWp}%</b>${tossup?'':` · ${esc(fav.school)} #${favRk}`} · <b>${venues[cmp.venue].lbl.toLowerCase()==='neutral'?'neutral site':venues[cmp.venue].lbl}</b></div>
    <div class="wpbar">
      <div class="seg a" style="width:${paPct}%;background:${cA};color:${textOn(ta.color)}">${paPct>=16?paPct+'%':''}</div>
      <div class="seg b" style="width:${pbPct}%;background:${cB};color:${textOn(tb.color)}">${pbPct>=16?pbPct+'%':''}</div>
    </div>
    <div class="wplbl"><span><b>${esc(ta.school)}</b> ${paPct}%</span><span>${pbPct}% <b>${esc(tb.school)}</b></span></div>
  </div>`;

  // side-by-side ratings (overall / off / def) — off/def are the canonical unit ratings
  const ea=boardEntry(cmp.a), eb=boardEntry(cmp.b);
  const offA=ea&&ea.off!=null?Number(ea.off):0, defA=ea&&ea.def!=null?Number(ea.def):0;
  const offB=eb&&eb.off!=null?Number(eb.off):0, defB=eb&&eb.def!=null?Number(eb.def):0;
  h+=`<div class="cmpsec"><div class="sectitle">Hashmark rating</div>
    <div class="secsub">2026 preseason projection — higher is better. Amber marks the edge.</div>`;
  h+=cmpRow("Overall", oA, oB, cA, cB,
        `Hashmark Rating — ${ta.school} ${f3(oA)} (#${rkA}) vs ${tb.school} ${f3(oB)} (#${rkB}). The learned, results-aware blend the matchup is built on.`, true);
  h+=cmpRow("Offense", offA, offB, cA, cB,
        `Offense rating — ${ta.school} ${f3(offA)} vs ${tb.school} ${f3(offB)}. ${CMETA.off_eff.tip}`, true);
  h+=cmpRow("Defense", defA, defB, cA, cB,
        `Defense rating — ${ta.school} ${f3(defA)} vs ${tb.school} ${f3(defB)}. ${CMETA.def_eff.tip}`, true);
  h+=`</div>`;

  // component breakdown (what else drives the overall, beyond the unit ratings above)
  h+=`<div class="cmpsec"><div class="sectitle">What's driving the matchup</div>
    <div class="secsub">Each team's other rating factors, head-to-head. Tap a row for what it means.</div>`;
  CORDER.filter(k=>k!=="off_eff"&&k!=="def_eff").forEach(k=>{
    const m=CMETA[k], va=cvA[k]||0, vb=cvB[k]||0;
    h+=cmpRow(m.name, va, vb, cA, cB,
      `${m.name} — ${ta.school} ${f3(va)} vs ${tb.school} ${f3(vb)}. ${m.tip}`, false);
  });
  h+=`</div>`;

  // tiering: the single-game projection is the free hook; deeper sims stay premium
  h+=`<div class="cmpsec"><div class="sectitle">Go deeper</div>
    <div class="secsub">This single-game projection is <b style="color:var(--teal)">free</b>. Premium runs the full forward model.</div>`;
  h+=premCard("📅","Full-season simulation",
    `Simulate every game on both schedules for win totals, CFP odds & a projected head-to-head if they actually meet`,
    `<div class="fakebar" style="width:88%"></div><div class="fakebar" style="width:64%"></div><div class="fakebar" style="width:78%"></div>`);
  h+=premCard("💬","Ask Hashmark",`Ask anything about this matchup — tempo, injuries, how the edge could swing`,
    `<div class="fakebar" style="width:93%"></div><div class="fakebar" style="width:70%"></div>`);
  h+=`</div>`;

  h+=`<div class="note"><b>2026 Preseason — Hashmark projection.</b> A single-game projection from our way-too-early preseason ratings: projected margin = the teams' rating gap on a points scale plus the model's home-field value, and win probability is the normal-model share of outcomes above zero at the calibrated &sigma;=${ENGINE.sigma}. Early-offseason data is thin, so it leans on 2025 results and will sharpen through the summer. ${BRAND_LINE}</div></div>`;

  app.innerHTML = h;
  document.querySelector(".back").onclick = load;
  document.querySelectorAll(".venue button").forEach(btn=>{
    btn.onclick=()=>{ if(cmp.venue!==btn.dataset.venue){ cmp.venue=btn.dataset.venue; drawCompare(); } };
  });
  document.querySelectorAll(".pick").forEach(p=>{
    p.onclick=()=> openPicker(p.dataset.pick);
  });
}

function fmtStat(v, fmt){
  if(v==null||v==="") return "—"; v=Number(v);
  switch(fmt){
    case "int": return Math.round(v).toLocaleString();
    case "1dp": return v.toFixed(1);
    case "2dp": return v.toFixed(2);
    case "3dp": return v.toFixed(3);
    case "pct": return (v*100).toFixed(1)+"%";
    case "signed": return (v>0?"+":"")+Math.round(v);

    case "time": { const m=Math.floor(v/60), s=Math.round(v%60); return m+":"+String(s).padStart(2,"0"); }
    default: return v.toFixed(1);
  }
}

    });

  });
  // 2025 player splits (home vs away) — computed from the game log; clearly game-context only
  if(games.length){
    const acc={};   // cat -> {home:{}, away:{}}
    games.forEach(g=>{ const loc=g.home_away==="home"?"home":"away";
      const a=acc[g.category]=acc[g.category]||{home:{},away:{},hn:0,an:0};
      (GLOG_SHOW[g.category]||[]).forEach(([k])=>{ const v=parseFloat(String(g.stats&&g.stats[k]).replace(/[^0-9.\-]/g,""));
        if(!isNaN(v)) a[loc][k]=(a[loc][k]||0)+v; });
      if(loc==="home") a.hn++; else a.an++; });
    const cats=CAT_ORDER.filter(c=>acc[c]);
    if(cats.length){
      h+=`<div class="sec"><div class="sectitle">Splits — home / away</div>
        <div class="secsub">2025 totals by game location (game-context split). Source: CFBD.</div>
        <div class="splithead"><div></div><div>Home</div><div>Away</div></div>`;
      cats.forEach(c=>{ const a=acc[c];
        const line=(side)=>(GLOG_SHOW[c]||[]).map(([k,lb])=>a[side][k]!=null?`${Math.round(a[side][k])} ${lb}`:null).filter(Boolean).join(", ")||"—";
        h+=`<div class="splitrow"><div class="slk">${CAT_LABEL[c]||c}</div>
          <div class="slv off"><b style="color:var(--text)">${line("home")}</b></div>
          <div class="slv def"><b style="color:var(--text)">${line("away")}</b></div></div>`; });
      h+=`</div>`;
    }
  }
  // 2025 game log (merge categories per game)
  if(games.length){
    const byGame={};
    games.forEach(g=>{ const e=byGame[g.game_id]=byGame[g.game_id]||{week:g.week,st:g.season_type,opp:g.opponent_id,ha:g.home_away,cats:{}};
      e.cats[g.category]=g.stats; });
    const list=Object.entries(byGame).sort((a,b)=>(stOrder(a[1].st)-stOrder(b[1].st))||(a[1].week-b[1].week));
    h+=`<div class="sec"><div class="sectitle">2025 game log</div>
      <div class="secsub">Per-game stat lines. Tap a game for the full box score. Source: CFBD.</div>`;
    list.forEach(([gid,g])=>{
      const opp=teamMeta[g.opp]||{school:"opp"}, ha=g.ha==="home"?"vs":"at";
      let bits=[];
      CAT_ORDER.forEach(cat=>{ const st=g.cats[cat]; if(!st) return;
        const parts=(GLOG_SHOW[cat]||[]).map(([k,lb])=>st[k]!=null?`${st[k]} ${lb}`:null).filter(Boolean);
        if(parts.length) bits.push(parts.join(", ")); });
      h+=`<div class="glrow" data-box="${gid}" data-bteam="${idx.team_id}">
        ${crestEl("glcr",opp.school,oppColor(g.opp))}
        <div class="glopp"><div class="ha">${ha}${g.st==="postseason"?" · Bowl/CFP":` · Wk ${g.week}`}</div>
          <div class="on">${esc(opp.school)}</div></div>
        <div class="glsc" style="flex:1.4"><small>${bits.join(" · ")||"—"}</small></div>
        <div class="chev">›</div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="note"><b>Player stats — official.</b> Season totals and per-game lines from CFBD. The forward-looking "returning leaders" elsewhere show 2026-active players only; this player page is the complete record incl. departed players ("2025 final"). Names &amp; stats only — no photos. ${BRAND_LINE}</div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=load;
}

function statProfile(cat, statsRows, school){
  const cur={}, prior={};
  statsRows.forEach(r=>{ (Number(r.season)===STAT_SEASON?cur:prior)[r.stat_key]=r; });
  let h=`<div class="sec"><div class="sectitle">2025 stat profile</div>
    <div class="secsub">Official season stats with national rank + percentile. Tap a label for what it means. Source: CFBD.</div>`;
  let any=false;
  STAT_GROUPS.forEach(grp=>{
    const defs=(cat.groups[grp]||[]).filter(d=>cur[d.stat_key]);
    if(!defs.length) return;
    any=true;
    const sideTag = grp==="Defense"?`<span class="sd def">DEF</span>`:grp==="Offense"?`<span class="sd off">OFF</span>`:"";
    h+=`<div class="statgrp"><div class="sgtitle">${grp}${sideTag}</div>`;
    defs.forEach(d=>{
      const r=cur[d.stat_key], pct=Number(r.percentile), bkt=rankBucket(pct), val=fmtStat(r.value,d.format);
      const tip=`${esc(d.display_name)} — ${esc(d.description)} ${esc(school)}: ${val}, #${r.rank} nationally (${ordinal(Math.round(pct))} percentile, 2025).`;
      const pr=prior[d.stat_key];
      let dlt=`<div class="dlt"></div>`;
      if(pr){ const dv=Number(pr.rank)-Number(r.rank);
        dlt = dv ? `<div class="dlt ${dv>0?"up":"down"}" data-tip="2024 rank #${pr.rank} → 2025 #${r.rank}.">${dv>0?"▲":"▼"}${Math.abs(dv)}</div>` : `<div class="dlt">—</div>`; }
      h+=`<div class="statrow">
        <div class="snm" data-tip="${tip}">${esc(d.display_name)}</div>
        <div class="sval">${val}</div>
        <div class="srk r-${bkt}">#${r.rank}</div>
        <div class="statbar"><i class="bg-${bkt}" style="width:${Math.max(4,pct)}%"></i></div>
        ${dlt}</div>`;
    });
    h+=`</div>`;
  });
  return any ? h+`</div>` : "";
}
// category -> [label, noun (for the empty-state note), headline key, [secondary key, suffix]]
const LEADER_CATS=[
  ["passing","Passing","passer",["YDS","yds"],["TD","TD"]],
  ["rushing","Rushing","rusher",["YDS","yds"],["TD","TD"]],
  ["receiving","Receiving","receiver",["YDS","yds"],["REC","rec"]],
  ["defensive","Tackles","tackler",["TOT","tot"],["TFL","TFL"]],
];
function teamLeaders(players){
  const byCat={};
  players.forEach(p=>{ const c=byCat[p.category]=byCat[p.category]||{};
    const pl=c[p.player]=c[p.player]||{pos:p.position,stats:{}}; pl.stats[p.stat_key]=Number(p.value); });
  const lead=(cat,key)=>{ const c=byCat[cat]; if(!c) return null; let best=null;
    for(const nm in c){ const v=c[nm].stats[key]; if(v!=null&&(!best||v>best.v)) best={nm,v,pos:c[nm].pos,stats:c[nm].stats}; }
    return best; };
  let h=`<div class="sec"><div class="sectitle">Returning leaders</div>
    <div class="secsub">Top <b>returning</b> producers' <b>2025</b> stats — players active in 2026 only (NFL draftees &amp; graduated seniors excluded). Names &amp; stats only. Source: CFBD.</div>`;
  // Always render a row per category — show the best RETURNING player, or a note if none qualifies,
  // so a slot is never silently dropped when a team's top producer departed.
  LEADER_CATS.forEach(([cat,label,noun,a,b])=>{
    const p=lead(cat,a[0]);
    if(p){
      const av=p.stats[a[0]], bv=p.stats[b[0]];
      h+=`<div class="leadrow"><div class="lpos">${label}</div>
        <div class="lnm">${esc(p.nm)} <small>${esc(p.pos||"")}</small></div>
        <div class="lst">${Math.round(av).toLocaleString()}<small>${a[1]}${bv!=null?" · "+Math.round(bv)+" "+b[1]:""}</small></div></div>`;
    }else{
      h+=`<div class="leadrow"><div class="lpos">${label}</div>
        <div class="lnm"><span class="lnote">No returning ${noun} with qualifying 2025 snaps</span></div>
        <div class="lst"></div></div>`;
    }
  });
  return h+`</div>`;
}
function teamHonors(honors){
  const aa=honors.filter(h=>h.ranking_type==="all_american");
  const cons=aa.filter(h=>h.source==="Consensus");
  const single=aa.filter(h=>h.source!=="Consensus");
  const poll=honors.filter(h=>h.ranking_type==="preseason_poll");
  if(!aa.length && !poll.length) return "";
  const seen=new Set(); let h=`<div class="sec"><div class="sectitle">Around CFB — preseason 2026</div>
    <div class="secsub">Third-party preseason honors &amp; rankings, attributed to each outlet — <b>not</b> Hashmark ratings.</div>`;
  poll.forEach(x=>{ h+=`<div class="honor"><div class="hb">ATHLON</div>
    <div class="hn">Projected <b>#${x.rank}</b> in <a class="srcpill" href="${esc(x.source_url)}" target="_blank" rel="noopener">Athlon's 2026 preseason Top&nbsp;25</a></div></div>`; });
  const row=(x,badge)=>{ seen.add(normName(x.player));
    return `<div class="honor"><div class="hb">${badge}</div>
      <div class="hn">${esc(x.player)} <small>· ${esc(x.position||"")}</small></div>
      <div class="hpos">preseason AA</div></div>`; };
  cons.forEach(x=>{ h+=row(x,"CONSENSUS"); });
  single.forEach(x=>{ if(seen.has(normName(x.player))) return; h+=row(x, x.source==="ESPN"?"ESPN":"P. STEELE"); });
  return h+`</div>`;
}

      (byc[t.conference]=byc[t.conference]||[]).push(Number(r.value)); });
    const confs=Object.keys(byc).map(c=>({c,avg:mean(byc[c]),n:byc[c].length})).filter(x=>x.n>=4)
      .sort((a,b)=>d.higher_is_better?b.avg-a.avg:a.avg-b.avg);
    const mx=Math.max(...confs.map(x=>Math.abs(x.avg)),0.001);
    h+=`<div class="lbcard" style="margin-bottom:12px"><div class="lbhead"><div class="lt">${label}<small>avg ${esc(d.short_label)} · 2025 · conferences (≥4 FBS teams)</small></div></div>`;
    confs.forEach((x,i)=>h+=`<div class="cstrrow"><div class="ci">${i+1}</div>
      <div class="cn">${esc(shortConf(x.c))} <small>${x.n}</small></div>
      <div class="cbar"><i style="width:${Math.abs(x.avg)/mx*100}%;background:var(--amber)"></i></div>
      <div class="cvv">${fmtStat(x.avg,d.format)}</div></div>`);
    h+=`</div>`; });
  body.innerHTML=h;
}

// ---------- Part 6: the Preseason hub (attributed third-party lists) ----------
const POSGRP={QB:"QB",RB:"RB",WR:"WR / TE",TE:"WR / TE",OT:"Offensive line",G:"Offensive line",C:"Offensive line",
  OL:"Offensive line",EDGE:"Front seven",DT:"Front seven",DL:"Front seven",LB:"Front seven",
  CB:"Secondary",S:"Secondary",DB:"Secondary",ATH:"All-purpose",K:"Special teams",P:"Special teams",KR:"Special teams"};
async function openPreseason(){
  window.scrollTo(0,0); app.innerHTML=`<div class="loading">Loading preseason…</div>`;
  try{ await ensureTeamMeta();
    const rows=await api("external_rankings?select=*&season=eq.2026&order=ranking_type.asc,source.asc,rank.asc");
    renderPreseason(rows);
  }catch(e){ app.innerHTML=backHeader("Preseason")+`<div class="list"><div class="err">Couldn't load: ${e.message}</div></div>`;
    document.querySelector(".back").onclick=load; }
}
function renderPreseason(rows){
  const aa=rows.filter(r=>r.ranking_type==="all_american");
  const cons=aa.filter(r=>r.source==="Consensus");
  const espn=aa.filter(r=>r.source==="ESPN"), steele=aa.filter(r=>r.source==="Phil Steele");
  const poll=rows.filter(r=>r.ranking_type==="preseason_poll").sort((a,b)=>a.rank-b.rank);
  const asof=(rows.find(r=>r.as_of_date)||{}).as_of_date||"";
  const link=(src,url)=>url?`<a class="srcpill" href="${esc(url)}" target="_blank" rel="noopener"><b>${esc(src)}</b> ↗</a>`:`<span class="srcpill"><b>${esc(src)}</b></span>`;
  const teamTap=r=>r.team_id?` data-team="${r.team_id}"`:"";

  let h=`<div class="cmp">`+backHeader("Preseason")+`<div class="list" style="padding-top:6px">
    <div class="secsub" style="padding:0 2px 10px">Preseason 2026 — <b>third-party</b> selections &amp; projections, attributed and linked. <b>Not</b> Hashmark ratings. As of ${esc(asof)}.</div>`;

  // Consensus All-America team (grouped by position group)
  if(cons.length){
    h+=`<div class="sec"><div class="sectitle">Consensus All-Americans</div>
      <div class="secsub">Players named first-team by <b>2+ outlets</b> (${link("ESPN",espn[0]&&espn[0].source_url)} ${link("Phil Steele",steele[0]&&steele[0].source_url)}). Hashmark tally of their picks — not our rating.</div>`;
    const grp={}; cons.forEach(r=>{ const g=POSGRP[r.position]||"Other"; (grp[g]=grp[g]||[]).push(r); });
    Object.keys(grp).forEach(g=>{
      h+=`<div class="sgtitle" style="margin-top:10px">${g}</div><div class="aagrid">`;
      grp[g].forEach(r=>{ const t=teamMeta[r.team_id];
        h+=`<div class="aacell"${teamTap(r)}><div class="ap">${esc(r.position||"")}</div>
          <div class="anm">${esc(r.player)}<span class="scbadge sc-cons">2+</span></div>
          <div class="asc">${esc(t?t.school:r.school)}</div></div>`; });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  // By-source All-America teams
  const srcBlock=(label,list,url)=>{
    if(!list.length) return "";
    let b=`<div class="sec"><div class="sectitle">${label} — preseason All-America</div>
      <div class="secsub">First team, per ${link(label,url)}. Facts only (player · position · school).</div><div class="aagrid">`;
    list.forEach(r=>{ const t=teamMeta[r.team_id];
      b+=`<div class="aacell"${teamTap(r)}><div class="ap">${esc(r.position||"")}</div>
        <div class="anm">${esc(r.player)}</div><div class="asc">${esc(t?t.school:r.school)}</div></div>`; });
    return b+`</div></div>`;
  };
  h+=srcBlock("ESPN", espn, espn[0]&&espn[0].source_url);
  h+=srcBlock("Phil Steele", steele, steele[0]&&steele[0].source_url);

  // Preseason poll / projection
  h+=`<div class="sec"><div class="sectitle">Preseason Top 25</div>`;
  if(poll.length){
    h+=`<div class="secsub">${link(poll[0].source, poll[0].source_url)} media projection for 2026. The official <b>AP &amp; Coaches</b> preseason polls auto-appear here when released in August.</div>`;
    poll.forEach(r=>{ const t=teamMeta[r.team_id];
      h+=`<div class="t25row"${teamTap(r)}><div class="trk">${r.rank}</div>
        ${crestEl("schedcr",(t?t.school:r.school),t?hx(t.color):"#384455")}
        <div class="tnm">${esc(t?t.school:r.school)}</div></div>`; });
  } else {
    h+=`<div class="secsub">The official AP &amp; Coaches preseason Top 25 release in August — they'll appear here automatically (CFBD).</div>`;
  }
  h+=`</div>`;

  h+=`<div class="note"><b>Preseason 2026 — third-party.</b> All selections belong to the cited outlets and link to their source; Hashmark compiles a consensus only where 2+ agree and copies facts only, never their analysis. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=load;
}

// ---------- team search (jump to a team's stat page) ----------
let _searchTeams=null;
async function ensureSearchTeams(){
  if(_searchTeams) return _searchTeams;
  await ensureTeamMeta();
  _searchTeams=Object.entries(teamMeta).map(([id,t])=>({id,school:t.school,conference:t.conference,color:t.color}))
    .sort((a,b)=>a.school.localeCompare(b.school));
  return _searchTeams;
}
function wireSearch(){
  const inp=document.getElementById("teamsearch"); if(!inp) return;
  const res=document.getElementById("searchres");
  const run=async()=>{ const q=inp.value.trim().toLowerCase();
    if(!q){ res.style.display="none"; return; }
    const list=await ensureSearchTeams();
    const hits=list.filter(t=>t.school.toLowerCase().includes(q)).slice(0,8);
    res.innerHTML=hits.map(t=>`<div class="sropt" data-team="${t.id}">
      ${crestEl("src",t.school,hx(t.color))}<div class="snm">${esc(t.school)}</div>
      <div class="scf">${esc(t.conference||"")}</div></div>`).join("")||`<div class="sropt"><div class="snm" style="color:var(--text2)">No team found</div></div>`;
    res.style.display="block"; };
  inp.oninput=run; inp.onfocus=run;
}

const tipEl=document.createElement("div"); tipEl.className="tip"; document.body.appendChild(tipEl);
function showTip(el){ tipEl.textContent=el.getAttribute("data-tip"); tipEl.classList.add("show");
  const r=el.getBoundingClientRect(), tw=Math.min(264,window.innerWidth-20);
  const left=Math.min(Math.max(10,r.right-tw),window.innerWidth-tw-10);
  let top=r.top-tipEl.offsetHeight-8; if(top<8) top=r.bottom+8;
  tipEl.style.left=left+"px"; tipEl.style.top=top+"px"; }
const hideTip=()=>tipEl.classList.remove("show");
document.body.addEventListener("mouseover",e=>{const el=e.target.closest("[data-tip]");if(el)showTip(el);});
document.body.addEventListener("mouseout", e=>{const el=e.target.closest("[data-tip]");if(el)hideTip();});
document.body.addEventListener("click",    e=>{const el=e.target.closest("[data-tip]");if(el){showTip(el);e.stopPropagation();}else hideTip();});
// tap a ranking row (anywhere but its number/tooltip) -> open the team detail page
document.body.addEventListener("click", e=>{
  if(e.target.closest("[data-tip]")) return;
  // accounts (optional): account button, auth-modal actions, modal close
  const ax=e.target.closest("[data-authx]"); if(ax){ closeAuth(); return; }
  const au=e.target.closest("[data-auth]"); if(au){ authAction(au.dataset.auth); return; }
  const ac=e.target.closest("[data-acct]"); if(ac){ ac.dataset.acct==="signin"?openAuthModal():openAccountMenu(); return; }
  const pl=e.target.closest("[data-player]");
  if(pl && pl.dataset.player && pl.dataset.player!=="undefined"){ openPlayer(pl.dataset.player); return; }
  const box=e.target.closest("[data-box]");
  if(box && box.dataset.box && box.dataset.box!=="undefined"){ openBox(box.dataset.box, box.dataset.bteam); return; }
  const row=e.target.closest("[data-team]");
  if(row && row.dataset.team && row.dataset.team!=="undefined") openDetail(row.dataset.team);
});

initAuth();
load();
</script>

<script>
// PWA service worker — caches the app shell for offline + instant repeat loads. Registered
// from a relative path so it scopes correctly under the GitHub Pages project subpath. Live
// Supabase data is always fetched fresh (the SW only handles same-origin shell requests).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
