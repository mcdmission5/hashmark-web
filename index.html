<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hashmark — College Football Stats & Analytics</title>
<meta name="description" content="Hashmark — deep, official college-football stats &amp; analytics for every FBS team and across the sport: team stat profiles with national ranks, league-wide leaderboards, player leaders, and preseason rankings. Independent and gambling-free." />
<!-- PWA: installable as a full-screen app on iOS/Android. Relative paths so it works under the GitHub Pages project subpath. -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b1120" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hashmark" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* PRIMETIME (games-ux sprint, decided): deep navy under-the-lights base, gold primary,
     teal accent. Semantics unchanged: amber=user, teal=Model, green/red=stat good/bad.
     Team badges stay TRUE team colors (broadcast treatment) — inline styles, untouched. */
  :root{
    --bg:#0b1120; --surface:#131C31; --surface2:#182342; --line:rgba(255,255,255,.07);
    --line2:rgba(255,255,255,.12); --tabbar:#0C1326;
    --text:#EAF0FB; --text2:#7F92B0; --text3:#5A6C8C; --legal:#41506B;
    --amber:#FFBE3D; --amber-tint:rgba(255,190,61,.13);
    --teal:#31E0C8; --teal-tint:rgba(49,224,200,.12);
    --live:#FF5C5C; --loss:#E05B5B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Barlow",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto;min-height:100vh;
    background:radial-gradient(120% 60% at 50% -8%, #16203a, #0b1120 46%, #080c16);
    border-left:1px solid var(--line);border-right:1px solid var(--line)}
  header{position:sticky;top:0;z-index:5;padding:18px 18px 0;
    background:rgba(11,17,32,.9);backdrop-filter:blur(10px)}
  .wordmark{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px}
  .wordmark .dot{color:var(--amber)}
  /* season toggle */
  .toggle{display:flex;gap:6px;margin:14px 0 10px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:4px}
  .toggle button{flex:1;background:transparent;border:0;color:var(--text2);
    font-family:"Barlow";font-weight:700;font-size:13px;padding:9px 6px;
    border-radius:9px;cursor:pointer;line-height:1.2}
  .toggle button small{display:block;font-weight:500;font-size:10px;opacity:.8;margin-top:2px}
  .toggle button.on{background:linear-gradient(150deg,#ffc44d,#ff9e2e);color:#3a2400;
    box-shadow:0 4px 14px rgba(255,158,46,.28)}
  .toggle button.on small{opacity:.75}
  .subtitle{color:var(--text2);font-size:12.5px;margin:2px 0 12px}
  .subtitle b{color:var(--text);font-weight:600}
  .fdline{height:2px;background:var(--amber);box-shadow:0 0 12px rgba(246,180,60,.5);border-radius:2px}
  .list{padding:6px 12px 90px}
  .row{display:flex;align-items:center;gap:12px;padding:12px 8px;border-bottom:1px solid var(--line)}
  .rank{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:15px;
    color:var(--text2);width:26px;text-align:right;flex:none}
  .row.top .rank{color:var(--amber)}
  .crest{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;
    font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:13px;letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 -8px 14px rgba(0,0,0,.28)}
  .meta{flex:1;min-width:0}
  .team{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conf{color:var(--text2);font-size:12px;margin-top:2px}
  .rating{text-align:right;flex:none}
  .rval{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:17px;
    border-bottom:2px solid var(--amber);padding-bottom:1px}
  .rlbl{color:var(--text2);font-size:10px;letter-spacing:.4px;margin-top:3px;text-transform:uppercase}
  .splits{display:flex;gap:8px;justify-content:flex-end;margin-top:5px}
  .chip{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text2)}
  .chip b{color:var(--teal);font-weight:700}
  .chip.d b{color:#7CA8FF}
  .note{color:var(--text2);font-size:11px;line-height:1.5;padding:16px 20px 30px;border-top:1px solid var(--line)}
  .loading,.err{color:var(--text2);text-align:center;padding:50px 20px;font-family:"IBM Plex Mono",monospace;font-size:13px}
  .err{color:#E5705C}
  [data-tip]{cursor:help}
  .tip{position:fixed;z-index:60;max-width:264px;background:var(--surface2);
    border:1px solid var(--amber);color:var(--text);font-size:12.5px;line-height:1.5;
    padding:11px 13px;border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.55);
    pointer-events:none;opacity:0;transform:translateY(5px);transition:opacity .12s,transform .12s}
  .tip.show{opacity:1;transform:translateY(0)}
  .hint{color:var(--text2);font-size:11px;text-align:center;padding:10px 0 2px}
  .row{cursor:pointer}
  .chev{color:var(--text2);font-size:20px;flex:none;width:10px;text-align:center;opacity:.7}
  /* ---- team detail page ---- */
  .detail{padding:0 0 96px}
  .dtop{display:flex;align-items:center;gap:12px;padding:14px 16px 4px;position:sticky;top:0;z-index:5;
    background:rgba(11,15,20,.92);backdrop-filter:blur(10px)}
  .back{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:10px;
    width:38px;height:38px;font-size:20px;cursor:pointer;flex:none;display:grid;place-items:center;line-height:1}
  .dtop .wordmark{font-size:20px}
  .dhead{display:flex;align-items:center;gap:14px;padding:8px 18px 4px}
  .dcrest{width:60px;height:60px;border-radius:16px;flex:none;display:grid;place-items:center;
    font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:19px;letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 -10px 18px rgba(0,0,0,.3)}
  .dschool{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:23px;letter-spacing:-.3px;line-height:1.1}
  .dconf{color:var(--text2);font-size:13px;margin-top:4px}
  .dconf .rk{color:var(--amber);font-weight:700}
  .drating{text-align:center;padding:10px 18px 18px}
  .drk{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:20px;color:var(--amber);margin-top:8px}
  .drk small{color:var(--text3);font-weight:600;font-size:11px}
  .dunits{display:flex;gap:14px;justify-content:center;margin-top:6px;font-family:"IBM Plex Mono",monospace;font-size:12.5px}
  .dunits span{cursor:help}
  .dunits span:first-child{color:var(--teal)} .dunits span:last-child{color:#7CA8FF}
  .dbig{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:46px;line-height:1;
    border-bottom:3px solid var(--amber);display:inline-block;padding-bottom:5px}
  .dlbl{color:var(--text2);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-top:9px}
  .od{display:flex;gap:12px;padding:6px 18px 14px}
  .odcard{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;text-align:center}
  .odk{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--text2)}
  .odv{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:22px;margin-top:4px}
  .odcard.o .odv{color:var(--teal)} .odcard.d .odv{color:#7CA8FF}
  .sec{padding:4px 18px}
  .sectitle{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:15px;margin:16px 0 2px}
  .secsub{color:var(--text2);font-size:11.5px;margin-bottom:8px;line-height:1.5}
  .driver{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .dvk{width:84px;flex:none;font-weight:600;font-size:13px}
  .dvbar{flex:1;height:9px;background:var(--surface2);border-radius:6px;position:relative}
  .dvbar i{position:absolute;top:0;bottom:0;border-radius:6px}
  .dvbar i.pos{background:var(--amber)} .dvbar i.neg{background:#5C6B7A}
  .dvbar .mid{position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:var(--line)}
  .dvv{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:13px;width:54px;text-align:right;flex:none}
  .ctx{display:flex;align-items:center;justify-content:space-between;gap:6px;margin:4px 0;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 10px}
  .ctxcol{text-align:center;flex:1}
  .ctxcol .y{color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .ctxcol .v{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:17px;margin-top:4px}
  .ctxcol .vs{font-size:11px;color:var(--text2);font-weight:500;margin-top:2px}
  .ctxarrow{color:var(--amber);font-size:22px;flex:none}
  .prem{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:11px;overflow:hidden}
  .prem .ptitle{font-weight:700;font-size:13.5px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .prem .ptitle .ic{opacity:.85}
  .prem .blur{filter:blur(5px);opacity:.45;pointer-events:none;user-select:none}
  .prem .fakebar{height:9px;background:var(--surface2);border-radius:6px;margin:8px 0}
  .prem .lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:5px;background:linear-gradient(180deg,rgba(20,26,34,.15),rgba(20,26,34,.78))}
  .lockbadge{background:var(--amber);color:#10130c;font-weight:700;font-size:10.5px;
    padding:3px 10px;border-radius:20px;letter-spacing:.5px}
  .lock .lt{font-size:12.5px;color:var(--text);font-weight:600;text-align:center;padding:0 20px}
  /* ---- leaderboards (overall / offense / defense + conference) ---- */
  .bnav{display:flex;gap:6px;margin:0 0 9px;background:var(--surface);
    border:1px solid var(--line);border-radius:11px;padding:4px}
  .bnav button{flex:1;background:transparent;border:0;color:var(--text2);
    font-family:"Barlow";font-weight:700;font-size:12.5px;padding:8px 4px;
    border-radius:8px;cursor:pointer;line-height:1.1}
  .bnav button.on{background:var(--surface2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}
  .bnav button.on.off{color:var(--teal)} .bnav button.on.def{color:#7CA8FF}
  .confbar{display:flex;gap:7px;overflow-x:auto;padding:1px 0 10px;scrollbar-width:none}
  .confbar::-webkit-scrollbar{display:none}
  .confpill{flex:none;background:var(--surface);border:1px solid var(--line);color:var(--text2);
    font-family:"Barlow";font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;
    cursor:pointer;white-space:nowrap}
  .confpill.on{background:var(--amber);color:#10130c;border-color:var(--amber)}
  .cstr{margin:2px 0 4px}
  .cstrtitle{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:12.5px;color:var(--text2);
    text-transform:uppercase;letter-spacing:.4px;margin:2px 2px 6px}
  .cstrrow{display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .cstrrow .ci{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:12px;color:var(--text2);width:18px;text-align:right;flex:none}
  .cstrrow .cn{flex:none;width:108px;font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cstrrow .cn small{color:var(--text2);font-weight:500;font-size:10px}
  .cstrrow .cbar{flex:1;height:8px;background:var(--surface2);border-radius:5px;position:relative;overflow:hidden}
  .cstrrow .cbar i{position:absolute;top:0;bottom:0;border-radius:5px}
  .cstrrow .cbar i.neg{background:#5C6B7A;opacity:.8}
  .cstrrow .cvv{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:12px;width:54px;text-align:right;flex:none}
  .csum{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 15px;margin:0 0 8px}
  .csum .ch{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .csum .cnm{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:18px;line-height:1.1}
  .csum .crk{color:var(--amber);font-weight:700;font-size:12px;flex:none}
  .csum .cv{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:16px;margin-top:7px}
  .csum .csub{color:var(--text2);font-size:11.5px;margin-top:2px;line-height:1.4}
  /* ---- compare affordances (rankings + team detail) ---- */
  .cmpcta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--surface);border:1px solid var(--amber);color:var(--amber);
    font-family:"Barlow";font-weight:700;font-size:13px;padding:11px;border-radius:12px;
    cursor:pointer;margin:0 0 8px}
  .cmpcta .ar{font-size:15px;line-height:1}
  .cmpcta:hover{background:rgba(246,180,60,.08)}
  /* ---- compare screen ---- */
  .cmp{padding:0 0 96px}
  .cmptop{display:flex;align-items:center;gap:12px;padding:14px 16px 4px;position:sticky;top:0;z-index:5;
    background:rgba(11,15,20,.92);backdrop-filter:blur(10px)}
  .cmptop .wordmark{font-size:20px}
  .cmptag{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:13px;color:var(--text2);
    margin-left:auto;letter-spacing:.4px;text-transform:uppercase}
  /* team pickers */
  .pickrow{display:flex;align-items:stretch;gap:9px;padding:12px 14px 4px}
  .pick{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:13px 8px 11px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;text-align:center}
  .pick:hover{border-color:var(--amber)}
  .pick .pcrest{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;
    font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:16px;letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 -9px 15px rgba(0,0,0,.28)}
  .pick .pname{font-weight:700;font-size:14.5px;line-height:1.15;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .pick .pconf{color:var(--text2);font-size:11px}
  .pick .pchg{color:var(--amber);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    border:1px solid var(--line);border-radius:20px;padding:2px 9px;margin-top:1px}
  .pickvs{align-self:center;font-family:"Barlow Condensed",sans-serif;font-weight:800;color:var(--text2);font-size:13px;flex:none}
  /* venue toggle (reuses .toggle) */
  .venue{margin:6px 14px 2px}
  .venuesub{text-align:center;color:var(--text2);font-size:11.5px;margin:3px 0 4px;line-height:1.4}
  .venuesub b{color:var(--text);font-weight:600}
  /* headline */
  .headcard{margin:9px 14px 4px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 15px 14px}
  .hl{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:19px;line-height:1.25;text-align:center}
  .hl .by{color:var(--amber)}
  .hlsub{text-align:center;color:var(--text2);font-size:12px;margin-top:5px}
  .hlsub b{color:var(--text)}
  .wpbar{display:flex;height:30px;border-radius:9px;overflow:hidden;margin-top:13px;border:1px solid var(--line)}
  .wpbar .seg{display:flex;align-items:center;font-family:"IBM Plex Mono",monospace;font-weight:700;
    font-size:12.5px;padding:0 10px;min-width:0;overflow:hidden;white-space:nowrap}
  .wpbar .seg.b{justify-content:flex-end}
  .wplbl{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--text2)}
  .wplbl b{color:var(--text);font-weight:600}
  /* compare rows (ratings + components) */
  .cmpsec{padding:4px 16px}
  .cmprow{padding:10px 2px;border-bottom:1px solid var(--line)}
  .cmpk{text-align:center;font-size:11px;color:var(--text2);font-weight:700;margin-bottom:7px;
    text-transform:uppercase;letter-spacing:.5px}
  .cmpgrid{display:grid;grid-template-columns:54px 1fr 1fr 54px;align-items:center;gap:6px}
  .cmpval{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:12.5px;color:var(--text2);letter-spacing:-.4px}
  .cmpval.a{text-align:right} .cmpval.b{text-align:left}
  .cmpval.win{color:var(--amber)}
  .cmptrk{height:10px;background:var(--surface2);border-radius:6px;position:relative;overflow:hidden}
  .cmptrk i{position:absolute;top:0;bottom:0;border-radius:6px}
  .cmptrk.l i{right:0} .cmptrk.r i{left:0}
  .cmptrk i.neg{background:#5C6B7A !important;opacity:.7}
  .cmprow.big .cmpk{font-size:12.5px;color:var(--text);font-family:"Barlow Condensed",sans-serif}
  .cmprow.big .cmpval{font-size:14.5px}
  .cmprow.big .cmptrk{height:12px}
  /* team-picker overlay */
  .pickov{position:fixed;inset:0;z-index:80;background:rgba(8,11,15,.74);
    backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
  .picksheet{width:100%;max-width:460px;max-height:84vh;background:var(--surface);
    border:1px solid var(--line);border-bottom:0;border-radius:18px 18px 0 0;
    display:flex;flex-direction:column;overflow:hidden}
  .pickhd{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--line)}
  .picksearch{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-family:"Barlow";font-size:14px;padding:11px 12px;outline:none}
  .picksearch:focus{border-color:var(--amber)}
  .pickx{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:10px;
    width:42px;font-size:15px;cursor:pointer;flex:none}
  .picklist{overflow:auto;padding:4px 8px 20px}
  .pitem{display:flex;align-items:center;gap:11px;padding:9px 8px;border-bottom:1px solid var(--line);
    cursor:pointer;border-radius:8px}
  .pitem:hover{background:var(--surface2)}
  .pitem.dis{opacity:.32;pointer-events:none}
  .pitem .prk{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:12px;
    color:var(--text2);width:24px;text-align:right;flex:none}
  .pitem .pcr{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;
    font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:11px;letter-spacing:.2px;border:1px solid rgba(255,255,255,.14)}
  .pitem .pnm{font-weight:600;font-size:14px}
  .pitem .pcf{color:var(--text2);font-size:11px;margin-top:1px}
  .pitem .pov{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:13px;color:var(--text2)}
  /* ---- preview mode (Hashmark ratings hidden) ---- */
  .previewbar{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;font-size:12px;color:var(--text2);line-height:1.5;margin:0 0 8px}
  .previewbar b{color:var(--text);font-weight:600}
  .pb-badge{display:inline-block;background:var(--amber);color:#10130c;font-weight:700;font-size:9.5px;
    letter-spacing:.5px;padding:2px 7px;border-radius:20px;margin-right:7px;vertical-align:1px}
  .soon{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 26px 30px}
  .soonmark{width:84px;height:84px;border-radius:22px;display:grid;place-items:center;
    background:linear-gradient(160deg,#1b2430,#141a22);border:1px solid var(--line);
    box-shadow:inset 0 -10px 22px rgba(0,0,0,.35);margin-bottom:18px}
  .soonmark span{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:34px;color:var(--amber)}
  .soonmark span .dot{color:var(--amber)}
  .soonbadge{background:rgba(246,180,60,.14);color:var(--amber);border:1px solid rgba(246,180,60,.4);
    font-weight:700;font-size:10px;letter-spacing:.6px;padding:4px 11px;border-radius:20px;margin-bottom:13px}
  .soontitle{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:22px;letter-spacing:-.3px;line-height:1.2}

  /* ============ v2 DESIGN LAYER (redesign brief) ============ */
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-.12em}

  body{padding-bottom:76px}
  .wrap{max-width:460px}
  h1,h2,.wordmark,.screen-title{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.02em}

  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:center;

  .pbar .tick{position:absolute;top:-2px;bottom:-2px;width:2px;background:rgba(255,255,255,.4)}
  .pbar.teal .fill{background:linear-gradient(90deg,#0F8E7E,#35D9C4)}
  .plabel{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:5px}
  .plabel b{color:var(--text);font-family:"IBM Plex Mono",monospace}

  .dotstrip{display:flex;gap:5px;align-items:center;flex-wrap:wrap}

  .dial{--p:50;--dc:var(--amber);width:44px;height:44px;border-radius:50%;position:relative;flex:none;

    font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:700;z-index:1}
  /* pills + chips */
  .chip-model{display:inline-flex;align-items:center;gap:4px;font-family:"IBM Plex Mono",monospace;
    font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--teal);background:var(--teal-tint);
    border:1px solid rgba(53,217,196,.35);border-radius:999px;padding:2px 7px;text-transform:uppercase}
  .chip-live{display:inline-flex;align-items:center;gap:5px;font-family:"IBM Plex Mono",monospace;

  .sect-h .ctx{font-family:"IBM Plex Mono",monospace;font-weight:400;letter-spacing:.06em;margin-left:6px}
  /* omnibox */
  .omni{position:fixed;inset:0;z-index:80;background:rgba(11,15,20,.94);display:none;flex-direction:column;padding:14px}
  .omni.show{display:flex;animation:hmRise .25s ease}
  .omni input{background:var(--surface2);border:1px solid var(--line2);border-radius:12px;color:var(--text);
    font-family:"Barlow",sans-serif;font-size:16px;padding:13px 14px;width:100%;outline:none}
  .omni .results{overflow-y:auto;margin-top:10px}
  .omni .r-row{display:flex;align-items:center;gap:10px;min-height:44px;padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer}
  /* explore grid */
  .xgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .xcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;min-height:44px}
  .xcard .ic{width:18px;height:18px;color:var(--amber)}
  .xcard.dashed{border-style:dashed;border-color:var(--line2);color:var(--text2)}
  .xcard h4{margin:7px 0 3px;font-size:13px}
  .xcard p{margin:0;font-size:11px;color:var(--text2)}
  /* movers */
  .mv-up{color:var(--teal)} .mv-dn{color:var(--loss)}
  /* animations */
  @keyframes hmPulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes hmRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    *,*::before,*::after{animation:none!important;transition:none!important}}

  /* PRIMETIME finishing layer: card gradients + restrained glow (lighting, not neon) */
  .sec,.card,.lbcard,.scgame,.recordcard,.xcard{background:linear-gradient(165deg,#151f36,#101828)}
  .recbig,.dbig{color:var(--amber);text-shadow:0 0 18px rgba(255,190,61,.45)}
  .mwprow .mwppct.win{color:#6DF2D8;text-shadow:0 0 16px rgba(49,224,200,.4)}

        ?"That code didn't match or expired — send a fresh one.":error.message);
      closeAuth(); return; }
    if(kind==="pwtoggle"){ const p=document.getElementById("pwstep");
      if(p) p.style.display = p.style.display==="none"?"block":"none"; return; }
    if(kind==="password"){ if(!email||!pw) return authMsg("Enter your email and password.");
      const {error}=await sb.auth.signInWithPassword({email,password:pw,options:{...captchaOpts()}});
      resetTurnstile(); if(error) return authMsg(error.message); closeAuth(); return; }
    if(kind==="reset"){ if(!email) return authMsg("Enter your email to reset your password.");
      const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:getRedirectTarget(), ...captchaOpts()});
      resetTurnstile();
      authMsg(error?error.message:"Password-reset email sent.", !error); return; }
    if(kind==="signout"){ await sb.auth.signOut(); closeAuth(); return; }
    if(kind==="favpick"){ closeAuth(); await ensureTeamMeta(); teamPicker(null, id=>setFavoriteTeam(id)); return; }
    if(kind==="notifyprefs"){ closeAuth(); openNotifyPrefs(); return; }
  }catch(e){ authMsg(e.message||"Something went wrong — try again."); }
}

    authProfile = authProfile || {id:authUser.id};

const GAME_SEL = "id,season,week,season_type,start_date,home_team_id,away_team_id,home_team,away_team,home_points,away_points,neutral_site,completed,network,start_time_tbd";
// G2: "Sat Sep 5 · 7:30 PM ET · ESPN" — date always; time only when known (start_time_tbd ->
// "Time TBD"); network chip only when present (never render null). Completed games: date only.
function gameTimeLine(g){
  if(!g.start_date) return "";
  const d=new Date(g.start_date);
  const day=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:"America/New_York"});
  if(g.completed) return day;
  const time=g.start_time_tbd?"Time TBD"
    :d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York"})+" ET";
  return `${day} · ${time}${g.network?` · ${g.network}`:""}`;
}
let teamMeta = null;        // {id: {school, color, conference}}
const scoresCache = {};     // season -> [games]
async function ensureTeamMeta(){
  if(teamMeta) return teamMeta;
  teamMeta = {};
  (await api("teams?select=id,school,color,alt_color,conference")).forEach(t=>teamMeta[t.id]=t);
  return teamMeta;
}
const fetchTeamSeason = async id =>
  (await api(`team_season?select=*&season=eq.${SEASON_RESULTS}&team_id=eq.${id}`))[0]||null;
const fetchTeamGames = async id =>
  api(`games?select=${GAME_SEL}&or=(home_team_id.eq.${id},away_team_id.eq.${id})&order=season.asc,week.asc`);
async function fetchSeasonGames(season){
  if(!scoresCache[season]) scoresCache[season] = await api(`games?select=${GAME_SEL}&season=eq.${season}&order=week.asc&limit=2000`);
  return scoresCache[season];
}
const stOrder = st => st==="postseason" ? 100 : 0;   // regular weeks before bowls/CFP
const oppColor = id => (teamMeta&&teamMeta[id]) ? hx(teamMeta[id].color) : "#384455";

function gameView(g, teamId){
  const home = String(g.home_team_id)===String(teamId);
  const ms = home?g.home_points:g.away_points, os = home?g.away_points:g.home_points;
  const done = g.completed && ms!=null && os!=null;
  return {home, oppName:(home?g.away_team:g.home_team), oppId:(home?g.away_team_id:g.home_team_id),
    ms, os, done, won:done&&ms>os, neutral:g.neutral_site, week:g.week, bowl:g.season_type==="postseason"};
}
function crestEl(cls, name, color){
  return `<div class="${cls}" style="background:${color};color:${textOn(color)}">${monogram(name||"?")}</div>`;
}
function schedRow(g, teamId){
  const v = gameView(g, teamId);
  const ha = v.neutral?"Neutral":(v.home?"vs":"at");
  const res = v.done ? `<div class="schedres ${v.won?"w":"l"}">${v.won?"W":"L"}</div>`
                     : `<div class="schedres wk">${v.bowl?"PS":("W"+v.week)}</div>`;
  const score = v.done ? `<div class="schedsc"><b>${v.ms}</b>–${v.os}</div>`
                       : `<div class="schedsc"><span class="up">${v.home?"home":v.neutral?"neutral":"away"}</span></div>`;
  const tap = v.oppId?` data-team="${v.oppId}"`:"";
  return `<div class="schedrow${v.bowl?" bowl":""}"${tap}>${res}
    ${crestEl("schedcr", v.oppName, oppColor(v.oppId))}
    <div class="schedopp"><div class="ha">${ha}${v.bowl?" · Bowl / CFP":""}${!v.done&&gameTimeLine(g)?` · ${esc(gameTimeLine(g))}`:""}</div><div class="on">${esc(v.oppName||"TBD")}</div></div>
    ${score}</div>`;
}
function recordCard(ts, ap){
  if(!ts) return "";
  const apTxt = (ap&&ap.rank) ? `<span class="ap">#${ap.rank} AP</span> · `
              : (ts.ap_rank ? `<span class="ap">#${ts.ap_rank} AP</span> · ` : "");
  const conf = ts.conf_wins!=null ? `${esc(ts.conference||"")} ${ts.conf_wins}–${ts.conf_losses}` : esc(ts.conference||"");
  const stats = ts.ppg_for!=null ? `<div class="recstats">
      <div class="recstat"><div class="rk">PPG For</div><div class="rv">${ts.ppg_for}</div></div>
      <div class="recstat"><div class="rk">PPG Allowed</div><div class="rv">${ts.ppg_against}</div></div>
      <div class="recstat"><div class="rk">Games</div><div class="rv">${ts.games_played}</div></div></div>` : "";
  return `<div class="recordcard">
    <div class="recline"><div class="recbig">${ts.wins}–${ts.losses}</div>
      <div class="recctx">${apTxt}<b>2025</b> · ${conf}</div></div>${stats}</div>`;
}
function scheduleSection(games, teamId, which="both", sosRank=null){
  const sort = a => a.slice().sort((x,y)=>(stOrder(x.season_type)-stOrder(y.season_type))||(x.week-y.week));
  const r25 = sort(games.filter(g=>g.season===SEASON_RESULTS));
  const r26 = sort(games.filter(g=>g.season===SEASON_SCHED));
  let h = "";
  if(r25.length && which!=="sched"){ h+=`<div class="sec"><div class="sectitle">${SEASON_RESULTS} results</div>
    <div class="secsub">Final scores — official. Tap an opponent to open it.</div>`;
    r25.forEach(g=>h+=schedRow(g,teamId)); h+=`</div>`; }
  if(r26.length && which!=="results"){ h+=`<div class="sec" id="tp-sched"><div class="sectitle">${SEASON_SCHED} schedule${sosRank?` · SoS #${sosRank}`:""}</div>
    <div class="secsub">Upcoming opponents — official schedule, dates &amp; TV as they're set${sosRank?`. Schedule strength ranks #${sosRank} of 138 (preseason)`:""}.</div>`;
    r26.forEach(g=>h+=schedRow(g,teamId)); h+=`</div>`; }
  return h;
}

let scoresSeason = SEASON_SCHED, scoresWeek = null;   // G1: Games opens on the season ahead
function scGameRow(g){
  const done = g.completed && g.home_points!=null && g.away_points!=null;
  const hw = done && g.home_points>g.away_points, aw = done && g.away_points>g.home_points;
  const meta = g.neutral_site ? "Neutral site" : "";
  const when = gameTimeLine(g);
  const teamLine = (name,id,score,win)=>`<div class="scteam${win?" win":""}"${id?` data-team="${id}"`:""}>
      ${crestEl("scc", name, oppColor(id))}<div class="nm">${esc(name||"TBD")}</div>
      <div class="pts">${done?score:""}</div></div>`;
  const boxLink = (done && g.id) ? `<div class="scbox" data-box="${g.id}" data-bteam="${g.home_team_id}">Box score ›</div>` : "";
  return `<div class="scgame">
    ${when||meta?`<div class="gm"><span>${esc(when)}</span><span>${meta}</span></div>`:""}
    ${teamLine(g.away_team, g.away_team_id, g.away_points, aw)}
    ${done?"":`<div class="scvs">${g.neutral_site?"vs":"at"}</div>`}
    ${teamLine(g.home_team, g.home_team_id, g.home_points, hw)}
    ${boxLink}</div>`;
}
async function openScores(){
  window.scrollTo(0,0);
  app.innerHTML = `<div class="loading">Loading scores…</div>`;
  try{ await ensureTeamMeta(); scoresWeek=null; await drawScores(); }
  catch(e){ app.innerHTML = `<div class="cmptop"><button class="back"><svg class="ic" aria-hidden="true"><use href="#i-chev-l"/></svg></button>
    <div class="wordmark">Hashmark<span class="dot">.</span></div></div>
    <div class="err">Couldn't load scores: ${e.message}</div>`; document.querySelector(".back").onclick=load; }
}
async function drawScores(){
  const games = await fetchSeasonGames(scoresSeason);
  const regWeeks = [...new Set(games.filter(g=>g.season_type!=="postseason").map(g=>g.week))].sort((a,b)=>a-b);
  const hasPost = games.some(g=>g.season_type==="postseason");
  const keys = regWeeks.map(w=>({key:"R"+w, label:""+w, f:g=>g.season_type!=="postseason"&&g.week===w}))
    .concat(hasPost?[{key:"PS", label:"Bowls / CFP", f:g=>g.season_type==="postseason"}]:[]);
  if(!scoresWeek || !keys.find(k=>k.key===scoresWeek)){
    // land on the current/upcoming week once the season starts; Week 1 before kickoff
    const cutoff = Date.now() - 36*36e5;   // a game that kicked off <36h ago still counts as "this week"
    const upcoming = keys.find(k=>games.some(g=>k.f(g) && !g.completed && g.start_date && new Date(g.start_date).getTime()>=cutoff));
    scoresWeek = (upcoming || keys[0] || {}).key || null;
  }
  const active = keys.find(k=>k.key===scoresWeek);
  const list = (active?games.filter(active.f):[]).slice()
    .sort((a,b)=>(a.start_date||"").localeCompare(b.start_date||""));

  let h = `<div class="cmp">
    <div class="cmptop"><button class="back"><svg class="ic" aria-hidden="true"><use href="#i-chev-l"/></svg></button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div>
      <div class="cmptag">Scores</div></div>
    <div class="venue"><div class="toggle">
      <button data-ss="${SEASON_SCHED}" class="${scoresSeason===SEASON_SCHED?"on":""}">${SEASON_SCHED}<small>Schedule</small></button>
      <button data-ss="${SEASON_RESULTS}" class="${scoresSeason===SEASON_RESULTS?"on":""}">${SEASON_RESULTS}<small>Final scores</small></button>
    </div></div>
    <div class="list" style="padding-top:4px">
    <div class="confbar">`;
  keys.forEach(k=>{ h+=`<button class="confpill ${scoresWeek===k.key?"on":""}" data-wk="${k.key}">${k.label}</button>`; });
  h += `</div>
    <div class="secsub" style="padding:0 2px 4px">${scoresSeason===SEASON_RESULTS
      ? "Official final scores — winner marked. Tap a team to open it."
      : "Official 2026 schedule — dates, kickoff times &amp; TV shown as they're announced. Tap a team to open it."}</div>`;
  list.forEach(g=>h+=scGameRow(g));
  if(!list.length) h+=`<div class="loading" style="padding:30px">No games.</div>`;
  h += `<div class="note"><b>Official ${scoresSeason} ${scoresSeason===SEASON_RESULTS?"results":"schedule"}.</b> Source: CFBD game data. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML = h;
  document.querySelector(".back").onclick = load;
  document.querySelectorAll("[data-ss]").forEach(b=>b.onclick=()=>{ const s=+b.dataset.ss;
    if(s!==scoresSeason){ scoresSeason=s; scoresWeek=null; drawScores(); window.scrollTo(0,0); } });
  document.querySelectorAll("[data-wk]").forEach(b=>b.onclick=()=>{ if(b.dataset.wk!==scoresWeek){
    scoresWeek=b.dataset.wk; drawScores(); window.scrollTo(0,0); } });
}

// The 5 required methodology elements (research: scale anchors; inputs; adjustments incl.
// explicit garbage-time policy; admitted limitations in plain language; update cadence).
function openMethodology(){
  // B3: methodology/transparency pages render regardless of SHOW_HASHMARK_RATINGS — the copy is
  // generic (no hidden-rating reveal) and every visible entry point must land somewhere real.
  window.scrollTo(0,0);
  app.innerHTML = `<div class="cmp">${backHeader("How our ratings work")}<div class="list" style="padding-top:6px">
    <div class="sec"><div class="sectitle">The scale</div><div class="secsub">
      Every grade runs 0–100 with <b>50 = FBS average</b> among qualified players/units that season.
      Tiers: <b>90+</b> elite · <b>70s</b> starter-quality · <b>50s</b> average. A percentile within
      position is shown next to each grade. A season grade is computed from every play at once —
      it is <b>not</b> the average of weekly grades.</div></div>
    <div class="sec"><div class="sectitle">What goes in</div><div class="secsub">
      Play-by-play expected-points value (EPA) for 2014–present, official box scores, rosters and
      schedules. Team ratings add opponent-adjusted efficiency, results, returning production,
      transfers, coaching and special teams. Player grades use only plays attributed to that player
      in the public data.</div></div>
    <div class="sec"><div class="sectitle">Adjustments</div><div class="secsub">
      <b>Opponent adjustment:</b> ridge regression — production is judged against who it came
      against. <b>Garbage time:</b> team efficiency <i>excludes</i> garbage-time plays
      (score-margin thresholds by quarter); player grades <i>down-weight</i> them to one-third
      instead of deleting them. <b>Small samples:</b> every rate is shrunk toward average until the
      sample earns trust; explosiveness terms are shrunk hardest (they are the least stable).
      <b>Home field</b> is fit from data every season, not assumed.</div></div>
    <div class="sec"><div class="sectitle">What these numbers can't do</div><div class="secsub">
      Public college football data has no player-tracking, charting, or snap-participation layer.
      So player grades measure <b>value produced in a role — including the surrounding
      context</b>: a QB grade includes his line and receivers; a rushing grade includes the blocking;
      a receiving grade includes the QB. Pass protection is a <b>QB-line hybrid</b> (sacks are partly
      pocket behavior). Our secondary rating is <b>pass defense</b>, not "coverage" — the
      pass-rush/coverage split needs charting data that doesn't exist publicly. Individual linemen
      and defenders get production counts, not grades, because credit can't honestly be divided.
      </div></div>
    <div class="sec"><div class="sectitle">Update cadence</div><div class="secsub">
      Grades update weekly after games, Sunday. Early-week numbers are <b>preliminary</b> and can
      move with data corrections; a season's numbers are final after the national championship.
      Every projection we make is logged before kickoff and scored after — see
      <span data-go="checking" style="color:var(--amber);font-weight:600">Checking Our Work</span>.</div></div>
    <div class="note"><b>Performance evaluation only.</b> Grades are analysis of past play — not
      projections of player futures and not framed for wagering of any kind. ${BRAND_LINE}</div>
  </div></div>`;
  document.querySelector(".back").onclick=load;
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{ const f=HOME_GO[el.dataset.go]; if(f) f(); });
}

  try{ acc = await api(`accuracy_summary?select=*&order=season.desc`); }catch(e){}
  try{ arch = await api(`playoff_forecast_archive?select=asof,season,team_id,make_cfp&order=asof.desc&limit=600`); }catch(e){}

    kickoff, scored after — including against the Vegas closing line (context only; we publish no lines).

  const f2=v=>v==null?"—":Number(v).toFixed(2), f3=v=>v==null?"—":Number(v).toFixed(3);
  const mine = acc.filter(r=>r.model_version==="wf-inseason-v1");

    h+=`<div class="sec"><div class="sectitle">Game projections — weekly in-season model</div>
      <div class="boxhead"><div>season</div><div>record</div><div>vs close</div></div>`;

      <div class="bvb">${r.vs_close_mae==null?"—":"+"+f2(r.vs_close_mae)+" MAE"}</div></div>`; });
    h+=`</div>`;
  }
  h+=`<div class="sec"><div class="sectitle">Grade validation (updated each offseason)</div><div class="secsub">
    QB value vs ESPN's independent QBR metric: correlation <b>+0.84</b> (2024), <b>+0.77</b> (2025).
    Year-over-year stability: QB <b>+0.45</b>, rushing <b>+0.29</b> — college seasons are half noise,
    and our shrinkage is tuned for that. Kicker value shows <b>little year-to-year persistence</b>
    (+0.08) — that's a real property of kicking, and we say so rather than hide it.
    Committee-ranking model (playoff odds): walk-forward rank correlation <b>0.90</b>, top-12 hit rate
    <b>87%</b> across 2015–2025.</div></div>`;
  if(arch.length){
    const dates=[...new Set(arch.map(r=>r.asof))];

      Every weekly playoff forecast is archived from the moment it's published (${dates.length}

      record can be audited, not curated after the fact.</div></div>`;
  }
  h+=`<div class="note"><b>Checking Our Work.</b> Methodology: <span data-go="methodology"
    style="color:var(--amber);font-weight:600">how our ratings work</span>. ${BRAND_LINE}</div></div></div>`;

// U4.2 — transparent accuracy tracker (ships WITH the ratings reveal; SHOW_HASHMARK_RATINGS
// gates both the home card and this page). nfelo's trust-engine pattern: the model's honest,

async function openAccuracy(){

                  "wf-inseason-v1":"Weekly in-season model (walk-forward)"};
  let h=`<div class="cmp">${backHeader("Accuracy")}<div class="list" style="padding-top:6px">
    <div class="secsub" style="padding:0 2px 8px">Every Hashmark projection is logged BEFORE the game and scored after — this is the complete out-of-sample record, including against the Vegas closing line (shown for context only; we publish no lines). Honest labeling: nobody public sustainably beats the close.</div>`;
  Object.keys(MV_LABEL).forEach(mv=>{
    const mine=rows.filter(r=>r.model_version===mv);

    h+=`<div class="sec"><div class="sectitle">${MV_LABEL[mv]}</div>
      <div class="boxhead"><div>season</div><div>record</div><div>vs close</div></div>`;

let _homeSearchT=null;
function wireHomeSearch(){
  const inp=document.getElementById("homesearch"), res=document.getElementById("homeres");
  if(!inp) return;
  const run=async()=>{ const q=inp.value.trim(); if(q.length<1){ res.style.display="none"; return; }
    const ql=q.toLowerCase();
    const teams=(await ensureSearchTeams()).filter(t=>t.school.toLowerCase().includes(ql)).slice(0,5);
    let players=[];
    if(q.length>=2){ try{ players=await api(`player_index?select=athlete_id,player,team_id,position&name_lower=ilike.*${encodeURIComponent(ql)}*&order=last_season.desc&limit=6`); }catch(e){} }
    let html=teams.map(t=>`<div class="sropt" data-team="${t.id}">${crestEl("src",t.school,hx(t.color))}
        <div class="snm">${esc(t.school)}</div><div class="scf">${esc(t.conference||"")} · team</div></div>`).join("");
    html+=players.map(p=>{ const t=teamMeta[p.team_id]||{}; return `<div class="sropt" data-player="${p.athlete_id}">
        ${crestEl("src",t.school||"·",oppColor(p.team_id))}<div class="snm">${esc(p.player)}</div>
        <div class="scf">${esc(p.position||"")} ${esc(t.school||"")} · player</div></div>`; }).join("");
    res.innerHTML=html||`<div class="sropt"><div class="snm" style="color:var(--text2)">No team or player found</div></div>`;
    res.style.display="block"; };
  inp.oninput=()=>{ clearTimeout(_homeSearchT); _homeSearchT=setTimeout(run,180); };
  inp.onfocus=run;
}

  if(unitRows) return unitRows;

  // the model stores in power_ratings.off/def (not the tiny attribution contributions).
  unitRows = board2026.filter(b=>b.teams).map(b=>(

function renderLeaderboard(){
  const mode = MODES[boardMode], val = mode.metric;
  const rows = unitRows.filter(r=>val(r)!=null);
  const n = rows.length;
  // national rank for the current metric
  const ranked = rows.slice().sort((a,b)=>val(b)-val(a));
  const rankOf = {}; ranked.forEach((r,i)=>rankOf[r.team_id]=i+1);
  // conference strengths for the current metric (avg of member teams)
  const byConf = {};
  rows.forEach(r=>{ const c=r.t.conference||"Independent"; (byConf[c]=byConf[c]||[]).push(val(r)); });
  const confStr = Object.keys(byConf).map(c=>({conf:c, avg:mean(byConf[c]), n:byConf[c].length}))
    .sort((a,b)=>b.avg-a.avg);
  // Rank only real conferences (>=4 FBS teams) for STRENGTH: a 2-team catch-all like FBS
  // Independents (essentially just Notre Dame) shouldn't masquerade as the #1 "conference" on a
  // small-sample average. Independents stay available as a filter pill, just not strength-ranked.
  const RANKABLE = confStr.filter(c=>c.n>=4);
  const confRankOf = {}; RANKABLE.forEach((c,i)=>confRankOf[c.conf]=i+1);
  const cmax = Math.max(0.0001, ...RANKABLE.map(c=>Math.abs(c.avg)));

  // Part 0 (news prominence): rotating strip up top, Latest directly under your-team
  let h = header() + listTop() + `<div id="newsstrip"></div><div id="ytm"></div><div class="hsec" id="cs-newshost"></div>`;
  // board-type nav
  h += `<div class="bnav">`;
  ["overall","offense","defense"].forEach(k=>{
    const on = boardMode===k ? " on "+(k==="offense"?"off":k==="defense"?"def":"") : "";
    h += `<button data-mode="${k}" class="${on}">${MODES[k].short}</button>`;
  });
  h += `</div>`;
  // conference filter pills
  h += `<div class="confbar"><button class="confpill ${confFilter?"":"on"}" data-conf="">All FBS</button>`;
  confStr.forEach(c=>{ h += `<button class="confpill ${confFilter===c.conf?"on":""}" data-conf="${esc(c.conf)}">${esc(shortConf(c.conf))}</button>`; });
  h += `</div>`;

  if(confFilter){
    // selected-conference strength summary
    const cs = confStr.find(c=>c.conf===confFilter) || {avg:0,n:0};
    h += `<div class="csum">
      <div class="ch"><div class="cnm">${esc(confFilter)}</div>
        <div class="crk">${confRankOf[confFilter]?`#${confRankOf[confFilter]} of ${RANKABLE.length} leagues`:`${cs.n}-team independent group`}</div></div>
      <div class="cv" style="color:${mode.accent}">${f3(cs.avg)}</div>
      <div class="csub">average <b>${mode.short.toLowerCase()}</b> rating across its ${cs.n} FBS teams · tap a team for its full breakdown</div></div>`;
  } else {
    // conference-strength comparison (tap a row to filter)
    h += `<div class="cstr"><div class="cstrtitle">Conference strength · avg ${mode.short.toLowerCase()} rating</div>`;
    RANKABLE.forEach((c,i)=>{
      const w = Math.abs(c.avg)/cmax*100, neg = c.avg<0;
      h += `<div class="cstrrow" data-conf="${esc(c.conf)}">
        <div class="ci">${i+1}</div>
        <div class="cn">${esc(shortConf(c.conf))} <small>${c.n}</small></div>
        <div class="cbar"><i class="${neg?"neg":""}" style="width:${w}%;${neg?"":"background:"+mode.accent}"></i></div>
        <div class="cvv">${f3(c.avg)}</div></div>`;
    });
    h += `</div>`;
  }

  // team leaderboard
  const teamRows = (confFilter ? rows.filter(r=>(r.t.conference||"Independent")===confFilter) : rows)
    .sort((a,b)=>val(b)-val(a));
  h += `<div class="cstrtitle" style="margin-top:8px">${confFilter?esc(confFilter)+" — by "+mode.short.toLowerCase():"Best "+(boardMode==="overall"?"teams":mode.noun+"s")} · 2026</div>`;
  teamRows.forEach(r=>{
    const rk = rankOf[r.team_id];
    const main = `<div class="rval" style="border-color:${mode.accent}" data-tip="${esc(mode.tip(r,rk,n))}">${f3(val(r))}</div><div class="rlbl">${mode.lbl}</div>`;
    h += rowHTML(rk-1, r.t, main, r.team_id);
  });
  h += `</div><div class="note"><b>${SEASON_SCHED} Preseason — Hashmark projection.</b> Offense and defense are the opponent-adjusted, garbage-time-filtered unit ratings — a validated blend of finishing (points per drive), success rate and efficiency, with each unit's coordinator track record folded in where the staff changed. Conference strength is the simple average of a league's member teams. Free to browse. Early-offseason data is thin, so it leans on ${SEASON_RESULTS} results and will sharpen through the summer. ${BRAND_LINE}</div>`;
  h += `<div id="cs-teasers"></div>`;
  app.innerHTML = h; wireToggle();
  injectSeasonExtras();   // preseason signal teasers + news under the live board (brief #5 kept)
  injectYourTeam();
  injectNewsStrip();
}

      <button data-soss="${SEASON_RESULTS}" class="on">2025 played</button></div>`;

      <div class="sthead"><div></div><div></div><div></div><div>SoS%</div><div>Record</div><div>Strk</div></div>`;

// ---------- Matchup compare (official stats + historical H2H + win prob behind SHOW_PREDICTIONS) ----------
const MATCHUP_STATS = ["points_per_game","opp_points_per_game","total_yards_pg","total_yards_allowed_pg",
  "yards_per_play","yards_per_play_allowed","off_ppa","def_ppa","off_success_rate","def_success_rate",

let _statSeasonActive=null;
async function activeStatSeason(){   // 2025 now; auto-switches to 2026 when those stats land
  if(_statSeasonActive) return _statSeasonActive;

    _statSeasonActive=(r[0]&&r[0].season)||STAT_SEASON; }catch(e){ _statSeasonActive=STAT_SEASON; }

}
let matchup={a:null,b:null,venue:"neutral"};
function teamPicker(excludeId, cb){

async function openMatchup(aId,bId){
  window.scrollTo(0,0); app.innerHTML=`<div class="loading">Loading matchup…</div>`;
  try{
    await Promise.all([ensureTeamMeta(), ensureCatalog(), activeStatSeason()]);
    if(!aId||!bId){ const ap=await api("poll_rankings?select=team_id,rank&season=eq.2025&poll=eq.AP%20Top%2025&order=rank.asc&limit=2");
      aId=aId||(ap[0]&&ap[0].team_id); bId=bId||(ap[1]&&ap[1].team_id);
      const keys=Object.keys(teamMeta); aId=aId||keys[0]; bId=bId||keys[1]; }

async function fetchWinProb(a,b){
  const lo=Math.min(+a,+b), hi=Math.max(+a,+b);
  const r=await api(`matchup_winprob?select=win_prob_a,win_prob_a_home,win_prob_a_away&season=eq.2026&team_a=eq.${lo}&team_b=eq.${hi}`);
  return r[0]||null;
}
function pWinA(row,a,b,venue){   // P(team a wins) for the chosen venue
  const lo=Math.min(+a,+b), aIsLo=(+a===lo);
  const loVenue = venue==="neutral"?"neutral":(venue==="aHome"?(aIsLo?"home":"away"):(aIsLo?"away":"home"));
  const pLo=Number(loVenue==="home"?row.win_prob_a_home:loVenue==="away"?row.win_prob_a_away:row.win_prob_a);
  return aIsLo?pLo:1-pLo;
}
async function fetchH2H(a,b){
  return api(`games_history?select=season,start_date,home_team_id,away_team_id,home_team,away_team,home_points,away_points,neutral_site&or=(and(home_team_id.eq.${a},away_team_id.eq.${b}),and(home_team_id.eq.${b},away_team_id.eq.${a}))&order=start_date.desc`);
}
async function drawMatchup(){
  const a=matchup.a, b=matchup.b, S=await activeStatSeason();
  const [statsRows, wp, hh] = await Promise.all([
    api(`team_stat_season?select=team_id,stat_key,value,rank,percentile&season=eq.${S}&team_id=in.(${a},${b})&stat_key=in.(${MATCHUP_STATS.join(",")})`),
    SHOW_PREDICTIONS?fetchWinProb(a,b):Promise.resolve(null),
    fetchH2H(a,b) ]);
  renderMatchup(statsRows, wp, hh, S);
  setTimeout(()=>{ try{ injectMatchupGrid(a,b); }catch(_e){} }, 0);   // P1 heat-grid seam
}
function mPickCard(slot){
  const id=matchup[slot], t=teamMeta[id]||{school:"?"}, c=hx(t.color);
  return `<div class="pick" data-mpick="${slot}">
    <div class="pcrest" style="background:${c};color:${textOn(t.color)}">${monogram(t.school)}</div>
    <div class="pname">${esc(t.school)}</div><div class="pconf">${esc(t.conference||"")}</div>
    <div class="pchg">Change</div></div>`;
}
function renderMatchup(statsRows, wp, hh, S){
  const a=matchup.a, b=matchup.b, tA=teamMeta[a]||{school:"?"}, tB=teamMeta[b]||{school:"?"};
  const idx={}; statsRows.forEach(r=>{ idx[`${r.team_id}|${r.stat_key}`]=r; });
  let h=`<div class="cmp"><div class="cmptop"><button class="back"><svg class="ic" aria-hidden="true"><use href="#i-chev-l"/></svg></button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div><div class="cmptag">Matchup</div></div>
    <div class="pickrow">${mPickCard("a")}<div class="pickvs">VS</div>${mPickCard("b")}</div>`;
  // win probability (ONLY thing from the model; never a rating or margin)
  if(SHOW_PREDICTIONS && wp){
    const pA=pWinA(wp,a,b,matchup.venue), paPct=Math.round(pA*100), pbPct=100-paPct;
    const favA=pA>=0.5, fav=favA?tA:tB, favPct=Math.max(paPct,pbPct);
    const venues=[["aHome",`${esc(tA.school)} home`],["neutral","Neutral"],["bHome",`${esc(tB.school)} home`]];
    h+=`<div class="mwpcard">
      <div class="mwphdr">Win probability${matchup.venue==="neutral"?" · neutral site":""}</div>
      <div class="mwprow"><div class="mwpteam a">${esc(tA.school)}</div>
        <div class="mwppct ${favA?"win":""}">${paPct}%</div>
        <div class="mwppct b ${!favA?"win":""}">${pbPct}%</div>
        <div class="mwpteam b">${esc(tB.school)}</div></div>
      <div class="mwpbar"><i style="width:${paPct}%"></i></div>
      <div class="venue"><div class="toggle">${venues.map(([v,l])=>`<button data-mv="${v}" class="${matchup.venue===v?"on":""}">${l}</button>`).join("")}</div></div>
      <div class="mwpnote">Model estimate of how often <b>${esc(fav.school)}</b> wins this matchup (${favPct}%). A probability only — not a prediction, spread, or score. Entertainment only, not gambling advice. Independent &amp; gambling-free.</div>
    </div>`;
  }
  // side-by-side official stats with national rank context
  h+=`<div class="sec"><div class="sectitle">Team stats — ${S}</div>
    <div class="mhead"><div>${esc(tA.school)}</div><div></div><div>${esc(tB.school)}</div></div>`;
  MATCHUP_STATS.forEach(k=>{ const d=_catalog.by[k]; if(!d) return;
    const ra=idx[`${a}|${k}`], rb=idx[`${b}|${k}`]; if(!ra&&!rb) return;
    let wa="",wb="";

  const wins = 60 + g.model_conf*3;   // rank 10 ≈ "wins about 90 of 100"

// ---------- User-driven Simulator: pick winners -> standings, champions, 12-team CFP field ----------
// Deterministic core uses NO model. The optional odds layer (SHOW_PREDICTIONS) Monte-Carlos the
// unpicked games with the precomputed matchup_winprob (probabilities only — never a rating).
const REAL_CONF_MIN = 8;   // a "conference" that crowns a champion (excludes 2-team Independents)
let sim=null;
async function fetchAllWinprob(){   // PostgREST caps at 1000 rows/request; pages until empty
  let all=[], off=0;
  for(let page=0; page<100; page++){   // sane bound only — never a silent truncation
    const chunk=await api(`matchup_winprob?select=team_a,team_b,win_prob_a,win_prob_a_home,win_prob_a_away&season=eq.${SEASON_SCHED}&order=team_a.asc,team_b.asc&limit=1000&offset=${off}`);
    all=all.concat(chunk); if(chunk.length<1000) break; off+=1000;
  }
  return all;
}
async function openSimulator(){
  window.scrollTo(0,0); app.innerHTML=`<div class="loading">Loading simulator…</div>`;
  try{
    await ensureTeamMeta();
    const [games, teams, wp] = await Promise.all([
      api(`games?select=id,week,season_type,home_team_id,away_team_id,home_team,away_team,neutral_site,home_points,away_points,completed&season=eq.${SEASON_SCHED}&order=week.asc`),
      api(`teams?select=id,school,conference,classification`),
      SHOW_PREDICTIONS?fetchAllWinprob():Promise.resolve([]) ]);
    const conf={}, fbs=new Set();
    teams.forEach(t=>{ if((t.classification||"").toLowerCase()==="fbs"){ fbs.add(String(t.id)); conf[String(t.id)]=t.conference||"Independent"; } });
    const wpmap=new Map(); wp.forEach(r=>wpmap.set(r.team_a+"-"+r.team_b, r));
    // only games between two FBS teams matter for the field
    const fgames=games.filter(g=>fbs.has(String(g.home_team_id))&&fbs.has(String(g.away_team_id)));
    sim={games:fgames, conf, fbs, wp:wpmap, userPicks:{}, fav:{}, locked:{}, final:{}, ranked:[], lastRun:null};
    // B1: completed games are LOCKED to their actual result — never re-picked, never
    // re-randomized. The bracket is "actual results + your picks + model favorites".
    fgames.forEach(g=>{ if(g.completed && g.home_points!=null && g.away_points!=null && g.home_points!==g.away_points){
      sim.locked[g.id]= g.home_points>g.away_points ? String(g.home_team_id):String(g.away_team_id);
      sim.final[g.id]= `${g.home_points>g.away_points?g.home_points:g.away_points}–${g.home_points>g.away_points?g.away_points:g.home_points}`; } });
    // model favorite per game (default pick); if predictions off, default home team
    fgames.forEach(g=>{ const ph=simPHome(g.home_team_id,g.away_team_id,g.neutral_site);
      sim.fav[g.id]= (SHOW_PREDICTIONS? (ph>=0.5):true) ? String(g.home_team_id):String(g.away_team_id); });
    // B6: count missing winprob pairs (0.5 fallback) — surface a data-gap flag if material
    sim.wpMissing = SHOW_PREDICTIONS ? fgames.filter(g=>{ const lo=Math.min(+g.home_team_id,+g.away_team_id),
      hi=Math.max(+g.home_team_id,+g.away_team_id); return !wpmap.get(lo+"-"+hi); }).length : 0;
    sim.hasSOR = SHOW_PREDICTIONS && sim.wp.size>0;
    if(sim.hasSOR) precomputeSOR();
    renderSim();
    if(SHOW_PREDICTIONS) simAutoOdds();   // B7: MC odds are the primary lens — auto-run on open (free)
  }catch(e){ app.innerHTML=backHeader("Simulator")+`<div class="list"><div class="err">Couldn't load simulator: ${e.message}</div></div>`;
    document.querySelector(".back").onclick=load; }
}
function simPHome(h,a,neutral){
  const lo=Math.min(+h,+a), hi=Math.max(+h,+a), row=sim&&sim.wp.get(lo+"-"+hi);
  if(!row) return 0.5;
  if(neutral){ const pLo=Number(row.win_prob_a); return (+h===lo)?pLo:1-pLo; }
  if(+h===lo) return Number(row.win_prob_a_home);
  return 1-Number(row.win_prob_a_away);
}
function simPTeam(teamId, g){   // P(teamId wins this game)
  const pHome=simPHome(g.home_team_id, g.away_team_id, g.neutral_site);
  return String(teamId)===String(g.home_team_id)? pHome : 1-pHome;
}
// P(winner beats loser) with the winner at the given venue ('home'/'away'/'neutral')
function simPair(w, l, venue){
  const W=+w, L=+l, lo=Math.min(W,L), hi=Math.max(W,L), row=sim.wp.get(lo+"-"+hi);
  if(!row) return 0.5; const wIsLo=(W===lo);
  if(venue==="neutral"){ const a=Number(row.win_prob_a); return wIsLo?a:1-a; }
  if(venue==="home")   return wIsLo?Number(row.win_prob_a_home):1-Number(row.win_prob_a_away);
  return wIsLo?Number(row.win_prob_a_away):1-Number(row.win_prob_a_home);   // away
}
// STRENGTH OF RECORD precompute: per team, the distribution of how many games an "average
// top-tier team" (mean of the top-25 by model strength) would win against THAT team's exact
// schedule (honoring venue). SOR(team) = 1 - P(reference wins >= team's actual wins): a hard
// schedule lowers the reference's chances, so matching a good record there grades high; an
// undefeated team vs a soft schedule grades low. Schedule is fixed, so this is computed once.
function precomputeSOR(){
  const ids=[...sim.fbs];
  const proxy={}; ids.forEach(t=>{ let s=0,n=0; ids.forEach(u=>{ if(u===t) return; s+=simPair(t,u,"neutral"); n++; }); proxy[t]=n?s/n:0; });
  const topRef=ids.slice().sort((a,b)=>proxy[b]-proxy[a]).slice(0,25);   // "average top-25 team"
  const refH={},refA={},refN={};
  ids.forEach(o=>{ let sh=0,sa=0,sn=0,c=0; topRef.forEach(R=>{ if(R===o) return;
      sh+=simPair(R,o,"home"); sa+=simPair(R,o,"away"); sn+=simPair(R,o,"neutral"); c++; });
    refH[o]=c?sh/c:0.5; refA[o]=c?sa/c:0.5; refN[o]=c?sn/c:0.5; });

  };
  const draw=()=>{ const eff=simEffective(); let w=0,l=0;
    let html="";
    tgames.forEach(g=>{ const opp=String(g.home_team_id)===teamId?g.away_team_id:g.home_team_id;

        return; }
      html+=`<div class="stgame">
        <div class="stopp">${crestEl("glcr",(teamMeta[opp]||{}).school||"opp",oppColor(opp))}
          <div><div class="on">${home?"vs":"@"} ${esc((teamMeta[opp]||{}).school||"TBD")}</div>
          <div class="ha">Wk ${g.week}${ph!=null?` · model ${ph}% to win`:""}${isUser?" · your pick":""}</div></div></div>
        <div class="stbtns"><button class="stb ${win?"w":""}" data-gid="${g.id}" data-pick="${teamId}">W</button>
          <button class="stb ${!win?"l":""}" data-gid="${g.id}" data-pick="${opp}">L</button></div></div>`; });
    document.getElementById("stsheet").innerHTML=
      `<div class="strec">Projected: <b>${w}–${l}</b> <small>FBS games only</small></div>`+teamOdds()+html;
    document.querySelectorAll("#stsheet .stb").forEach(b=>b.onclick=()=>{ sim.userPicks[b.dataset.gid]=b.dataset.pick; draw(); });
    const rb=document.getElementById("strun");
    if(rb) rb.onclick=async()=>{
      if(!(await simRunGate())) return;
      rb.disabled=true;
      simMonteCarlo(SIM_MC_N,
        ()=>{ draw(); },
        (done,N)=>{ rb.textContent=`Simulating… ${done.toLocaleString()} / ${N.toLocaleString()}`; });
    };
  };
  draw();
  const close=()=>{ ov.remove(); renderSim(); if(SHOW_PREDICTIONS&&!sim.lastRun) simAutoOdds(); };
  ov.querySelector(".pickx").onclick=close; ov.onclick=e=>{ if(e.target===ov) close(); };
  document.getElementById("stteampage").onclick=()=>{ ov.remove(); openDetail(+teamId); };
}
// ---- Monte Carlo engine (B4): chunked so the main thread never freezes — batches of
// sims per frame with a live progress readout. Locked finals are never re-randomized
// (B1); user picks stay fixed. Tallies per team: CFP / conf title / win-out counts plus
// full seed and win-count distributions (the per-team sheet needs them, B2).
const SIM_MC_N = 1000;                  // engine and copy must agree — benchmarked Jul 2026
function simMonteCarlo(N, onDone, onProgress){
  const fbs=[...sim.fbs], tally={};
  fbs.forEach(id=>tally[id]={po:0,ct:0,wo:0,seeds:{},wins:{},fr:{}});
  const open=sim.games.filter(g=>!sim.userPicks[g.id] && !sim.locked[g.id]);
  const fixed=Object.assign({}, sim.userPicks, sim.locked);
  let s=0;
  const BATCH=40;
  function batch(){
    const end=Math.min(s+BATCH, N);
    for(; s<end; s++){
      const picks=Object.assign({}, fixed);
      open.forEach(g=>{ picks[g.id]= Math.random()<simPHome(g.home_team_id,g.away_team_id,g.neutral_site)?String(g.home_team_id):String(g.away_team_id); });
      const r=simCompute(picks);
      r.field.forEach((id,i)=>{ tally[id].po++; tally[id].seeds[i+1]=(tally[id].seeds[i+1]||0)+1; });
      if(r.field.length>=12){   // P4: first-round pairings (5v12, 6v11, 7v10, 8v9)
        [[4,11],[5,10],[6,9],[7,8]].forEach(([x,y])=>{ const A=r.field[x],B=r.field[y];
          tally[A].fr[B]=(tally[A].fr[B]||0)+1; tally[B].fr[A]=(tally[B].fr[A]||0)+1; }); }
      r.champions.forEach(id=>{ if(tally[id]) tally[id].ct++; });
      fbs.forEach(id=>{ const w=r.rec[id].w; tally[id].wins[w]=(tally[id].wins[w]||0)+1;
        if(r.rec[id].l===0 && w>0) tally[id].wo++; });
    }
    if(onProgress) onProgress(s, N);
    if(s<N) setTimeout(batch, 0);
    else { sim.lastRun={tally, N, sig:simPicksSig(), at:Date.now()}; onDone(sim.lastRun); }
  }
  batch();
}
// B5: the gate counts RUNS, not opens — one shared counter across the global run, the
// per-team runs and the CCG odds runs. localStorage + profile-synced when signed in.
// Viewing the bracket (and the auto-run chalk odds) stays free — that's the taste.
async function simRunGate(){
  if(!PLUS_GATED.simulator_unlimited) return true;
  let runs = Number(localStorage.getItem(SIM_RUNS_KEY) || 0);
  try{ if(typeof authProfile!=="undefined" && authProfile && authProfile.sim_runs!=null)
    runs = Math.max(runs, Number(authProfile.sim_runs)||0); }catch(e){}
  if(runs >= 1){
    const go = await plusUpsell("Run unlimited simulations",
      "Your first Monte-Carlo run was free. Unlimited runs — full-field odds, per-team odds and conference scenarios — are coming with Hashmark+. Free while we're in preview.");
    if(!go) return false;
  }
  localStorage.setItem(SIM_RUNS_KEY, String(runs + 1));
  try{ if(typeof authUser!=="undefined" && authUser){
    authFetch("PATCH",`profiles?id=eq.${authUser.id}`,{sim_runs:runs+1,updated_at:new Date().toISOString()});
    if(authProfile) authProfile.sim_runs=runs+1; } }catch(e){}
  return true;
}
function simOddsPanel(run){
  // Persistent odds panel (B2): survives re-renders; flags itself stale when picks
  // changed after the run instead of silently vanishing.
  const stale = run.sig!==simPicksSig();
  const rows=[...sim.fbs].map(id=>({id, po:run.tally[id].po/run.N, ct:run.tally[id].ct/run.N, wo:run.tally[id].wo/run.N}))
    .filter(r=>r.po>0).sort((a,b)=>b.po-a.po).slice(0,20);
  let h=`<div class="sec"><div class="sectitle">Playoff &amp; title odds</div>
    <div class="secsub">From <b>${run.N.toLocaleString()}</b> Monte-Carlo seasons — completed games locked to their real results, your picks fixed, the rest drawn from the model's matchup win probabilities. Probabilities only.</div>
    ${stale?`<div class="simstale">Picks changed since this run — the odds below are from your previous picks. Run again to refresh.</div>`:""}
    <div class="oddhead"><div></div><div>Make CFP</div><div>Conf title</div><div>Win out</div></div>`;
  rows.forEach(r=>{ const t=teamMeta[r.id]||{school:r.id};
    h+=`<div class="oddrow" data-team="${r.id}"><div class="onm">${crestEl("glcr",t.school,oppColor(r.id))}<span>${esc(t.school)}</span></div>
      <div class="ov">${Math.round(r.po*100)}%</div><div class="ov">${Math.round(r.ct*100)}%</div><div class="ov">${Math.round(r.wo*100)}%</div></div>`; });
  return h+`</div>`;
}
function simSeedMC(run){
  // B7: Monte-Carlo Make-CFP% stamped next to every seeded team — the probability lens
  // sits beside the chalk bracket so a soft-schedule seed can't read as a likely one.
  if(!run) return;
  document.querySelectorAll(".simseed").forEach(el=>{ const id=el.dataset.team;
    const t=run.tally[id]; if(!t) return;
    const v=Math.round(100*t.po/run.N);
    const slot=el.querySelector(".ssmc"); if(slot) slot.textContent=`MC ${v}%`; });
}
function simRunOdds(){
  const odds=document.getElementById("simodds");
  if(!odds) return;
  simMonteCarlo(SIM_MC_N,
    run=>{ odds.innerHTML=simOddsPanel(run); simSeedMC(run); },
    (done,N)=>{ odds.innerHTML=`<div class="loading">Simulating… ${done.toLocaleString()} of ${N.toLocaleString()} seasons</div>`; });
}
function simAutoOdds(){
  // Background chalk-world MC on open (free — part of the view). Skipped if a run
  // already exists for the current picks.
  if(sim.lastRun && sim.lastRun.sig===simPicksSig()){ simSeedMC(sim.lastRun); return; }
  const odds=document.getElementById("simodds");
  simMonteCarlo(SIM_MC_N,
    run=>{ if(document.getElementById("simodds")){ document.getElementById("simodds").innerHTML=simOddsPanel(run); simSeedMC(run); } },
    (done,N)=>{ const el=document.getElementById("simodds");
      if(el && !el.querySelector(".oddhead")) el.innerHTML=`<div class="loading">Computing Monte-Carlo odds… ${done.toLocaleString()} of ${N.toLocaleString()}</div>`; });
}

function hmSection(hm, t){
  if(!hm) return "";
  const comps=(hm.comps||[]).filter(c=>CMETA[c.component]);
  const cmax=Math.max(0.0001, ...comps.map(c=>Math.abs(Number(c.value))));
  let rowsH="";
  CORDER.forEach(k=>{ const c=comps.find(x=>x.component===k); if(!c) return;
    const v=Number(c.value), w=Math.abs(v)/cmax*100;
    rowsH+=`<div class="driver" data-tip="${esc(CMETA[k].name+" — "+CMETA[k].tip)}">
      <div class="dvk">${CMETA[k].name}</div>
      <div class="dvbar"><div class="mid"></div><i class="${v>=0?"pos":"neg"}" style="${v>=0?"left:50%":"right:50%"};width:${Math.max(2,w/2)}%"></i></div>
      <div class="dvv">${(v>=0?"+":"")+Number(v).toFixed(3)}</div></div>`; });
  return `<div class="sec"><div class="sectitle">Hashmark rating <small>${phaseLabel()} · free</small></div>
    <div class="drating"><div class="dbig" data-tip="Hashmark overall power rating — opponent-adjusted efficiency blended with results, roster and coaching factors. 0 = FBS average; the breakdown below sums exactly to this number.">${Number(hm.overall).toFixed(3)}</div>
      <div class="drk">#${hm.rank||"—"} <small>of 138</small></div>
      <div class="dunits"><span data-tip="${esc('Offense unit rating — '+CMETA.off_eff.tip)}">OFF ${hm.off!=null?Number(hm.off).toFixed(2):"—"}</span>
        <span data-tip="${esc('Defense unit rating — '+CMETA.def_eff.tip)}">DEF ${hm.def!=null?Number(hm.def).toFixed(2):"—"}</span></div></div>
    ${waterfallSVG(hm.comps||[], Number(hm.overall), t)}
    ${rowsH?`<div class="secsub" style="padding:6px 2px 2px">What's driving it (tap a factor):</div>${rowsH}`:""}
    </div>`;
}

function glLine(stats){
  const ty=_glStat(stats,"totalYards"), to=_glStat(stats,"turnovers");
  let bits=[]; if(ty!=null) bits.push(`${Number(ty).toLocaleString()} yds`);
  if(to!=null) bits.push(`${to} TO`);
  return bits.join(" · ")||"—";
}
function gameLogSection(rows, teamId){
  if(!rows.length) return "";
  const bySeason={}; rows.forEach(r=>{ (bySeason[r.season]=bySeason[r.season]||[]).push(r); });
  const seasons=Object.keys(bySeason).map(Number).sort((a,b)=>b-a);
  let h=`<div class="sec"><div class="sectitle">Game log</div>
    <div class="secsub">Every game's official box line. Tap a game for the full box score. Source: CFBD.</div>`;
  seasons.forEach(s=>{
    h+=`<div class="glseason">${s}${s===SEASON_RESULTS?" season":""}</div>`;
    bySeason[s].slice().sort((a,b)=>(stOrder(a.season_type)-stOrder(b.season_type))||(a.week-b.week))
      .forEach(g=>{
        const opp=teamMeta[g.opponent_id]||{school:g.opponent_name||"TBD"}, c=oppColor(g.opponent_id);
        const ha=g.home_away==="home"?"vs":"at";
        const res=g.result?`<div class="glres ${g.result==='W'?'w':'l'}">${g.result}</div>`:`<div class="glres wk">—</div>`;
        const sc=(g.points!=null&&g.opp_points!=null)?`<b>${g.points}</b>–${g.opp_points}`:"—";
        h+=`<div class="glrow" data-box="${g.game_id}" data-bteam="${teamId}">
          ${res}
          ${crestEl("glcr", opp.school, c)}
          <div class="glopp"><div class="ha">${ha}${g.season_type==="postseason"?" · Bowl/CFP":` · Wk ${g.week}`}</div>
            <div class="on">${esc(opp.school)}</div></div>
          <div class="glsc">${sc}<small>${glLine(g.stats)}</small></div>
          <div class="chev">›</div></div>`;
      });
  });
  return h+`</div>`;
}

// team-page situational splits (off vs def EPA/play + success rate), grouped
const SPLIT_GROUPS = [
  ["Down", "down", ["1st down","2nd down","3rd down"]],
  ["Situation", "situation", ["3rd & short","3rd & long"]],
  ["Field", "field", ["Red zone"]],
  ["By quarter", "quarter", ["Q1","Q2","Q3","Q4"]],
  ["Location", "location", ["Home","Away","Neutral"]],
  ["By outcome", "result", ["In wins","In losses"]],
  ["Competition", "vs", ["vs Ranked (AP)"]],
];
function teamSplitsSection(splits, school){
  if(!splits.length) return "";
  school=school||"This team";
  const by={}; splits.forEach(s=>{ by[`${s.side}|${s.split_type}|${s.split_key}`]=s; });
  const cell=(s)=> s ? `<b>${(s.epa_per_play>0?"+":"")+Number(s.epa_per_play).toFixed(2)}</b><small>${(Number(s.success_rate)*100).toFixed(0)}% SR</small>` : "—";
  let h=`<div class="sec"><div class="sectitle">Situational splits</div>
    <div class="secsub">EPA/play &amp; success rate by situation, from official play-by-play (garbage time removed). <b>Off</b> = this team's offense; <b>Def</b> = what its defense allowed (lower is better). 2025. Source: CFBD.</div>
    <div class="splithead"><div></div><div>Offense</div><div>Defense (allowed)</div></div>`;
  SPLIT_GROUPS.forEach(([label,stype,keys])=>{
    const present=keys.filter(k=>by[`off|${stype}|${k}`]||by[`def|${stype}|${k}`]);
    if(!present.length) return;
    h+=`<div class="splitgrp">${label}</div>`;
    present.forEach(k=>{
      const so=by[`off|${stype}|${k}`], sd=by[`def|${stype}|${k}`];
      const bs=_baselines&&_baselines.split_sr[`off|${stype}|${k}`];
      let tip=`${label} — ${k}. `;
      if(so) tip+=`On a typical ${k} play, ${school}'s offense ${Number(so.epa_per_play)>=0?"gains":"loses"} about `+
        `${Math.abs(Number(so.epa_per_play)).toFixed(2)} expected points and stays on schedule `+
        `${Math.round(Number(so.success_rate)*100)}% of the time`+
        (bs!=null?` — the national average is about ${Math.round(bs*100)}%`:"")+`. `;
      if(sd) tip+=`Its defense allows ${Number(sd.epa_per_play).toFixed(2)} EPA/play there `+
        `(${Math.round(Number(sd.success_rate)*100)}% success allowed — lower is better).`;
      h+=`<div class="splitrow"><div class="slk" data-tip="${esc(tip)}">${esc(k)}</div>
        <div class="slv off">${cell(so)}</div>
        <div class="slv def">${cell(sd)}</div></div>`;
    });
  });
  return h+`</div>`;
}

// ---------- compare tool (free-tier flagship: single-game projection) ----------
// Engine constants from the Hashmark model (wf-ridge-v1). The margin model is
//   margin = beta * zdiff + hfa * home_field   (build_winprob.py serving engine)
// where zdiff is the difference of the teams' z-scored power ratings; sigma is the
// CALIBRATED win-prob sigma (calibration_report.md: fitted 16.75, not the raw residual
// SD ~18.1). P(win)=Phi(margin/sigma), exactly as ratings.win_probability() does.
// PINNED (HFA-fix brief, 2026-07-03) — must equal build_winprob.py's serving params:
//   beta 9.429 pts/board-z (refit pooled 2016-23 on the board scale; the old 8.342 was
//   stale) · hfa 2.017 (inseason_params.json, pooled through 2024 — the old 2.975 was a
//   noisy single 2025 fold). NEVER pull these from prediction_log: in-season rows carry a
//   beta calibrated to a DIFFERENT zdiff scale (11.096) and would inflate every margin.
//   sync_web.py --check verifies these against the model repo on every deploy.
const ENGINE = { beta: 9.429, hfa: 2.005, sigma: 16.75 };
async function ensureEngine(){ return ENGINE; }
function erf(x){ // Abramowitz & Stegun 7.1.26, |err| < 1.5e-7
  const s=x<0?-1:1; x=Math.abs(x); const t=1/(1+0.3275911*x);
  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return s*y;
}
const winProb = m => 0.5*(1+erf((m/ENGINE.sigma)/Math.sqrt(2)));

let cmp = {a:null,b:null,venue:"neutral"};
let boardSD = 0;            // cross-team SD of `overall` -> converts ratings to unit-z
const compCache = {};       // team_id -> {component: value}

async function fetchComps(teamId){
  if(compCache[teamId]) return compCache[teamId];
  const rows = await api(`rating_components?select=component,value&season=eq.${SEASON_SCHED}&week=eq.0&team_id=eq.${teamId}`);
  const cv={}; rows.forEach(c=>cv[c.component]=Number(c.value));
  compCache[teamId]=cv; return cv;
}
function boardRank(teamId){ return board2026.findIndex(b=>String(b.team_id)===String(teamId))+1; }
function boardEntry(teamId){ return board2026.find(b=>String(b.team_id)===String(teamId)); }

async function openCompare(aId, bId){
  if(!SHOW_HASHMARK_RATINGS){ view="2026"; return renderComingSoon(); }  // Compare is a Hashmark projection — hidden in preview
  window.scrollTo(0,0);
  app.innerHTML = `<div class="loading">Loading matchup…</div>`;
  try{
    await Promise.all([ensureBoard(), ensureEngine()]);
    const ov = board2026.map(b=>Number(b.overall));
    const mean = ov.reduce((s,x)=>s+x,0)/ov.length;
    boardSD = Math.sqrt(ov.reduce((s,x)=>s+(x-mean)*(x-mean),0)/ov.length) || 1;
    // defaults: top two teams (or the passed team vs the best other team)
    if(!aId) aId = board2026[0].team_id;
    if(!bId) bId = (board2026.find(b=>String(b.team_id)!==String(aId))||board2026[0]).team_id;
    cmp = {a:aId, b:bId, venue:"neutral"};
    await Promise.all([fetchComps(aId), fetchComps(bId)]);
    drawCompare();
  }catch(e){
    app.innerHTML = `<div class="cmptop"><button class="back"><svg class="ic" aria-hidden="true"><use href="#i-chev-l"/></svg></button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div></div>
      <div class="err">Couldn't load matchup: ${e.message}</div>`;
    document.querySelector(".back").onclick = load;
  }
}
