// one comparison row: back-to-back bars growing out from the centre, longer bar = edge
function cmpRow(label, va, vb, cA, cB, tipK, big){
  const mx=Math.max(1e-6, Math.abs(va), Math.abs(vb));
  const wa=Math.abs(va)/mx*100, wb=Math.abs(vb)/mx*100;
  const barA=`<i class="${va<0?'neg':''}" style="width:${wa}%;${va<0?'':'background:'+cA}"></i>`;
  const barB=`<i class="${vb<0?'neg':''}" style="width:${wb}%;${vb<0?'':'background:'+cB}"></i>`;
  return `<div class="cmprow${big?' big':''}">
    <div class="cmpk"${tipK?` data-tip="${esc(tipK)}"`:''}>${label}</div>
    <div class="cmpgrid">
      <div class="cmpval a${va>vb?' win':''}">${f3(va)}</div>
      <div class="cmptrk l">${barA}</div>
      <div class="cmptrk r">${barB}</div>
      <div class="cmpval b${vb>va?' win':''}">${f3(vb)}</div>
    </div></div>`;
}

function drawCompare(){
  const A=boardEntry(cmp.a), B=boardEntry(cmp.b);
  const ta=A.teams, tb=B.teams, cA=hx(ta.color), cB=hx(tb.color);
  const oA=Number(A.overall), oB=Number(B.overall);
  const cvA=compCache[cmp.a]||{}, cvB=compCache[cmp.b]||{};
  const rkA=boardRank(cmp.a), rkB=boardRank(cmp.b);

  // projection (positive margin => team A favored)
  const z=(oA-oB)/boardSD;
  let margin=ENGINE.beta*z;
  if(cmp.venue==="home") margin+=ENGINE.hfa;
  else if(cmp.venue==="away") margin-=ENGINE.hfa;
  const pA=winProb(margin), paPct=Math.round(pA*100), pbPct=100-paPct;
  const favA=margin>=0, fav=favA?ta:tb, favRk=favA?rkA:rkB;
  const by=Math.abs(margin), favWp=Math.round((favA?pA:1-pA)*100);
  const tossup = by<0.5;

  const venues={
    home:{lbl:"Home",sub:`<b>${esc(ta.school)}</b> hosts`,
          desc:`${esc(ta.school)} at home vs ${esc(tb.school)}`},
    neutral:{lbl:"Neutral",sub:"neutral site",
          desc:`${esc(ta.school)} vs ${esc(tb.school)} — neutral field`},
    away:{lbl:"Away",sub:`at <b>${esc(tb.school)}</b>`,
          desc:`${esc(ta.school)} on the road at ${esc(tb.school)}`},
  };
  const hfaTxt=ENGINE.hfa.toFixed(1);

  let h=`<div class="cmp">
    <div class="cmptop"><button class="back"><svg class="ic" aria-hidden="true"><use href="#i-chev-l"/></svg></button>
      <div class="wordmark">Hashmark<span class="dot">.</span></div>
      <div class="cmptag">Compare</div></div>
    <div class="pickrow">${pickCard("a")}<div class="pickvs">VS</div>${pickCard("b")}</div>
    <div class="venue"><div class="toggle">`;
  ["home","neutral","away"].forEach(v=>{
    h+=`<button data-venue="${v}" class="${cmp.venue===v?'on':''}">${venues[v].lbl}<small>${venues[v].sub}</small></button>`;
  });
  h+=`</div></div>
    <div class="venuesub">Projection includes the model's home-field value of <b>${hfaTxt} pts</b> (off on neutral).</div>`;

  // headline
  h+=`<div class="headcard">
    <div class="hl">${tossup
      ? `Hashmark calls this a <span class="by">toss-up</span>`
      : `Hashmark projects ${esc(fav.school)} <span class="by">by ${by.toFixed(1)}</span>`}</div>
    <div class="hlsub">win probability <b>${favWp}%</b>${tossup?'':` · ${esc(fav.school)} #${favRk}`} · <b>${venues[cmp.venue].lbl.toLowerCase()==='neutral'?'neutral site':venues[cmp.venue].lbl}</b></div>
    <div class="wpbar">
      <div class="seg a" style="width:${paPct}%;background:${cA};color:${textOn(ta.color)}">${paPct>=16?paPct+'%':''}</div>
      <div class="seg b" style="width:${pbPct}%;background:${cB};color:${textOn(tb.color)}">${pbPct>=16?pbPct+'%':''}</div>
    </div>
    <div class="wplbl"><span><b>${esc(ta.school)}</b> ${paPct}%</span><span>${pbPct}% <b>${esc(tb.school)}</b></span></div>
  </div>`;

  // side-by-side ratings (overall / off / def) — off/def are the canonical unit ratings
  const ea=boardEntry(cmp.a), eb=boardEntry(cmp.b);
  const offA=ea&&ea.off!=null?Number(ea.off):0, defA=ea&&ea.def!=null?Number(ea.def):0;
  const offB=eb&&eb.off!=null?Number(eb.off):0, defB=eb&&eb.def!=null?Number(eb.def):0;
  h+=`<div class="cmpsec"><div class="sectitle">Hashmark rating</div>
    <div class="secsub">${phaseLabel()} projection — higher is better. Amber marks the edge.</div>`;
  h+=cmpRow("Overall", oA, oB, cA, cB,
        `Hashmark Rating — ${ta.school} ${f3(oA)} (#${rkA}) vs ${tb.school} ${f3(oB)} (#${rkB}). The learned, results-aware blend the matchup is built on.`, true);
  h+=cmpRow("Offense", offA, offB, cA, cB,
        `Offense rating — ${ta.school} ${f3(offA)} vs ${tb.school} ${f3(offB)}. ${CMETA.off_eff.tip}`, true);
  h+=cmpRow("Defense", defA, defB, cA, cB,
        `Defense rating — ${ta.school} ${f3(defA)} vs ${tb.school} ${f3(defB)}. ${CMETA.def_eff.tip}`, true);
  h+=`</div>`;

  // component breakdown (what else drives the overall, beyond the unit ratings above)
  h+=`<div class="cmpsec"><div class="sectitle">What's driving the matchup</div>
    <div class="secsub">Each team's other rating factors, head-to-head. Tap a row for what it means.</div>`;
  CORDER.filter(k=>k!=="off_eff"&&k!=="def_eff").forEach(k=>{
    const m=CMETA[k], va=cvA[k]||0, vb=cvB[k]||0;
    h+=cmpRow(m.name, va, vb, cA, cB,
      `${m.name} — ${ta.school} ${f3(va)} vs ${tb.school} ${f3(vb)}. ${m.tip}`, false);
  });
  h+=`</div>`;

  // tiering: the single-game projection is the free hook; deeper sims stay premium
  h+=`<div class="cmpsec"><div class="sectitle">Go deeper</div>
    <div class="secsub">This single-game projection is <b style="color:var(--teal)">free</b>. Premium runs the full forward model.</div>`;
  h+=premCard('<svg class="ic" aria-hidden="true"><use href="#i-cal"/></svg>',"Full-season simulation",
    `Simulate every game on both schedules for win totals, CFP odds & a projected head-to-head if they actually meet`,
    `<div class="fakebar" style="width:88%"></div><div class="fakebar" style="width:64%"></div><div class="fakebar" style="width:78%"></div>`);
  h+=premCard('<svg class="ic" aria-hidden="true"><use href="#i-chat"/></svg>',"Ask Hashmark",`Ask anything about this matchup — tempo, injuries, how the edge could swing`,
    `<div class="fakebar" style="width:93%"></div><div class="fakebar" style="width:70%"></div>`);
  h+=`</div>`;

  h+=`<div class="note"><b>${phaseTitle()} — Hashmark projection.</b> A single-game projection from our ${SEASON_PHASE.started?"current":"way-too-early preseason"} ratings: projected margin = the teams' rating gap on a points scale plus the model's home-field value, and win probability is the normal-model share of outcomes above zero at the calibrated &sigma;=${ENGINE.sigma}. ${SEASON_PHASE.started?`Ratings update weekly as ${SEASON_SCHED} results land.`:"Early-offseason data is thin, so it leans on 2025 results and will sharpen through the summer."} ${BRAND_LINE}</div></div>`;

  app.innerHTML = h;
  document.querySelector(".back").onclick = load;
  document.querySelectorAll(".venue button").forEach(btn=>{
    btn.onclick=()=>{ if(cmp.venue!==btn.dataset.venue){ cmp.venue=btn.dataset.venue; drawCompare(); } };
  });
  document.querySelectorAll(".pick").forEach(p=>{
    p.onclick=()=> openPicker(p.dataset.pick);
  });
}

function statExample(d, school, v, base){
  const val=fmtStat(v,d.format), b=base!=null?fmtStat(base,d.format):null;

  if(/ppa|epa|explosiveness/i.test(key) && base!=null){

async function ensureCatalog(){

function fmtStat(v, fmt){
  if(v==null||v==="") return "—"; v=Number(v);
  switch(fmt){
    case "int": return Math.round(v).toLocaleString();
    case "1dp": return v.toFixed(1);
    case "2dp": return v.toFixed(2);
    case "3dp": return v.toFixed(3);
    case "pct": return (v*100).toFixed(1)+"%";
    case "signed": return (v>0?"+":"")+Math.round(v);
    case "signed1": return (v>0?"+":"")+v.toFixed(1);
    case "time": { const m=Math.floor(v/60), s=Math.round(v%60); return m+":"+String(s).padStart(2,"0"); }
    default: return v.toFixed(1);
  }
}
const ordinal = n => { const v=n%100, s=["th","st","nd","rd"]; return n+(s[(v-20)%10]||s[v]||s[0]); };

function _catStat(stats, t){ const v=stats&&stats[t]; return v==null||v===""?null:v; }

    const acc={};   // cat -> {home:{}, away:{}}
    games.forEach(g=>{ const loc=g.home_away==="home"?"home":"away";
      const a=acc[g.category]=acc[g.category]||{home:{},away:{},hn:0,an:0};
      (GLOG_SHOW[g.category]||[]).forEach(([k])=>{ const v=parseFloat(String(g.stats&&g.stats[k]).replace(/[^0-9.\-]/g,""));
        if(!isNaN(v)) a[loc][k]=(a[loc][k]||0)+v; });
      if(loc==="home") a.hn++; else a.an++; });
    const cats=CAT_ORDER.filter(c=>acc[c]);
    if(cats.length){
      h+=`<div class="sec"><div class="sectitle">Splits — home / away</div>
        <div class="secsub">2025 totals by game location (game-context split). Source: CFBD.</div>
        <div class="splithead"><div></div><div>Home</div><div>Away</div></div>`;
      cats.forEach(c=>{ const a=acc[c];
        const line=(side)=>(GLOG_SHOW[c]||[]).map(([k,lb])=>a[side][k]!=null?`${Math.round(a[side][k])} ${lb}`:null).filter(Boolean).join(", ")||"—";
        h+=`<div class="splitrow"><div class="slk">${CAT_LABEL[c]||c}</div>
          <div class="slv off"><b style="color:var(--text)">${line("home")}</b></div>
          <div class="slv def"><b style="color:var(--text)">${line("away")}</b></div></div>`; });
      h+=`</div>`;
    }
  }
  // 2025 game log (merge categories per game)
  if(games.length){
    const byGame={};
    games.forEach(g=>{ const e=byGame[g.game_id]=byGame[g.game_id]||{week:g.week,st:g.season_type,opp:g.opponent_id,ha:g.home_away,cats:{}};
      e.cats[g.category]=g.stats; });
    const list=Object.entries(byGame).sort((a,b)=>(stOrder(a[1].st)-stOrder(b[1].st))||(a[1].week-b[1].week));
    h+=`<div class="sec"><div class="sectitle">2025 game log</div>
      <div class="secsub">Per-game stat lines. Tap a game for the full box score. Source: CFBD.</div>`;
    list.forEach(([gid,g])=>{
      const opp=teamMeta[g.opp]||{school:"opp"}, ha=g.ha==="home"?"vs":"at";
      let bits=[];
      CAT_ORDER.forEach(cat=>{ const st=g.cats[cat]; if(!st) return;
        const parts=(GLOG_SHOW[cat]||[]).map(([k,lb])=>st[k]!=null?`${st[k]} ${lb}`:null).filter(Boolean);
        if(parts.length) bits.push(parts.join(", ")); });
      h+=`<div class="glrow" data-box="${gid}" data-bteam="${idx.team_id}">
        ${crestEl("glcr",opp.school,oppColor(g.opp))}
        <div class="glopp"><div class="ha">${ha}${g.st==="postseason"?" · Bowl/CFP":` · Wk ${g.week}`}</div>
          <div class="on">${esc(opp.school)}</div></div>
        <div class="glsc" style="flex:1.4"><small>${bits.join(" · ")||"—"}</small></div>
        <div class="chev">›</div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="note"><b>Player stats — official.</b> Season totals and per-game lines from CFBD. The forward-looking "returning leaders" elsewhere show 2026-active players only; this player page is the complete record incl. departed players ("2025 final"). Names &amp; stats only — no photos. ${BRAND_LINE}</div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=load;
}

function statProfile(cat, statsRows, school){
  const cur={}, prior={};
  statsRows.forEach(r=>{ (Number(r.season)===STAT_SEASON?cur:prior)[r.stat_key]=r; });
  let h=`<div class="sec"><div class="sectitle">2025 stat profile</div>
    <div class="secsub">Official season stats with national rank + percentile. Tap a label for what it means. Source: CFBD.</div>`;
  let any=false;
  STAT_GROUPS.forEach(grp=>{
    const defs=(cat.groups[grp]||[]).filter(d=>cur[d.stat_key]);
    if(!defs.length) return;
    any=true;
    const sideTag = grp==="Defense"?`<span class="sd def">DEF</span>`:grp==="Offense"?`<span class="sd off">OFF</span>`:"";
    h+=`<div class="statgrp"><div class="sgtitle">${grp}${sideTag}</div>`;
    defs.forEach(d=>{
      const r=cur[d.stat_key], pct=Number(r.percentile), bkt=rankBucket(pct), val=fmtStat(r.value,d.format);
      const baseV=_baselines&&_baselines.stat[d.stat_key];
      const tip=`${esc(d.display_name)} — ${esc(d.description)} ${esc(statExample(d, school, r.value, baseV))} #${r.rank} nationally (${ordinal(Math.round(pct))} percentile, ${STAT_SEASON}).`;
      const pr=prior[d.stat_key];
      let dlt=`<div class="dlt"></div>`;
      if(pr){ const dv=Number(pr.rank)-Number(r.rank);
        dlt = dv ? `<div class="dlt ${dv>0?"up":"down"}" data-tip="2024 rank #${pr.rank} to 2025 #${r.rank}.">${dv>0?'<svg class="ic" aria-hidden="true"><use href="#i-up"/></svg>':'<svg class="ic" aria-hidden="true"><use href="#i-down"/></svg>'}${Math.abs(dv)}</div>` : `<div class="dlt">—</div>`; }
      h+=`<div class="statrow">
        <div class="snm" data-tip="${tip}">${esc(d.display_name)}</div>
        <div class="sval">${val}</div>
        <div class="srk r-${bkt}">#${r.rank}</div>
        <div class="statbar"><i class="bg-${bkt}" style="width:${Math.max(4,pct)}%"></i></div>
        ${dlt}</div>`;
    });
    h+=`</div>`;
  });
  return any ? h+`</div>` : "";
}
// category -> [label, noun (for the empty-state note), headline key, [secondary key, suffix]]
const LEADER_CATS=[
  ["passing","Passing","passer",["YDS","yds"],["TD","TD"]],
  ["rushing","Rushing","rusher",["YDS","yds"],["TD","TD"]],
  ["receiving","Receiving","receiver",["YDS","yds"],["REC","rec"]],

function teamLeaders(players){
  const byCat={};
  players.forEach(p=>{ const c=byCat[p.category]=byCat[p.category]||{};
    const pl=c[p.player]=c[p.player]||{pos:p.position,stats:{}}; pl.stats[p.stat_key]=Number(p.value); });
  const lead=(cat,key)=>{ const c=byCat[cat]; if(!c) return null; let best=null;
    for(const nm in c){ const v=c[nm].stats[key]; if(v!=null&&(!best||v>best.v)) best={nm,v,pos:c[nm].pos,stats:c[nm].stats}; }
    return best; };
  let h=`<div class="sec"><div class="sectitle">Returning leaders</div>
    <div class="secsub">Top <b>returning</b> producers' <b>2025</b> stats — players active in 2026 only (NFL draftees &amp; graduated seniors excluded). Names &amp; stats only. Source: CFBD.</div>`;
  // Always render a row per category — show the best RETURNING player, or a note if none qualifies,
  // so a slot is never silently dropped when a team's top producer departed.
  LEADER_CATS.forEach(([cat,label,noun,a,b])=>{
    const p=lead(cat,a[0]);
    if(p){
      const av=p.stats[a[0]], bv=p.stats[b[0]];
      h+=`<div class="leadrow"><div class="lpos">${label}</div>
        <div class="lnm">${esc(p.nm)} <small>${esc(p.pos||"")}</small></div>
        <div class="lst">${Math.round(av).toLocaleString()}<small>${a[1]}${bv!=null?" · "+Math.round(bv)+" "+b[1]:""}</small></div></div>`;
    }else{
      h+=`<div class="leadrow"><div class="lpos">${label}</div>
        <div class="lnm"><span class="lnote">No returning ${noun} with qualifying 2025 snaps</span></div>
        <div class="lst"></div></div>`;
    }
  });
  return h+`</div>`;
}
function teamHonors(honors){
  const aa=honors.filter(h=>h.ranking_type==="all_american");
  const cons=aa.filter(h=>h.source==="Consensus");
  const single=aa.filter(h=>h.source!=="Consensus");
  const poll=honors.filter(h=>h.ranking_type==="preseason_poll");
  if(!aa.length && !poll.length) return "";
  const seen=new Set(); let h=`<div class="sec"><div class="sectitle">Around CFB — preseason 2026</div>
    <div class="secsub">Third-party preseason honors &amp; rankings, attributed to each outlet — <b>not</b> Hashmark ratings.</div>`;
  poll.forEach(x=>{ h+=`<div class="honor"><div class="hb">${esc((x.source||"").toUpperCase().slice(0,10))}</div>
    <div class="hn">Projected <b>#${x.rank}</b> in <a class="srcpill" href="${esc(x.source_url)}" target="_blank" rel="noopener">${esc(x.source)}'s 2026 preseason Top&nbsp;25</a></div></div>`; });
  const row=(x,badge)=>{ seen.add(normName(x.player));
    return `<div class="honor"><div class="hb">${badge}</div>
      <div class="hn">${esc(x.player)} <small>· ${esc(x.position||"")}</small></div>
      <div class="hpos">preseason AA</div></div>`; };
  cons.forEach(x=>{ h+=row(x,"CONSENSUS"); });
  single.forEach(x=>{ if(seen.has(normName(x.player))) return; h+=row(x, x.source==="ESPN"?"ESPN":"P. STEELE"); });
  return h+`</div>`;
}

// B4: custom dropdown — THE app-standard select. items:[{value,label,group?}].
// Accessible combobox pattern: focus stays on the button; aria-activedescendant tracks the
// focused option; ArrowUp/Down move, Enter/Space pick, Esc closes, outside click closes.
let _ddSeq=0;
function mountAppSelect(host, items, value, onChange, opts={}){
  if(!host) return; if(!host.id) host.id="appdd"+(++_ddSeq);
  let cur=value;
  host.classList.add("appdd"); if(opts.slim) host.classList.add("slim");
  const render=()=>{
    let list="", lastG=null;
    items.forEach((it,ix)=>{
      if(it.group && it.group!==lastG){ lastG=it.group; list+=`<div class="appdd-grp">${esc(it.group)}</div>`; }
      const sel=String(it.value)===String(cur);
      list+=`<div class="appdd-opt ${sel?"sel":""}" role="option" id="${host.id}-o${ix}" aria-selected="${sel}" data-ix="${ix}">
        <span>${esc(it.label)}</span><svg class="ic" aria-hidden="true"><use href="#i-check"/></svg></div>`; });
    const curIt=items.find(i=>String(i.value)===String(cur));
    host.innerHTML=`<button type="button" class="appdd-btn" aria-haspopup="listbox" aria-expanded="false"
        ${opts.ariaLabel?`aria-label="${esc(opts.ariaLabel)}"`:""} ${opts.disabled?"disabled":""}>${esc(curIt?curIt.label:(opts.placeholder||"Select"))}</button>
      <div class="appdd-pop" role="listbox" id="${host.id}-list">${list}</div>`;
    const btn=host.querySelector(".appdd-btn"), pop=host.querySelector(".appdd-pop");
    let focusIx=Math.max(0, items.findIndex(i=>String(i.value)===String(cur)));
    const optEls=()=>[...pop.querySelectorAll(".appdd-opt")];
    const setFocus=ix=>{ focusIx=Math.max(0,Math.min(items.length-1,ix));
      optEls().forEach(o=>o.classList.toggle("focus",Number(o.dataset.ix)===focusIx));
      btn.setAttribute("aria-activedescendant",`${host.id}-o${focusIx}`);
      const el=pop.querySelector(`[data-ix="${focusIx}"]`); if(el) el.scrollIntoView({block:"nearest"}); };
    const onDoc=e=>{ if(!host.contains(e.target)) close(); };
    const close=()=>{ host.classList.remove("open"); btn.setAttribute("aria-expanded","false"); document.removeEventListener("click",onDoc,true); };
    const open=()=>{ document.querySelectorAll(".appdd.open").forEach(d=>{ if(d!==host) d.classList.remove("open"); });
      host.classList.add("open"); btn.setAttribute("aria-expanded","true"); setFocus(focusIx);
      document.addEventListener("click",onDoc,true); };
    const pick=ix=>{ const it=items[ix]; if(!it) return; cur=it.value; close(); render(); if(onChange) onChange(it.value); };
    btn.onclick=e=>{ e.stopPropagation(); host.classList.contains("open")?close():open(); };
    pop.onclick=e=>{ const o=e.target.closest(".appdd-opt"); if(o){ e.stopPropagation(); pick(Number(o.dataset.ix)); } };
    btn.onkeydown=e=>{
      const isOpen=host.classList.contains("open");
      if(e.key==="ArrowDown"||e.key==="ArrowUp"){ e.preventDefault(); isOpen?setFocus(focusIx+(e.key==="ArrowDown"?1:-1)):open(); }
      else if(e.key==="Enter"||e.key===" "){ e.preventDefault(); isOpen?pick(focusIx):open(); }
      else if(e.key==="Escape"&&isOpen){ e.preventDefault(); close(); } };
  };
  render();
}

  ["off","situation","3rd & long","Offense on 3rd & long"],

const SPLIT_METRICS=[["epa_per_play","EPA/play","3dp"],["success_rate","Success rate","pct"],["explosive_rate","Explosive rate","pct"]];
let splitPreset=0, splitMetric="epa_per_play";
async function renderSplitLeaders(body){

  let mtoggle=SPLIT_METRICS.map(x=>`<button class="spm ${x[0]===splitMetric?"on":""}" data-spm="${x[0]}">${x[1]}</button>`).join("");
  let h=`<div class="secsub" style="padding:0 2px 8px">Situational splits from official play-by-play — garbage time removed. ${side==="def"?"Lower is better (less allowed).":"Higher is better."} 2025.</div>

async function renderConfView(body){
  const METRICS=[["points_per_game","Scoring offense"],["opp_points_per_game","Scoring defense"],
    ["off_ppa","Offense EPA/play"],["def_ppa","Defense EPA/play"]];
  const data=await Promise.all(METRICS.map(([k])=>statRows(k)));
  let h="";
  METRICS.forEach(([k,label],idx)=>{ const d=_catalog.by[k];
    const byc={}; data[idx].forEach(r=>{ const t=teamMeta[r.team_id]; if(!t||!t.conference) return;
      (byc[t.conference]=byc[t.conference]||[]).push(Number(r.value)); });
    const confs=Object.keys(byc).map(c=>({c,avg:mean(byc[c]),n:byc[c].length})).filter(x=>x.n>=4)
      .sort((a,b)=>d.higher_is_better?b.avg-a.avg:a.avg-b.avg);
    const mx=Math.max(...confs.map(x=>Math.abs(x.avg)),0.001);

const POSGRP={QB:"QB",RB:"RB",WR:"WR / TE",TE:"WR / TE",OT:"Offensive line",G:"Offensive line",C:"Offensive line",
  OL:"Offensive line",EDGE:"Front seven",DT:"Front seven",DL:"Front seven",LB:"Front seven",

async function openPreseason(){

  }catch(e){ app.innerHTML=backHeader("Preseason")+`<div class="list"><div class="err">Couldn't load: ${e.message}</div></div>`;
    document.querySelector(".back").onclick=load; }

function renderPreseason(rows){
  const aa=rows.filter(r=>r.ranking_type==="all_american");
  const cons=aa.filter(r=>r.source==="Consensus");
  const espn=aa.filter(r=>r.source==="ESPN"), steele=aa.filter(r=>r.source==="Phil Steele");
  const poll=rows.filter(r=>r.ranking_type==="preseason_poll").sort((a,b)=>a.rank-b.rank);
  const asof=(rows.find(r=>r.as_of_date)||{}).as_of_date||"";
  const link=(src,url)=>url?`<a class="srcpill" href="${esc(url)}" target="_blank" rel="noopener"><b>${esc(src)}</b> <svg class="ic" aria-hidden="true"><use href="#i-up-r"/></svg></a>`:`<span class="srcpill"><b>${esc(src)}</b></span>`;
  const teamTap=r=>r.team_id?` data-team="${r.team_id}"`:"";
  // audit-players brief //5: All-American PLAYER cells are display-only — browsing the AA
  // team must never dump the user onto a random team's home page.
  const aaTap=_r=>"";

  let h=`<div class="cmp">`+backHeader("Preseason")+`<div class="list" style="padding-top:6px">
    <div class="secsub" style="padding:0 2px 10px">Preseason 2026 — <b>third-party</b> selections &amp; projections, attributed and linked. <b>Not</b> Hashmark ratings. As of ${esc(asof)}.</div>`;

  // Consensus All-America team (grouped by position group)
  if(cons.length){
    h+=`<div class="sec"><div class="sectitle">Consensus All-Americans</div>
      <div class="secsub">Players named first-team by <b>2+ outlets</b> (${link("ESPN",espn[0]&&espn[0].source_url)} ${link("Phil Steele",steele[0]&&steele[0].source_url)}). Hashmark tally of their picks — not our rating.</div>`;
    const grp={}; cons.forEach(r=>{ const g=POSGRP[r.position]||"Other"; (grp[g]=grp[g]||[]).push(r); });
    Object.keys(grp).forEach(g=>{
      h+=`<div class="sgtitle" style="margin-top:10px">${g}</div><div class="aagrid">`;
      grp[g].forEach(r=>{ const t=teamMeta[r.team_id];
        h+=`<div class="aacell"${aaTap(r)}><div class="ap">${esc(r.position||"")}</div>
          <div class="anm">${esc(r.player)}<span class="scbadge sc-cons">2+</span></div>
          <div class="asc">${esc(t?t.school:r.school)}</div></div>`; });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  // By-source All-America teams
  const srcBlock=(label,list,url)=>{
    if(!list.length) return "";
    let b=`<div class="sec"><div class="sectitle">${label} — preseason All-America</div>
      <div class="secsub">First team, per ${link(label,url)}. Facts only (player · position · school).</div><div class="aagrid">`;
    list.forEach(r=>{ const t=teamMeta[r.team_id];
      b+=`<div class="aacell"${aaTap(r)}><div class="ap">${esc(r.position||"")}</div>
        <div class="anm">${esc(r.player)}</div><div class="asc">${esc(t?t.school:r.school)}</div></div>`; });
    return b+`</div></div>`;
  };
  h+=srcBlock("ESPN", espn, espn[0]&&espn[0].source_url);
  h+=srcBlock("Phil Steele", steele, steele[0]&&steele[0].source_url);

  // Preseason Top 25 — EVERY source, per-source lists + a consensus (brief #6: no single
  // outlet is featured as THE source; facts only, attributed and linked)
  const bySrc={}; poll.forEach(r=>{ (bySrc[r.source]=bySrc[r.source]||[]).push(r); });
  const srcs=Object.keys(bySrc).sort();
  h+=`<div class="sec"><div class="sectitle">Preseason Top 25 <small>${srcs.length} source${srcs.length===1?"":"s"}</small></div>`;
  if(srcs.length){
    if(srcs.length>=2){
      const agg={};
      srcs.forEach(sc=>bySrc[sc].forEach(r=>{ const k=r.team_id||r.school;
        (agg[k]=agg[k]||{team_id:r.team_id, school:r.school, ranks:[]}).ranks.push(Number(r.rank)); }));
      const consT=Object.values(agg).map(x=>({...x, avg:x.ranks.reduce((a2,b2)=>a2+b2,0)/x.ranks.length, n:x.ranks.length}))
        .sort((x,y)=>(y.n-x.n)||(x.avg-y.avg)).slice(0,25);
      h+=`<div class="sgtitle">Hashmark consensus <small>average rank · appearances across ${srcs.length} outlets</small></div>`;
      consT.forEach((r,i)=>{ const t=teamMeta[r.team_id];
        h+=`<div class="t25row"${r.team_id?` data-team="${r.team_id}"`:""}><div class="trk">${i+1}</div>
          ${crestEl("schedcr",(t?t.school:r.school),t?hx(t.color):"#384455")}
          <div class="tnm">${esc(t?t.school:r.school)}<small> avg #${r.avg.toFixed(1)} · ${r.n}/${srcs.length} lists</small></div></div>`; });
    }
    srcs.forEach(sc=>{ const list=bySrc[sc].slice().sort((x,y)=>x.rank-y.rank);
      // legal/rendering rule (owner, Jul 19): subjective outlet rankings render as a
      // TOP-10 EXCERPT + outbound link — never any single outlet's full 25 verbatim.
      // Official poll-result facts (AP/Coaches when they release) may render in full.
      const official=/official/i.test(list[0].group_or_poll||"") || sc==="AP Top 25" || sc==="Coaches Poll";
      const shown=official?list:list.slice(0,10);
      h+=`<div class="sgtitle" style="margin-top:10px">${esc(sc)} <small>${official?"official poll":"top-10 excerpt"}</small></div>`;
      shown.forEach(r=>{ const t=teamMeta[r.team_id];
        h+=`<div class="t25row"${teamTap(r)}><div class="trk">${r.rank}</div>
          ${crestEl("schedcr",(t?t.school:r.school),t?hx(t.color):"#384455")}
          <div class="tnm">${esc(t?t.school:r.school)}</div></div>`; });
      if(!official) h+=`<div class="morelink"><a class="srcpill" href="${esc(list[0].source_url||"#")}" target="_blank" rel="noopener">Full list at ${esc(sc)} <svg class="ic" aria-hidden="true"><use href="#i-up-r"/></svg></a></div>`; });
    h+=`<div class="secsub" style="padding-top:8px">The official <b>AP &amp; Coaches</b> preseason polls auto-appear here when released in August.</div>`;
  } else {
    h+=`<div class="secsub">The official AP &amp; Coaches preseason Top 25 release in August — they'll appear here automatically (CFBD).</div>`;
  }
  h+=`</div>`;

  h+=`<div class="note"><b>Preseason 2026 — third-party.</b> All selections belong to the cited outlets and link to their source; Hashmark compiles a consensus only where 2+ agree and copies facts only, never their analysis. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=load;
}

// ---- in-app history stack (teampage brief #3): the browser Back button retraces the
// actual view path one step at a time, only leaving the app at the stack bottom. Each
// open* navigation pushes a state; popstate re-renders that view and restores scroll.
let _navRestoring=false;
const NAV_ROUTES={
  home:  p=>{ if(p&&p.view) view=p.view; load(); },
  team:  p=>openDetail(p.id),
  player:p=>openPlayer(p.id),
  scores:()=>openScores(),
  stats: p=>openStats(p.tab),
  standings:()=>openStandings(),
  sim:   ()=>openSimulator(),
  pickem:()=>openPickem(),
  method:()=>openMethodology(),
  checking:()=>openCheckingWork(),
  accuracy:()=>openAccuracy(),
  signature:()=>openSignature(),
  preseason:()=>openPreseason(),
  matchup:()=>openMatchup(),
  explore:()=>openExplore(),
  whatwins:()=>openWhatWins(),
  playerrank:()=>openPlayerRankings(),
  newsarchive:p=>openNewsArchive(p&&p.team),
  standingsboard:()=>openStandings(),
  quadrant:()=>openQuadrant(),
  whyrating:p=>openWhyRating(p&&p.id),
  luck:()=>openLuckLedger(),
  gauntlet:p=>openGauntlet(p&&p.id),
  oddstime:p=>openOddsTimeline(p&&p.id),
  nileconomy:()=>openNILEconomy(),
  crowdmodel:()=>openUpsetRadar(),
  rosterecon:p=>openRosterEconomy(p&&p.id),
  playercard:p=>openPlayerCard(p&&p.a, p&&p.b),
};
function navPush(v,p){
  if(_navRestoring) return;
  try{
    const cur=history.state;
    if(cur&&cur.hm) history.replaceState({...cur, scroll:window.scrollY}, "");
    history.pushState({hm:1, v, p:p||{}}, "");
  }catch(e){}
}
window.addEventListener("popstate", e=>{
  const st=e.state;
  if(!st||!st.hm) return;              // beyond our bottom -> the browser leaves normally
  _navRestoring=true;
  try{ const f=NAV_ROUTES[st.v]; if(f) f(st.p||{}); }catch(_e){}
  setTimeout(()=>{ _navRestoring=false; if(st.scroll!=null) window.scrollTo(0, st.scroll); }, 120);
});
try{ history.replaceState({hm:1, v:"home", p:{}}, ""); }catch(e){}
// wrap every navigation entry point (plain-script function declarations live on window).
// DEFERRED with setTimeout(0): openWhatWins/openSignature/... are declared in a LATER
// script block — all blocks evaluate synchronously before timers fire, so this wraps
// everything regardless of which block declared it.
setTimeout(()=>{
[["openDetail","team",id=>({id})],
 ["openPlayer","player",id=>({id})],
 ["openScores","scores"],["openStats","stats",tab=>({tab})],
 ["openStandings","standings"],["openSimulator","sim"],["openPickem","pickem"],
 ["openMethodology","method"],["openCheckingWork","checking"],["openAccuracy","accuracy"],
 ["openSignature","signature"],["openPreseason","preseason"],["openMatchup","matchup"],
 ["openExplore","explore"],["openWhatWins","whatwins"],["openPlayerRankings","playerrank"],
 ["openNewsArchive","newsarchive",team=>({team})],
 ["openQuadrant","quadrant"],["openWhyRating","whyrating",id=>({id})],
 ["openLuckLedger","luck"],["openGauntlet","gauntlet",id=>({id})],
 ["openOddsTimeline","oddstime",id=>({id})],
 ["openNILEconomy","nileconomy"],["openUpsetRadar","crowdmodel"],
 ["openRosterEconomy","rosterecon",id=>({id})],["openPlayerCard","playercard",(a,b2)=>({a,b:b2})],
].forEach(([name,v,mapper])=>{
  const f=window[name];
  if(typeof f!=="function") return;
  window[name]=function(...args){ navPush(v, mapper?mapper(...args):{}); return f.apply(this,args); };
});
}, 0);
// the season toggle is a navigation too — home states carry the active view
const _wireToggle=wireToggle;
wireToggle=function(){
  _wireToggle();
  document.querySelectorAll(".toggle button[data-v]").forEach(b=>{
    const prev=b.onclick;
    b.onclick=()=>{ if(b.dataset.v!==view){ navPush("home",{view:b.dataset.v}); } if(prev) prev(); };
  });
};

// V2 — Factor Waterfall: FBS-average baseline to final rating, one signed step per
// additive factor. The comps sum exactly to the overall (registry guarantee).
function waterfallSVG(comps, overall, t){
  const parts=CORDER.map(k=>{ const c=(comps||[]).find(x=>x.component===k);
    return c?{k, v:Number(c.value)}:null; }).filter(Boolean);
  if(!parts.length) return "";
  const W=340, RH=22, H=(parts.length+1)*RH+34;
  let cum=0; const pts=[{cum0:0}];
  const bounds=[0];
  parts.forEach(p=>{ bounds.push(cum, cum+p.v); cum+=p.v; });
  bounds.push(overall);
  const lo=Math.min(...bounds), hi=Math.max(...bounds);
  const span=Math.max(0.02, hi-lo);
  const PL=78, PR=W-42;                       // label column left, value gutter right
  const X=v=>PL+(v-lo)/span*(PR-PL);
  const col=hx((t&&t.color)||"#E8B657");
  const vlab=(a,b,y,txt,bold)=> (b+34<=W)
    ? `<text x="${b+4}" y="${y}" fill="var(--text${bold?"":"3"})" font-size="8.5"${bold?' font-weight="700"':""}>${txt}</text>`
    : `<text x="${a-4}" y="${y}" fill="var(--text${bold?"":"3"})" font-size="8.5" text-anchor="end"${bold?' font-weight="700"':""}>${txt}</text>`;
  let s=`<svg class="wfall" viewBox="0 0 ${W} ${H}" role="img" aria-label="Factor waterfall">`;
  s+=`<line x1="${X(0)}" y1="6" x2="${X(0)}" y2="${H-24}" stroke="rgba(148,163,184,.35)" stroke-dasharray="3 3"/>`;
  s+=`<text x="${Math.max(46,X(0))}" y="${H-14}" fill="var(--text3)" font-size="8.5" text-anchor="middle">FBS average</text>`;
  cum=0;
  parts.forEach((p,i)=>{ const y=8+i*RH;
    const a=X(Math.min(cum,cum+p.v)), b=X(Math.max(cum,cum+p.v));
    s+=`<text x="${PL-8}" y="${y+10}" fill="var(--text2)" font-size="9" text-anchor="end">${CMETA[p.k].name}</text>`;
    s+=`<rect x="${a}" y="${y+2}" width="${Math.max(2,b-a)}" height="11" rx="2.5" fill="${p.v>=0?"#5BD39A":"#E5705C"}" opacity=".9"><title>${esc(CMETA[p.k].name+" "+f3(p.v)+" — "+CMETA[p.k].tip)}</title></rect>`;
    s+=vlab(a,b,y+11,f3(p.v),false);
    cum+=p.v;
    if(i<parts.length-1) s+=`<line x1="${X(cum)}" y1="${y+13}" x2="${X(cum)}" y2="${y+RH+2}" stroke="rgba(148,163,184,.4)"/>`;
  });
  const fy=8+parts.length*RH;
  const fa=X(Math.min(0,overall)), fb=X(Math.max(0,overall));
  s+=`<text x="${PL-8}" y="${fy+10}" fill="var(--text)" font-size="9" font-weight="700" text-anchor="end">Rating</text>`;
  s+=`<rect x="${fa}" y="${fy+2}" width="${Math.max(2,fb-fa)}" height="11" rx="2.5" fill="${col}" stroke="var(--amber)" stroke-width="1"/>`;
  s+=vlab(fa,fb,fy+11,f3(overall),true);
  return s+`</svg><div class="secsub" style="padding:0 2px 4px">From FBS average to the final rating — every factor's exact contribution (${phaseLabel()}).</div>`;
}

function gauntletP(teamId, g, wpm){
  const lo=Math.min(+g.home_team_id,+g.away_team_id), hi=Math.max(+g.home_team_id,+g.away_team_id);
  const row=wpm.get(lo+"-"+hi); if(!row) return null;

  let pHome;
  if(g.neutral_site){ const pLo=Number(row.win_prob_a); pHome=(+g.home_team_id===lo)?pLo:1-pLo; }
  else if(+g.home_team_id===lo) pHome=Number(row.win_prob_a_home);
  else pHome=1-Number(row.win_prob_a_away);
  return home?pHome:1-pHome;
}

  // record distribution: Poisson-binomial over remaining win probs + locked results
  const probs=games.map(g=>{ const done=g.completed&&g.home_points!=null;
    if(done){ const home=+g.home_team_id===+teamId; return (home?g.home_points>g.away_points:g.away_points>g.home_points)?1:0; }

    <i style="height:${Math.max(2,d/dmax*34)}px"></i><small>${w}</small></div>`).join("");
  return `<div class="gauntlet">${cells}</div>
    <div class="rdist"><div class="rdbars">${bars}</div>
    <div class="secsub" style="padding:2px 2px 0">Projected-record distribution — how often each win total lands (${SEASON_SCHED}, model win probabilities). Most likely: <b>${dist.indexOf(dmax)}–${games.length-dist.indexOf(dmax)}</b>.</div></div>`;
}

    const iv=Number(p.in_value), ov=Number(p.out_value), mx=Math.max(iv,ov,1);
    flow=`<div class="sec"><div class="sectitle">${esc(t.school)} — portal production flow <small>entering ${SEASON_SCHED}</small></div>
      <div class="secsub">Width = prior-season on-field production value of the players moving (PPA + usage, position-weighted). Recruiting stars appear nowhere in this number.</div>
      <div class="flowwrap">
        <div class="flowbar"><div class="flowlbl">IN</div><i class="in" style="width:${iv/mx*100}%"></i><b>+${iv.toFixed(1)}</b></div>
        <div class="flowbar"><div class="flowlbl">OUT</div><i class="out" style="width:${ov/mx*100}%"></i><b>-${ov.toFixed(1)}</b></div>
        <div class="secsub" style="padding:4px 2px">Net: <b>${Number(p.net_value)>=0?"+":""}${Number(p.net_value).toFixed(1)}</b> production value</div></div>
      ${(p.top_in||[]).length?`<div class="ha" style="padding:4px 2px">Biggest arrivals: ${(p.top_in||[]).map(x=>`${esc(x.player)} (${esc(x.pos)}, from ${esc(x.from)})`).join(" · ")}</div>`:""}
      ${(p.top_out||[]).length?`<div class="ha" style="padding:2px 2px 6px">Biggest departures: ${(p.top_out||[]).map(x=>`${esc(x.player)} (${esc(x.pos)}, to ${esc(x.to)})`).join(" · ")}</div>`:""}</div>`;
  }
  // talent-vs-performance scatter: talent input (x) vs current rating (y); distance from
  // the fit line = coaching over-expectation (the WOEC lane).
  const tmap={}; tal.forEach(r=>tmap[r.team_id]=Number(r.talent));
  const pts=board2026.map((b,i)=>({id:b.team_id, t:b.teams||{}, x:tmap[b.team_id], y:Number(b.overall), rank:i+1}))
    .filter(pp=>pp.x!=null&&isFinite(pp.y));
  const n=pts.length, mx2=pts.reduce((s,pp)=>s+pp.x,0)/n, my2=pts.reduce((s,pp)=>s+pp.y,0)/n;
  const bc=pts.reduce((s,pp)=>s+(pp.x-mx2)*(pp.y-my2),0)/Math.max(1e-9,pts.reduce((s,pp)=>s+(pp.x-mx2)*(pp.x-mx2),0));
  const a02=my2-bc*mx2;
  pts.forEach(pp=>pp.resid=pp.y-(a02+bc*pp.x));
  const W=360,H=300,PAD=26;
  const xlo=Math.min(...pts.map(p2=>p2.x)), xhi=Math.max(...pts.map(p2=>p2.x));
  const ylo2=Math.min(...pts.map(p2=>p2.y)), yhi2=Math.max(...pts.map(p2=>p2.y));
  const SX=v=>PAD+(v-xlo)/Math.max(1e-9,xhi-xlo)*(W-2*PAD), SY=v=>H-PAD-(v-ylo2)/Math.max(1e-9,yhi2-ylo2)*(H-2*PAD);
  let sc=`<svg class="quad" viewBox="0 0 ${W} ${H}">`;
  sc+=`<line x1="${SX(xlo)}" y1="${SY(a02+bc*xlo)}" x2="${SX(xhi)}" y2="${SY(a02+bc*xhi)}" stroke="rgba(148,163,184,.5)" stroke-dasharray="4 3" stroke-width="1.5"/>`;
  sc+=`<text x="${W-PAD}" y="${PAD-8}" fill="#5BD39A" font-size="9" font-weight="700" text-anchor="end">coaching over-expectation</text>`;
  pts.forEach(pp=>{ const me=String(pp.id)===String(teamId);
    sc+=`<circle cx="${SX(pp.x)}" cy="${SY(pp.y)}" r="${me?9:6}" fill="${hx(pp.t.color)}" opacity="${me?1:.65}" ${me?'stroke="var(--amber)" stroke-width="2.5"':""} data-rteam="${pp.id}" style="cursor:pointer"><title>${esc((pp.t.school||"?")+" — talent "+pp.x.toFixed(0)+", rating "+f3(pp.y)+" (#"+pp.rank+"); "+(pp.resid>=0?"+":"")+f3(pp.resid)+" vs the talent expectation")}</title></circle>`; });
  sc+=`</svg>`;
  app.innerHTML=`<div class="cmp">${backHeader("Roster Economy")}<div class="list" style="padding-top:6px">
    <div class="navrow"><button class="navbtn" id="repick"><svg class="ic" aria-hidden="true"><use href="#i-search"/></svg> Another team</button>
      <button class="navbtn" id="renil"><svg class="ic" aria-hidden="true"><use href="#i-target"/></svg> NIL Economy</button></div>
    ${flow||`<div class="sec"><div class="secsub">No portal flow recorded for ${esc(t.school)} entering ${SEASON_SCHED}.</div></div>`}
    <div class="sec"><div class="sectitle">Talent in vs performance out <small>${SEASON_RESULTS} talent · ${phaseLabel()} rating</small></div>
      <div class="secsub">Roster talent across, Hashmark rating up. The dashed line is expectation from talent alone — distance above it is what the STAFF adds (the coaching over-expectation lane).</div>
      ${sc}</div>
    <div class="note"><b>Roster Economy — entering ${SEASON_SCHED}.</b> Portal values are prior-season production (PPA + usage share), position-weighted; never recruiting stars, never dollar figures. Talent is the ${SEASON_RESULTS} composite; the expectation line is a least-squares fit across FBS. ${BRAND_LINE}</div></div></div>`;
  document.querySelector(".back").onclick=load;
  document.getElementById("repick").onclick=()=>teamPicker(null, id=>openRosterEconomy(id));
  document.getElementById("renil").onclick=()=>openNILEconomy();

}

async function playerCardData(aid){
  const [idx, rk]=await Promise.all([
    api(`player_index?select=athlete_id,player,team_id,position&athlete_id=eq.${aid}&limit=1`),
    api(`player_rankings?select=*&season=eq.${SEASON_SCHED}&order=pos_rank.asc`)]);
  const p=idx[0]; if(!p) return null;
  const mine=rk.find(r=>r.player.toLowerCase()===p.player.toLowerCase());
  if(!mine) return {p, bars:null};
  const stats=await api(`player_stat_season?select=stat_key,value,rank&season=eq.${SEASON_RESULTS}&player=eq.${encodeURIComponent(p.player)}&team_id=eq.${p.team_id}`);
  const pool=await api(`player_stat_season?select=stat_key,rank&season=eq.${SEASON_RESULTS}&stat_key=in.(${[...new Set(stats.map(s=>s.stat_key))].slice(0,8).join(",")})&order=rank.desc`);
  const nBy={}; pool.forEach(r=>{ nBy[r.stat_key]=Math.max(nBy[r.stat_key]||0, r.rank||0); });
  const bars=stats.slice(0,7).map(s=>({label:s.stat_key.replace(/_/g," "), value:s.value,
    pct: nBy[s.stat_key]>1? Math.round(100*(nBy[s.stat_key]-s.rank)/(nBy[s.stat_key]-1)) : null}))
    .filter(b=>b.pct!=null);
  return {p, mine, bars};
}

async function openMatchupGrid(a,b){
  window.scrollTo(0,0); app.innerHTML=`<div class="loading">Building the grid…</div>`;
  await ensureTeamMeta();
  const S=SEASON_RESULTS;
  const rows=await api(`team_splits?select=team_id,side,split_type,split_key,epa_per_play,success_rate,explosive_rate&season=eq.${S}&team_id=in.(${a},${b})`);
  const get=(tid,side,key)=>rows.find(r=>String(r.team_id)===String(tid)&&r.side===side&&(r.split_key===key||(key==="overall"&&r.split_type==="overall")));
  const COLS=[["overall","Overall"],["1st down","1st down"],["2nd down","2nd down"],["3rd down","3rd down"],["3rd & short","3rd & short"],["3rd & long","3rd & long"]];
  const METS=[["epa_per_play","EPA/play",1],["success_rate","Success",100],["explosive_rate","Explosive",100]];
  const ta=teamMeta[a]||{school:"A"}, tb=teamMeta[b]||{school:"B"};
  const grid=(offId,defId,offT)=>{
    let g=`<div class="sectitle" style="padding-top:8px">${esc(offT.school)} offense vs ${esc((offId===a?tb:ta).school)} defense</div>
      <div class="mgrid"><div class="mgh"></div>${COLS.map(c=>`<div class="mgh">${c[1]}</div>`).join("")}`;
    METS.forEach(([mk,ml,scale])=>{
      g+=`<div class="mgh" style="text-align:left">${ml}</div>`;
      COLS.forEach(([ck])=>{
        const o=get(offId,"off",ck), dd=get(defId,"def",ck);
        if(!o||!dd||o[mk]==null||dd[mk]==null){ g+=`<div class="mgc" style="background:var(--surface)">—</div>`; return; }
        const ov=Number(o[mk]), dv=Number(dd[mk]);
        const diff=ov-dv;
        const hue=Math.max(0,Math.min(120, 60+diff*(mk==="epa_per_play"?240:400)));
        g+=`<div class="mgc" style="background:hsl(${hue} 40% 22%)" data-tip="${esc(`${ml} (${ck}): offense ${scale===1?ov.toFixed(2):Math.round(ov*100)+"%"} vs defense allows ${scale===1?dv.toFixed(2):Math.round(dv*100)+"%"}`)}">${scale===1?diff.toFixed(2):(diff>0?"+":"")+Math.round(diff*100)}</div>`;
      });
    });
    return g+`</div>`;
  };
  app.innerHTML=`<div class="cmp">${backHeader("Unit heat grid")}<div class="list" style="padding-top:6px">
    <div class="secsub" style="padding:0 2px 8px">Green = the offense typically beats what this defense allows; red = the defense typically wins the down. ${S} season splits, garbage time filtered.</div>
    <div class="sec">${grid(a,b,ta)}${grid(b,a,tb)}</div>
    <div class="note"><b>Unit heat grid — ${S} season.</b> Each cell compares one offense's output to the opposing defense's typical concession in the same situation (EPA/play raw; success/explosive shown in points of rate). Data: official play-by-play splits. ${BRAND_LINE}</div></div></div>`;
  document.querySelector(".back").onclick=()=>openMatchup(a,b);
}

  if(!prkFull && list.length>25)
    h+=`<div class="navrow" style="padding-top:8px"><button class="navbtn" id="prkfull">Full ${esc(prkPos)} board (${list.length}) + CSV <span class="chip-plus" style="display:inline-flex">HASHMARK+</span></button></div>`;

    individually graded honestly</b> — line play is served as team unit metrics, and defenders as PRODUCTION
    leaders (tackles, TFL, havoc) in the stats explorer — production counts, not PFF-style grades. Kickers are
    graded on points versus distance-based expectation.</div></div>
    <div class="note"><b>Hashmark player grades — performance evaluation only.</b> Value produced in role on ${SEASON_RESULTS}
    play, opponent-adjusted, garbage-time down-weighted, shrunk by sample. Returning set audited against the
    transfer portal weekly. Not framed for wagering of any kind. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=load;
  document.querySelectorAll("[data-prk]").forEach(b=>b.onclick=()=>{ prkPos=b.dataset.prk; prkFull=false; openPlayerRankings(); });
  const fb=document.getElementById("prkfull");

      !(await plusUpsell("Full position boards + CSV","Every returning qualified player at every position, ranked — plus CSV export. Free during preview."))) return;
    prkFull=true; renderPlayerRankings(rows); };
  const cb=document.getElementById("prkcsv");
  if(cb) cb.onclick=()=>{ const csv="pos_rank,player,team,rating,percentile,tier,plays\n"+
      list.map(r=>[r.pos_rank,r.player,(teamMeta[r.team_id]||{}).school||r.team,r.rating,r.percentile,r.tier,r.plays].join(",")).join("\n");

    a2.download=`hashmark_${prkPos.replace(/\W+/g,"")}_rankings_${SEASON_SCHED}.csv`; a2.click(); };

/* -------- "What actually wins games" (teampage brief #4 — FREE, credibility lane) -------- */
async function openWhatWins(){
  window.scrollTo(0,0);
  app.innerHTML=`<div class="loading">Loading…</div>`;
  let rows=[]; try{ rows=await api(`what_wins?select=*`); }catch(e){}
  const by={}; rows.forEach(r=>{ by[r.factor]=r; });
  const META={
    efficiency:["Efficiency (success rate)","the share of plays that stay on schedule",
      "Example: on a typical drive, the more-efficient team keeps itself ahead of the chains. Efficiency is the closest thing to repeatable skill in one number — it carries year to year."],
    explosiveness:["Explosiveness (big plays)","value per successful play — breakaway gains",
      "Example: hit two 50-yard plays and you'll probably win TODAY — but big plays are semi-random, and this barely repeats next season."],
    finishing:["Finishing drives","points per trip inside the opponent's 40",
      "Example: turning three red-zone trips into 21 instead of 9 decides games — and red-zone execution partly repeats."],
    turnovers:["Turnover margin","takeaways minus giveaways",
      "Example: win the turnover battle +2 and you usually win the game — but turnover margin is mostly luck across seasons; teams that live on it regress."],
    field_pos:["Field position","average starting point of each drive",
      "Example: starting drives at your 35 instead of your 25 is a real edge in the game — one that barely persists season to season."],
    one_score:["One-score record","wins minus losses in games decided by 8 or fewer",
      "Example: a 5-0 record in one-score games looks clutch — but close-game records show almost NO carryover. It is a warning sign, not a strength."]};
  const stabLbl=r=> r==null?"—": r>=0.45?"HIGH":r>=0.2?"MEDIUM":"LOW";
  const stabCls=r=> r==null?"":r>=0.45?"r-1":r>=0.2?"r-3":"r-5";
  const order=["efficiency","explosiveness","finishing","turnovers","field_pos","one_score"];
  let h=`<div class="cmp">${backHeader("What actually wins games")}<div class="list" style="padding-top:6px">
    <div class="secsub" style="padding:0 2px 8px">Two different questions about every factor: does winning it win you <b>this game</b> —
    and does it <b>repeat next year</b>? Computed on our own 2014-${SEASON_RESULTS} play-by-play (${(by.efficiency||{}).n_games?Number(by.efficiency.n_games).toLocaleString():"12,000+"} games,
    garbage time removed). Tap any factor for a plain-English example.</div>
    <div class="sec"><div class="wwhead"><div></div><div data-tip="Of all games where a team won this factor battle, the share it actually won — computed on our 2014-${SEASON_RESULTS} play-by-play.">Wins the game</div><div data-tip="Year-over-year correlation of the team-season value: does this number repeat, or reset? High = skill you can count on next season; low = luck that fades.">Repeats next year</div></div>`;
  order.forEach(f=>{ const r=by[f], m=META[f]; if(!m) return;
    const win=r&&r.win_pct!=null?Math.round(Number(r.win_pct))+"%":"—";
    const st=r&&r.stability!=null?Number(r.stability):null;
    h+=`<div class="wwrow" data-tip="${esc(m[0]+" — "+m[1]+". "+m[2])}">
      <div class="wwk">${m[0]}<small>${m[1]}</small></div>
      <div class="wwv">${win}</div>
      <div class="wwv ${stabCls(st)}">${stabLbl(st)}<small>${st!=null?("r = "+st.toFixed(2)):""}</small></div></div>`; });
  h+=`</div>
    <div class="sec"><div class="sectitle">The point</div><div class="secsub">
      Explosiveness and turnovers win the day they show up — then largely reset. Efficiency is the thing that
      carries. That's exactly how the Hashmark Model is built: it <b>weights the repeatable factors</b> (success
      rate, efficiency, finishing) and <b>fades the lucky ones</b> (turnover margin, close-game records).
      See it applied on the <span data-go="checking" style="color:var(--amber);font-weight:600">Checking Our Work</span> page,
      the regression watch-list in <span data-go="signature" style="color:var(--amber);font-weight:600">Signature Stats</span>,
      and the full <span data-go="method" style="color:var(--amber);font-weight:600">Methodology</span>.</div></div>
    <div class="note"><b>Method.</b> Single-game win% = of all 2014-${SEASON_RESULTS} games where a team won that factor battle
      (garbage time excluded for efficiency/explosiveness), the share it won. "Repeats next year" = correlation of a
      team's season value with its own next season. The factor framework follows the public Five Factors literature; every
      number is computed from our own play-by-play, so a couple differ from the published benchmarks — most notably
      explosiveness: the famous figure uses value-per-successful-play, which does not replicate on modern
      expected-points data (it rewards desperation deep balls), so we measure the share of explosive plays instead —
      a cleaner battle that still shows the same story: helps today, barely repeats. Season-labeled, gambling-free. ${BRAND_LINE}</div></div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=load;
  const WGO={checking:openCheckingWork, signature:openSignature, method:openMethodology};
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{ const f=WGO[el.dataset.go]; if(f) f(); });
}

    h+=`<div class="card" style="margin:12px 2px;padding:16px"><b>Movement starts Week 1.</b>
      <p style="color:var(--text2);font-size:12px;margin:6px 0 0">Rank-by-rank movement shows up here once two weekly snapshots exist. The Sunday update writes one every week of the season.</p></div>`;
  }else{

    h+=`</div>`;

}

    const po=await api(`playoff_odds?select=make_cfp,win_title,exp_wins&team_id=eq.${fav}&order=season.desc&limit=1`);
    if(po.length){
      const n=Math.round(po[0].make_cfp*100);
      let line=`Makes the playoff in <b>${n} of 100</b> seasons`;
      try{ const cp=await api(`conditional_probs?select=scenario,target,prob&team_id=eq.${fav}&order=as_of_week.desc&limit=6`);
        const wo=cp.find(c=>c.scenario==="win_out"&&(c.target==="make_cfp"||c.target==="cfp"));
        if(wo) line+=` · win out: <b>${Math.round(wo.prob*100)} of 100</b>`; }catch(e){}
      document.getElementById("herownth").innerHTML=
        `<div style="margin-top:8px;font-size:12px;color:var(--text2)">${line}</div>
         <div class="pbar" style="margin-top:6px"><div class="fill" style="width:${n}%"></div></div>`;
    }}catch(e){}
  }
}

/* ---------------- Phase B: live strip (live_win_prob is served; OT stays dark) ------- */
let _liveTimer=null;
function liveArm(){ if(_liveTimer) clearInterval(_liveTimer);
  liveTick(); _liveTimer=setInterval(()=>{ if(document.visibilityState==="visible") liveTick(); },60000); }
async function liveTick(){
  let rows=[];
  try{
    const since=new Date(Date.now()-12*60*1000).toISOString();
    rows=await api(`live_win_prob?select=game_id,period,clock,home_points,away_points,home_wp,leverage,segment,fetched_at&fetched_at=gt.${since}&order=fetched_at.desc&limit=120`);
  }catch(e){ return; }
  const seen={}, live=[];
  rows.forEach(r=>{ if(!seen[r.game_id]){ seen[r.game_id]=1; live.push(r); } });
  let host=document.getElementById("livewrap");
  if(!live.length){ if(host) host.remove(); return; }
  if(!host){ host=document.createElement("div"); host.id="livewrap";
    const hero=document.getElementById("v2hero");
    const anchor=(hero&&hero.parentNode===app)?hero:app.firstElementChild;   // hero may be nested
    app.insertBefore(host, anchor); }
  await ensureTeamMeta();
  let ginfo={};
  const ids=live.map(r=>r.game_id).join(",");
  try{
    (await api(`games?select=id,home_team_id,away_team_id&id=in.(${ids})`)).forEach(g=>ginfo[g.id]=g);
  }catch(e){}
  // On-Track Pace: newest tick per game (rows of one poll share a transaction timestamp)
  const paceByGame={};
  try{
    const pr=await api(`live_stat_pace?select=game_id,team,side,subject_type,subject,stat,so_far,projected,band,fetched_at&game_id=in.(${ids})&fetched_at=gt.${new Date(Date.now()-12*60*1000).toISOString()}&order=fetched_at.desc&limit=600`);
    pr.forEach(r=>{ const g=paceByGame[r.game_id]=paceByGame[r.game_id]||{ts:r.fetched_at,rows:[]};
      if(r.fetched_at===g.ts) g.rows.push(r); });
  }catch(e){}
  window._paceP=window._paceP||{};
  let h=`<div class="sect-h"><span class="chip-live">LIVE</span></div>`;
  for(const r of live){
    const g=ginfo[r.game_id]||{}; const ht=teamMeta[g.home_team_id]||{}, at=teamMeta[g.away_team_id]||{};
    const pc=paceByGame[r.game_id];
    const pcName=side=>{ const row=pc&&pc.rows.find(x=>x.side===side); return row?row.team:null; };
    ht.school=ht.school||pcName("home"); at.school=at.school||pcName("away");
    const wp=r.home_wp; const isOT=r.segment==="overtime";
    let pre=null;
    if(g.home_team_id&&g.away_team_id){ try{
      const [a,b]=[Math.min(g.home_team_id,g.away_team_id),Math.max(g.home_team_id,g.away_team_id)];
      const mw=await api(`matchup_winprob?select=team_a,team_b,win_prob_a_home,win_prob_a_away&team_a=eq.${a}&team_b=eq.${b}&limit=1`);
      if(mw.length){ pre = (a===g.home_team_id)? mw[0].win_prob_a_home : 1-mw[0].win_prob_a_away; }
    }catch(e){} }
    h+=`<div class="card" style="margin:6px 2px;padding:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <b>${esc(at.school||"Away")} ${r.away_points} @ ${esc(ht.school||"Home")} ${r.home_points}</b>
        <span class="eyebrow">Q${r.period} ${esc(r.clock||"")}</span></div>`;
    if(isOT || wp==null){
      h+=`<div style="margin-top:6px;font-size:12px;color:var(--text2)">Overtime — too close to call. We don't guess in OT.</div>`;
    }else{
      const n=Math.round(wp*100);
      h+=`<div class="pbar" style="margin-top:8px"><div class="fill" style="width:${n}%"></div>
        ${pre!=null?`<div class="tick" style="left:${Math.round(pre*100)}%"></div>`:""}</div>
        <div class="plabel"><span>${esc(ht.school||"Home")} wins <b>${n} of 100</b> from here</span>
        ${pre!=null?`<span>pregame: ${Math.round(pre*100)}</span>`:""}</div>`;
    }
    // ---- On-Track Pace panel (team pace FREE; full player pace board HASHMARK+) ----
    if(pc){
      const T={};
      pc.rows.filter(x=>x.subject_type==="team").forEach(x=>{
        (T[x.side]=T[x.side]||{}) [x.stat]={s:+x.so_far,p:+x.projected,b:x.band==null?null:+x.band}; });
      const cell=o=>o?`<b>${Math.round(o.p)}</b><small>${o.b!=null?` ±${Math.round(o.b)}`:""}</small><small class="pnow">now ${Math.round(o.s)}</small>`:"—";
      const PLBL=[["points","Points"],["total_yards","Total yds"],["rush_yards","Rush yds"],["pass_yards","Pass yds"]];
      if(T.home&&T.away){
        h+=`<div class="pacehdr">On track to finish <small>live — updates every drive · projection with a calibrated range</small></div>
          <div class="pacegrid"><div class="pgh">${esc(at.school||"Away")}</div><div></div><div class="pgh" style="text-align:right">${esc(ht.school||"Home")}</div>`;
        PLBL.forEach(([k,lbl])=>{ h+=`<div class="pgv">${cell(T.away[k])}</div><div class="pgk">${lbl}</div><div class="pgv" style="text-align:right">${cell(T.home[k])}</div>`; });
        h+=`</div>`;
        const players=pc.rows.filter(x=>x.subject_type!=="team");
        if(players.length){
          window._paceP[r.game_id]=players;
          h+=`<div class="navrow" style="padding-top:6px;margin:0"><button class="navbtn" data-paceplayers="${r.game_id}">Player pace board <span class="chip-plus" style="display:inline-flex">HASHMARK+</span></button></div>
            <div id="pacep-${r.game_id}" style="display:none"></div>`;
        }
      }
    }
    h+=`</div>`;
  }
  h+=`<div class="note" style="margin:2px">${typeof BRAND_LINE!=="undefined"?BRAND_LINE:""}</div>`;
  host.innerHTML=h;
  host.querySelectorAll("[data-paceplayers]").forEach(b=>b.onclick=()=>gatedPacePlayers(b.dataset.paceplayers));
}
async function gatedPacePlayers(gid){
  const el=document.getElementById(`pacep-${gid}`);
  if(!el) return;
  if(el.style.display==="block"){ el.style.display="none"; return; }
  if(PLUS_GATED.pace_player_box && !el.dataset.unlocked){
    if(!(await plusUpsell("Full player pace board",
      "Every key contributor's live projection — what the QB, lead back and top targets are on track to finish with, updating every drive. Free during preview."))) return;
    el.dataset.unlocked="1";
  }
  const rows=(window._paceP||{})[gid]||[];
  const lbl={qb_yards:"passing yards",rb_yards:"rushing yards"};
  el.innerHTML=rows.map(x=>`<div class="pacepl"><span class="ppn">${esc(x.subject||"")}</span>
    <span class="ppt">${esc(x.team)}</span>
    <span class="ppv">on track for <b>${Math.round(+x.projected)}</b>${x.band!=null?` <small>±${Math.round(+x.band)}</small>`:""} ${lbl[x.stat]||esc(x.stat)} <small class="pnow">now ${Math.round(+x.so_far)}</small></span></div>`).join("")
    ||`<div class="secsub">No qualifying player volume yet this game.</div>`;
  el.style.display="block";
}

/* ---------------- Model receipts on finals rows ---------------- */
let RCPT_ROWS=[];
const _scGameRow=scGameRow;
scGameRow=function(g){
  let h=_scGameRow(g);
  const done=g.completed&&g.home_points!=null&&g.away_points!=null;
  if(done&&g.home_team_id&&g.away_team_id&&typeof SHOW_PREDICTIONS!=="undefined"&&SHOW_PREDICTIONS){
    RCPT_ROWS.push({id:g.id,h:g.home_team_id,a:g.away_team_id,hw:g.home_points>g.away_points});
    h=h.replace('</div>$','');
    h=h.replace(/<\/div>\s*$/,`<span class="rcpt" data-rcpt="${g.id}" style="display:none;margin-top:4px"></span></div>`);
  }
  return h;
};
const _drawScores=drawScores;
drawScores=async function(){
  RCPT_ROWS=[];
  await _drawScores.apply(this,arguments);
  const rows=RCPT_ROWS.slice(0,40); if(!rows.length) return;
  try{
    const ors=rows.map(r=>{const a=Math.min(r.h,r.a),b=Math.max(r.h,r.a);return `and(team_a.eq.${a},team_b.eq.${b})`;}).join(",");
    const mw=await api(`matchup_winprob?select=team_a,team_b,win_prob_a_home&or=(${ors})`);
    const byPair={}; mw.forEach(m=>byPair[m.team_a+"-"+m.team_b]=m);
    rows.forEach(r=>{
      const a=Math.min(r.h,r.a),b=Math.max(r.h,r.a); const m=byPair[a+"-"+b]; if(!m) return;
      const predHomeWin = (a===r.h)? m.win_prob_a_home>0.5 : m.win_prob_a_home<0.5;
      if(predHomeWin===r.hw){
        const el=document.querySelector(`[data-rcpt="${r.id}"]`);
        if(el){ el.style.display="inline-flex"; el.className="chip-model";
          el.innerHTML=`<svg class="ic"><use href="#i-check"/></svg>MODEL`; }
      }
    });
  }catch(e){}
};


/* ---------------- §4 Signature Stats (free teaser + locked shells) ---------------- */

  window.scrollTo(0,0);
  app.innerHTML=`<div class="loading">Loading signature stats…</div>`;
  await ensureTeamMeta();
  let free=[];
  try{ free=await api(`signature_stats?select=stat_key,rank,team_id,value,drivers,track,season,as_of_week&free=eq.true&order=stat_key.asc,rank.asc`);}catch(e){}
  const collapse=free.find(r=>r.stat_key==="collapse_index");
  const myth=free.find(r=>r.stat_key==="myth_trap_games");
  let h=`<div class="cmp"><div class="cmptop"><button class="back"><svg class="ic"><use href="#i-chev-l"/></svg></button>
    <div class="wordmark">Hashmark<span class="dot">.</span></div><div class="cmptag">Signature stats</div></div>
    <div class="secsub" style="padding:4px 2px">Named teams, tracked calls — every card links to its own record. Misses stay up.</div>`;

      <div class="eyebrow" data-tip="The Collapse Index — which preseason top-10 team our regression factors flag hardest as likely to fall short of its ranking. A watch-list, not a prediction; every call is logged and scored.">The Collapse Index · regression watch-list · ${collapse.season} preseason · FREE <svg class="ic pkinfo" aria-hidden="true"><use href="#i-info"/></svg></div>
      <h2 style="margin:6px 0 2px">${esc(t.school||"?")}</h2>
      <p style="margin:0 0 6px;color:var(--text2);font-size:12.5px">The preseason top-10 team our factors flag hardest${d.chance?` — ${esc(String(d.chance))}`:""}.${d.base_rate?` For scale: ${esc(String(d.base_rate))}.`:""}</p>
      ${d.poll_basis?`<div class="eyebrow" style="margin-bottom:6px">Built on the ${esc(String(d.poll_basis))}</div>`:""}
      ${drv.map(x=>`<div style="font-size:12px;color:var(--text2)"><svg class="ic" style="color:var(--amber)"><use href="#i-chev-r"/></svg> ${esc(String(x))}</div>`).join("")}
      ${tr.n?`<div class="eyebrow" style="margin-top:8px">This call's record since ${tr.since||2014}: ${tr.hits} of ${tr.n}</div>`:""}
      <div class="eyebrow" style="margin-top:4px">${esc(String(d.disclaimer||"n=11 seasons — no proven edge claimed; we log and score every call"))}</div>
    </div>`;
  } else {
    h+=`<div class="card" style="margin:10px 2px;padding:14px"><b>Collapse Index</b>
      <p style="color:var(--text2);font-size:12px;margin:4px 0 0">First board publishes with the preseason run.</p></div>`;
  }
  const LOCKED=[["Luck Audit","Teams most likely to fall back to earth"],
    ["Hidden Riser","The breakout the numbers already see"],
    ["Model vs Poll","Where we disagree with the voters"],
    ["The Gauntlet","The toughest three-game stretch in football"],
    ["Talent Bomb","Elite rosters underperforming their talent"]];
  h+=`<div class="sect-h">The full set</div><div class="xgrid" style="padding:0 2px">`;
  LOCKED.forEach(([t2,p])=>{ h+=`<div class="xcard" data-lock="1"><svg class="ic" style="color:var(--text3)"><use href="#i-lock"/></svg>
    <h4>${t2} <span class="chip-plus" style="display:inline-flex">HASHMARK+</span></h4><p>${p}</p></div>`; });
  h+=`</div>`;
  if(myth){
    const md=myth.drivers||{};
    h+=`<div class="card" style="margin:12px 2px;padding:14px">
      <div class="eyebrow">Folklore check · non-predictive</div>
      <b>Trap-game check: the top-10 usually handles it.</b>
      <p style="color:var(--text2);font-size:12px;margin:5px 0 0">${esc(String(md.claim||"Top-10 teams win about 91 of 100 of these spots."))}${md.record?` Record: <b>${esc(String(md.record))}</b>.`:""} We publish this so you know we check the folklore too.</p></div>`;
  }
  h+=`<div class="note">${typeof BRAND_LINE!=="undefined"?BRAND_LINE:""}</div></div>`;
  app.innerHTML=h;
  document.querySelector(".back").onclick=()=>openExplore();
  document.querySelectorAll("[data-lock]").forEach(el=>el.onclick=()=>plusUpsell(
    "The full signature set","Every board, every driver, every tracked call — coming with Hashmark+. Free while we're in preview? Not this one: signature boards stay locked until launch."));
}

/* boot */
refreshMyTeamTab();
// load() begins before this block parses — if the first home render won the race

setTimeout(()=>{ try{
  if(!document.getElementById("v2hero")
     && /national leaders/i.test(app.textContent||"")){ v2HomeExtras(); liveArm(); }
}catch(e){} }, 1200);
setTimeout(()=>{ try{
  if(!document.getElementById("v2hero")
     && /national leaders/i.test(app.textContent||"")){ v2HomeExtras(); liveArm(); }

</script>
